<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<!-- FOUC 방지 (테마 깜빡임 차단) -->
<script>
(function(){
  var t = localStorage.getItem('radio_theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme','light');
})();
</script>


</head>

<body>


<div class="app">

  <!-- 헤더 -->
  <header>
    <div class="logo">
      <div class="logo-icon">FM</div>
      <div class="logo-text">KOREA <span>FM</span></div>
    </div>
    <div class="header-actions">
      <button id="syncBtn" onclick="toggleSync()" aria-label="함께 듣기">
        <span class="sync-dot"></span>함께 듣기
      </button>
      <button id="themeBtn" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>
      <button id="accountBtn" onclick="openAccountModal()" aria-label="계정">👤</button>
      <button id="installBtn" onclick="installApp()">📲 홈 화면 추가</button>
    </div>
  </header>

  <!-- Now Playing -->
  <div class="now-playing" id="nowPlaying">
    <div class="np-label">▶ NOW PLAYING</div>
    <div class="np-station" id="npStation">채널을 선택하세요</div>
    <div class="np-freq"    id="npFreq">—</div>

    <div class="waveform paused" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
    </div>

    <div class="controls">
      <button class="btn-play" id="btnPlay" aria-label="재생/일시정지">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="volume-wrap">
        <span class="vol-icon">🔈</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.02" value="0.8" aria-label="볼륨">
      </div>
      <div class="spinner" id="spinner"></div>
    </div>

    <div class="np-status" id="npStatus">재생 중인 채널이 없습니다</div>
  </div>

  <!-- ★ 채널 스크롤 영역 시작 — 헤더/Now Playing은 고정, 여기서부터 스크롤 -->
  <div class="channel-scroll-area">

  <!-- 탭 -->
  <div class="tabs" style="display:flex;align-items:center;gap:8px">
    <button class="tab-btn active" data-tab="all" style="flex:1">전체 채널</button>
    <button class="tab-btn" data-tab="fav" style="flex:1">
      ⭐ 즐겨찾기 <span id="fav-count" style="font-size:10px;opacity:.6"></span>
    </button>
    <button id="favLockBtn" onclick="toggleFavLock()" title="즐겨찾기 잠금">
      <span class="lock-icon">🔓</span>
    </button>
  </div>

  <!-- 에러박스 -->
  <div id="errorBox" class="error-box" style="display:none">
    <span class="err-msg"></span>
    <button onclick="retryPlay()" class="error-retry-btn">↺ 재연결</button>
  </div>

  <!-- 채널 레이블 -->
  <div class="section-label" id="ch-label">전체 채널</div>

  <!-- 스와이프 패널 -->
  <div class="swipe-viewport" id="swipeViewport">
    <div class="swipe-track" id="swipeTrack">

      <!-- 패널 0: 전체 채널 -->
      <div class="swipe-panel">
        <div class="station-list" id="list-all"></div>
      </div>

      <!-- 패널 1: 즐겨찾기 -->
      <div class="swipe-panel">
        <div class="station-list" id="list-fav"></div>
        <div class="fav-empty" id="fav-empty">
          <div style="font-size:32px;margin-bottom:10px">⭐</div>
          <div style="font-size:13px;line-height:1.7">
            즐겨찾기한 채널이 없습니다.<br>채널의 ☆ 버튼을 눌러 추가하세요.
          </div>
        </div>
      </div>

    </div>
  </div>

  </div><!-- /.channel-scroll-area -->

</div><!-- /.app -->

<!-- 닉네임 모달 -->
<div class="modal-bg" id="nickModalBg">
  <div class="modal">
    <h3>🔗 함께 듣기</h3>
    <p>닉네임을 입력하면 채널 변경 시 다른 사람에게 표시됩니다.</p>
    <input type="text" id="nickInput" placeholder="닉네임 (예: 홍길동)" maxlength="10">
    <div class="modal-btns">
      <button class="btn-cancel"  onclick="closeNickModal()">취소</button>
      <button class="btn-confirm" onclick="confirmSync()">시작</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<!-- 방송 추가 버튼 -->
<button id="addStationBtn" onclick="openAddStation()" title="방송 추가">＋</button>

<!-- 방송 추가 시트 -->
<div class="add-station-bg" id="addStationBg" onclick="closeAddStation(event)">
  <div class="add-station-sheet">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div class="add-station-title">📻 방송 추가</div>
      <button class="changelog-close" onclick="closeAddStation()">✕</button>
    </div>
    <div class="add-station-field">
      <label>방송국 이름 *</label>
      <input id="asi-name" type="text" placeholder="예: OO FM" maxlength="30">
    </div>
    <div class="add-station-field">
      <label>주파수</label>
      <input id="asi-freq" type="text" placeholder="예: 100.0 MHz">
    </div>
    <div class="add-station-field">
      <label>장르</label>
      <input id="asi-genre" type="text" placeholder="예: 음악, 뉴스, 교양">
    </div>
    <div class="add-station-field">
      <label>스트림 URL * (.m3u8 또는 오디오 직접 링크)</label>
      <input id="asi-url" type="url" placeholder="https://...m3u8">
    </div>
    <div class="add-station-field">
      <label>색상 (선택)</label>
      <input id="asi-color" type="color" value="#e74c3c" style="height:36px;padding:2px 6px;cursor:pointer">
    </div>
    <div class="add-station-actions">
      <button class="btn-add-cancel" onclick="closeAddStation()">취소</button>
      <button class="btn-add-confirm" onclick="confirmAddStation()">추가</button>
    </div>
  </div>
</div>

<!-- 로그 버튼 -->
<button id="logBtn" onclick="openLog()" title="재생 로그">📋</button>

<!-- 로그 뷰어 시트 -->
<div class="log-bg" id="logBg" onclick="closeLog(event)">
  <div class="log-sheet" id="logSheet">
    <div class="log-header">
      <span class="log-title">📋 PLAY LOG</span>
      <div class="log-actions">
        <button class="log-btn-sm" onclick="exportLog()">내보내기</button>
        <button class="log-btn-sm danger" onclick="clearLog()">초기화</button>
        <button class="log-close" onclick="closeLog()">✕</button>
      </div>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<!-- 버전 뱃지 -->
<div id="versionBadge" onclick="openChangelog()">v2.6.1</div>

<!-- 변경 이력 시트 -->
<div class="changelog-bg" id="changelogBg" onclick="closeChangelog(event)">
  <div class="changelog-sheet" id="changelogSheet">
    <div class="changelog-header">
      <div class="changelog-title">CHANGELOG</div>
      <button class="changelog-close" onclick="closeChangelog()">✕</button>
    </div>
    <div id="changelogBody"></div>
  </div>
</div>

<!-- 계정 모달 -->
<div class="account-modal-bg" id="accountModalBg" onclick="closeAccountModal(event)">
  <div class="account-sheet">
    <div class="account-title-row">
      <div class="account-title-text">🔐 계정</div>
      <button class="changelog-close" onclick="closeAccountModal()">✕</button>
    </div>

    <!-- 로그아웃 상태: 로그인/회원가입 폼 -->
    <div id="accFormWrap" style="display:flex;flex-direction:column;gap:14px">
      <div class="account-tabs">
        <button class="account-tab active" id="accTabLogin"    onclick="switchAccountTab('login')">로그인</button>
        <button class="account-tab"        id="accTabRegister" onclick="switchAccountTab('register')">회원가입</button>
      </div>
      <div class="account-field">
        <label>아이디 (3~12자, 영문/숫자/한글)</label>
        <input id="acc-id" type="text" placeholder="예: radio123" maxlength="12"
               autocomplete="username" onkeydown="if(event.key==='Enter')doAccountAction()">
      </div>
      <div class="account-field">
        <label>PIN 번호 (숫자 4자리 · 선택)</label>
        <input id="acc-pin" type="password" placeholder="없으면 비워두세요" maxlength="4"
               inputmode="numeric" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doAccountAction()">
      </div>
      <div class="account-hint" id="accHint">
        아이디를 기억해두면 인터넷 기록을 삭제해도<br>어느 기기에서든 즐겨찾기를 복원할 수 있습니다.
      </div>
      <div class="account-actions">
        <button class="btn-acc-cancel"  onclick="closeAccountModal()">취소</button>
        <button class="btn-acc-confirm" id="accConfirmBtn" onclick="doAccountAction()">로그인</button>
      </div>
    </div>

    <!-- 로그인 상태: 사용자 정보 -->
    <div id="accLoggedWrap" style="display:none;flex-direction:column;gap:14px">
      <div class="account-user-card">
        <div class="account-user-icon">👤</div>
        <div>
          <div class="account-user-name" id="accUserName"></div>
          <div class="account-user-sub">즐겨찾기가 클라우드에 자동 동기화됩니다</div>
        </div>
      </div>
      <div class="account-actions">
        <button class="btn-acc-cancel" onclick="closeAccountModal()">닫기</button>
        <button class="btn-acc-logout" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </div>
</div>

<!-- 오디오 -->
<audio id="audioEl" style="display:none" playsinline></audio>

<!-- 외부 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- 앱 스크립트 -->
<script src="js/state.js"></script>
<script src="js/stations.js"></script>
<script src="js/player.js"></script>
<script src="js/firebase.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
