<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>KOREA FM 라디오</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FM 라디오">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="msapplication-TileColor" content="#0d0d1a">
<meta name="msapplication-TileImage" content="./icons/icon-144.png">

<!-- 폰트 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- FOUC 방지 (테마 깜빡임 차단) -->
<script>
(function(){
  var t = localStorage.getItem('radio_theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme','light');
})();
</script>

<style>
/* ══ 리셋 & 변수 ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0d1a;
  --bg2:       #131327;
  --bg3:       #1a1a35;
  --panel:     #1e1e3a;
  --border:    rgba(255,255,255,0.07);
  --red:       #e94560;
  --red-glow:  rgba(233,69,96,0.35);
  --amber:     #f5a623;
  --text:      #e8e8f0;
  --muted:     #7070a0;
  --np-end:    #21213f;
  --hdr-bg:    rgba(13,13,26,0.92);
  --tab-bdr:   rgba(255,255,255,0.15);
  --err-bg:    #2a1010;
  --err-bdr:   #5a2020;
  --err-txt:   #ee8888;
  --mono:      'Orbitron', monospace;
  --kr:        'Noto Sans KR', sans-serif;
  --sat:       env(safe-area-inset-top,    0px);
  --sab:       env(safe-area-inset-bottom, 0px);
}

[data-theme="light"] {
  --bg:       #f0f0f5;
  --bg2:      #e4e4ee;
  --bg3:      #d8d8e8;
  --panel:    #ffffff;
  --border:   rgba(0,0,0,0.08);
  --red-glow: rgba(233,69,96,0.2);
  --text:     #1a1a2e;
  --muted:    #7070a0;
  --np-end:   #eaeaf8;
  --hdr-bg:   rgba(240,240,245,0.92);
  --tab-bdr:  rgba(0,0,0,0.12);
  --err-bg:   #fff0f0;
  --err-bdr:  #f0c0c0;
  --err-txt:  #c0392b;
}
[data-theme="light"] .station-card:hover { background: #fff; }
[data-theme="light"] input[type=range]   { background: var(--bg3); }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--kr);
  overflow-x: hidden;
}

/* ══ 레이아웃 ══ */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  max-width: 520px;
  margin: 0 auto;
  padding-top: var(--sat);
  padding-bottom: calc(var(--sab) + 80px);
}

/* ══ 헤더 ══ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 13px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--hdr-bg);
}

.logo { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 34px; height: 34px;
  background: var(--red);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px; font-weight: 900;
  box-shadow: 0 0 16px var(--red-glow);
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--mono);
  font-size: 14px; font-weight: 700;
  letter-spacing: 2px;
}
.logo-text span { color: var(--red); }

.header-actions { display: flex; align-items: center; gap: 8px; }

/* 함께 듣기 버튼 */
#syncBtn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--muted);
  font-size: 11px;
  font-family: var(--kr);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
#syncBtn.on {
  background: rgba(0,200,100,0.12);
  border-color: rgba(0,200,100,0.4);
  color: #00c864;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
#syncBtn.on .sync-dot {
  box-shadow: 0 0 6px #00c864;
  animation: blink 1.4s ease-in-out infinite;
}

/* 테마 버튼 */
#themeBtn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s;
  flex-shrink: 0;
}
#themeBtn:hover { transform: rotate(20deg); }

/* 설치 버튼 */
#installBtn {
  display: none;
  align-items: center; gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--amber);
  font-family: var(--kr);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
}
#installBtn:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* ══ Now Playing ══ */
.now-playing {
  margin: 16px;
  background: linear-gradient(135deg, var(--panel) 0%, var(--np-end) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.now-playing::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 20%, var(--red-glow) 0%, transparent 60%);
  pointer-events: none;
}

.np-label {
  font-size: 10px; letter-spacing: 3px;
  color: var(--red);
  font-family: var(--mono); font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.np-station {
  font-family: var(--mono);
  font-size: 22px; font-weight: 900;
  letter-spacing: 1px; line-height: 1.1;
  margin-bottom: 4px; min-height: 28px;
}

.np-freq {
  font-family: var(--mono);
  font-size: 13px; color: var(--muted);
  margin-bottom: 16px; min-height: 18px;
}

/* 파형 */
.waveform {
  display: flex; align-items: flex-end;
  gap: 3px; height: 36px;
  margin-bottom: 18px;
}
.wave-bar {
  width: 4px; background: var(--red);
  border-radius: 2px; opacity: 0.3;
  transition: opacity .3s;
}
.playing .wave-bar { opacity: 1; }
.paused  .wave-bar { animation-play-state: paused; }

.wave-bar:nth-child(1)  { animation: wave 1.0s ease-in-out infinite; }
.wave-bar:nth-child(2)  { animation: wave 1.3s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(3)  { animation: wave 0.8s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(4)  { animation: wave 1.1s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(5)  { animation: wave 0.9s ease-in-out infinite 0.3s; }
.wave-bar:nth-child(6)  { animation: wave 1.4s ease-in-out infinite 0.15s; }
.wave-bar:nth-child(7)  { animation: wave 1.0s ease-in-out infinite 0.25s; }
.wave-bar:nth-child(8)  { animation: wave 0.7s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(9)  { animation: wave 1.2s ease-in-out infinite 0.35s; }
.wave-bar:nth-child(10) { animation: wave 0.9s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(11) { animation: wave 1.1s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(12) { animation: wave 0.8s ease-in-out infinite 0.4s; }

@keyframes wave { 0%,100%{height:6px} 50%{height:32px} }

/* 컨트롤 */
.controls { display: flex; align-items: center; gap: 14px; }

.btn-play {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--red); border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 24px var(--red-glow);
  transition: transform .15s;
}
.btn-play:active { transform: scale(0.93); }
.btn-play svg { fill: white; width: 22px; height: 22px; }

.volume-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.vol-icon { color: var(--muted); font-size: 16px; flex-shrink: 0; }

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--bg3); border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%; background: var(--red);
  cursor: pointer; box-shadow: 0 0 8px var(--red-glow);
}

.np-status {
  font-size: 11px; color: var(--muted);
  margin-top: 12px; min-height: 14px;
  font-family: var(--mono); letter-spacing: 0.5px;
}
.np-status.live  { color: var(--red); }
.np-status.error { color: var(--amber); }

.spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(233,69,96,0.3);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  flex-shrink: 0;
}
.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ 탭 ══ */
.tabs { display: flex; gap: 8px; padding: 10px 16px 4px; }
.tab-btn {
  flex: 1; padding: 8px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-size: 12px; font-family: var(--kr); font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active {
  background: var(--panel);
  border-color: var(--tab-bdr);
  color: var(--text);
}

/* ══ 에러 박스 ══ */
.error-box {
  margin: 6px 16px;
  padding: 10px 14px;
  background: var(--err-bg);
  border: 1px solid var(--err-bdr);
  border-radius: 10px;
  font-size: 11px; color: var(--err-txt);
  align-items: center;
  justify-content: space-between; gap: 10px;
}
.error-retry-btn {
  flex-shrink: 0; padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--err-txt);
  background: transparent; color: var(--err-txt);
  font-size: 11px; cursor: pointer; transition: all .15s;
}
.error-retry-btn:hover { background: var(--err-txt); color: var(--panel); }

/* ══ 채널 목록 ══ */
.section-label {
  padding: 6px 20px 4px;
  font-size: 10px; letter-spacing: 3px;
  color: var(--muted);
  font-family: var(--mono); text-transform: uppercase;
}

.swipe-viewport { overflow: hidden; width: 100%; }
.swipe-track {
  display: flex; width: 200%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  align-items: flex-start; /* ★ 각 패널이 콘텐츠 높이만큼만 차지 */
}
/* ★ 패널 높이를 콘텐츠에 맞게 — 즐겨찾기 탭 하단 빈 여백 제거 */
.swipe-panel { width: 50%; flex-shrink: 0; min-width: 0; }

.station-list {
  display: flex; flex-direction: column;
  gap: 1px; padding: 0 12px;
}

.station-card {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 14px;
  border-radius: 14px;
  cursor: pointer;
  transition: background .15s;
  border: 1px solid transparent;
  position: relative;
}
.station-card:hover { background: var(--panel); }
.station-card.active {
  background: var(--panel);
  border-color: var(--border);
}
.station-card.active::before {
  content: '';
  position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; background: var(--red);
  border-radius: 0 2px 2px 0;
}

.st-badge {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  flex-shrink: 0; text-align: center; line-height: 1.2;
}

.st-info { flex: 1; min-width: 0; }
.st-name {
  font-size: 14px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.st-desc {
  font-size: 11px; color: var(--muted); margin-top: 1px;
  font-family: var(--mono); letter-spacing: 0.5px;
}

.st-freq {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--muted); flex-shrink: 0;
}
.station-card.active .st-freq { color: var(--red); }

.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 6px var(--red);
  animation: blink 1.4s ease-in-out infinite;
  flex-shrink: 0; opacity: 0;
}
.station-card.active .live-dot { opacity: 1; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.s-fav-btn {
  width: 26px; height: 26px;
  border-radius: 50%; border: none;
  background: transparent; font-size: 14px;
  cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.s-fav-btn:hover { color: var(--amber); transform: scale(1.15); }
.s-fav-btn.on    { color: var(--amber); }

.fav-empty {
  display: none;
  text-align: center; padding: 48px 20px;
  color: var(--muted);
}

/* ══ 닉네임 모달 ══ */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  align-items: center; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  width: min(340px,90vw);
  display: flex; flex-direction: column; gap: 14px;
}
.modal h3  { font-size: 15px; font-weight: 600; color: var(--text); }
.modal p   { font-size: 12px; color: var(--muted); line-height: 1.6; }
.modal input {
  width: 100%; padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); font-family: var(--kr); font-size: 14px;
  outline: none;
}
.modal input:focus { border-color: #00c864; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
  flex: 1; padding: 10px; border-radius: 10px;
  border: none; font-family: var(--kr); font-size: 13px;
  cursor: pointer; transition: opacity .15s;
}
.modal-btns button:hover { opacity: .85; }
.btn-cancel  { background: var(--bg3); color: var(--muted); }
.btn-confirm { background: #00c864; color: #fff; font-weight: 600; }

/* ══ 토스트 ══ */
#toast {
  position: fixed;
  bottom: calc(var(--sab) + 90px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--panel);
  border: 1px solid rgba(0,200,100,0.35);
  color: var(--text); font-size: 12px; font-family: var(--kr);
  padding: 9px 18px; border-radius: 20px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity .3s, transform .3s;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ 스크롤바 ══ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ══ 즐겨찾기 잠금 버튼 ══ */
#favLockBtn {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-family: var(--mono);
  padding: 4px 10px; border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg2); color: var(--muted);
  cursor: pointer; transition: all .2s;
  letter-spacing: .5px;
}
#favLockBtn.locked {
  border-color: var(--red); color: var(--red);
  background: var(--red-glow);
}
#favLockBtn .lock-icon { font-size: 13px; }

/* ══ 방송 추가 버튼 ══ */
#addStationBtn {
  position: fixed;
  bottom: calc(var(--sab) + 36px);
  left: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--red); color: #fff;
  font-size: 22px; line-height: 1;
  border: none; cursor: pointer;
  box-shadow: 0 4px 16px var(--red-glow);
  z-index: 150;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s, box-shadow .2s;
}
#addStationBtn:active { transform: scale(.92); }

/* ══ 방송 추가 시트 ══ */
.add-station-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 400;
  align-items: flex-end; justify-content: center;
}
.add-station-bg.show { display: flex; }
.add-station-sheet {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(var(--sab) + 24px);
  width: min(520px,100%); display: flex; flex-direction: column; gap: 14px;
}
.add-station-title {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; color: var(--red);
}
.add-station-field { display: flex; flex-direction: column; gap: 5px; }
.add-station-field label {
  font-size: 10px; color: var(--muted); letter-spacing: 1px;
  font-family: var(--mono);
}
.add-station-field input {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  color: var(--text); font-size: 13px; outline: none;
  transition: border-color .2s;
}
.add-station-field input:focus { border-color: var(--red); }
.add-station-actions { display: flex; gap: 10px; margin-top: 4px; }
.add-station-actions button {
  flex: 1; padding: 12px; border-radius: 12px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity .2s;
}
.btn-add-confirm {
  background: var(--red); color: #fff; border: none;
}
.btn-add-cancel {
  background: var(--bg3); color: var(--muted);
  border: 1px solid var(--border);
}
.custom-station-badge {
  font-size: 8px; background: var(--red); color: #fff;
  padding: 1px 5px; border-radius: 4px;
  font-family: var(--mono); letter-spacing: .5px;
  vertical-align: middle; margin-left: 4px;
}
/* 사용자 추가 방송국 삭제 버튼 */
.st-delete-btn {
  position: absolute; top: 8px; right: 8px;
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(231,76,60,.15); color: var(--red);
  border: none; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
.station-card:hover .st-delete-btn,
.station-card:focus-within .st-delete-btn { opacity: 1; }

/* ══ 버전 모달 ══ */
#versionBadge {
  position: fixed;
  bottom: calc(var(--sab) + 6px);
  right: 12px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px 7px;
  cursor: pointer;
  z-index: 150;
  transition: color .2s, border-color .2s;
  letter-spacing: 1px;
}
#versionBadge:hover { color: var(--red); border-color: var(--red-glow); }

.changelog-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 400;
  align-items: flex-end;
  justify-content: center;
}
.changelog-bg.show { display: flex; }
.changelog-sheet {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(var(--sab) + 20px);
  width: min(520px, 100%);
  max-height: 70vh;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
}
.changelog-header {
  display: flex; align-items: center; justify-content: space-between;
}
.changelog-title {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; color: var(--red);
}
.changelog-close {

/* ════════════════════════════════════════
   스트림 URL 결정
   streamApi 방송(극동방송): 캐시 재사용
   일반 방송: 바로 stream URL 반환
════════════════════════════════════════ */
const _streamCache = {};

async function resolveStreamUrl(s, forceRefresh = false) {
  if (!s.streamApi) return s.stream;
  if (!forceRefresh && _streamCache[s.id]) return _streamCache[s.id];
  try {
    const res  = await fetch(s.streamApi, { cache: 'no-store' });
    const text = await res.text();
    const m    = text.match(/https?:\/\/[^\s"'<>]+\.m3u8[^\s"'<>]*/);
    if (m) { _streamCache[s.id] = m[0]; return m[0]; }
    console.warn('streamApi: m3u8 URL을 찾지 못했습니다. 기본 URL로 폴백합니다.');
  } catch(e) { console.warn('streamApi 실패:', e); }
  return s.stream;
}

/* ════════════════════════════════════════
   재생 감시 워치독
   onOK() 이후 audio.currentTime이 멈추면
   UI 강제 동기화 + 재연결
════════════════════════════════════════ */
function startWatchdog() {
  stopWatchdog();
  let lastTime  = audio.currentTime;
  let stallTick = 0;
  S.watchdogTimer = setInterval(() => {
    if (!S.playing || S.loading || S.userPaused) { stopWatchdog(); return; }
    const cur = audio.currentTime;
    if (audio.paused || cur === lastTime) {
      stallTick++;
      if (stallTick >= 4) {           // 8초 이상 실제 진행 없음
        stopWatchdog();
        S.playing = false;            // UI 강제 동기화
        updateNowPlaying(); renderStations();
        scheduleRetry();
      }
    } else {
      stallTick = 0;
      lastTime  = cur;
    }
  }, 2000);
}

function stopWatchdog() {
  if (S.watchdogTimer) { clearInterval(S.watchdogTimer); S.watchdogTimer = null; }
}

/* ════════════════════════════════════════
   재시도
════════════════════════════════════════ */
function clearRetryTimer() {
  if (S.retryTimer) { clearTimeout(S.retryTimer); S.retryTimer = null; }
}

function scheduleRetry() {
  if (S.retryTimer) { clearTimeout(S.retryTimer); S.retryTimer = null; }
  if (S.retryCount >= 5) { showError('연결 실패 (5회). 재연결 버튼을 눌러주세요.'); return; }
  S.retryCount++;
  const delay = Math.min(2000 * Math.pow(2, S.retryCount - 1), 30000);
  showError(`연결이 끊겼습니다. ${Math.round(delay/1000)}초 후 재연결 (${S.retryCount}/5)`);
  S.retryTimer = setTimeout(() => { if (S.current) playStation(S.current); }, delay);
}

function retryPlay() {
  if (!S.current) return;
  clearRetryTimer(); S.retryCount = 0;
  playStation(S.current, true);
}

/* ════════════════════════════════════════
   재생 엔진
════════════════════════════════════════ */
function playStation(s, forceRefresh = false) {
  const thisCall = ++S.callId;
  S.needReconnect = false;
  S.wasPlaying    = false;   // 채널 전환 시 오작동 재연결 방지

  showError(null); clearRetryTimer(); stopWatchdog(); S.retryCount = 0;
  S.loading = true; S.playing = false; S.current = s;
  localStorage.setItem('radio_last', s.id);
  updateNowPlaying(); renderStations();

  if (S.hls) { S.hls.destroy(); S.hls = null; }
  S.userPaused = true;
  audio.pause(); audio.src = '';

  // Firebase 동기화
  if (typeof syncMode !== 'undefined' && syncMode && typeof fbDb !== 'undefined' && fbDb) {
    fbDb.ref('shared/station').set({ id: s.id, nick: myNick, at: Date.now() });
  }

  resolveStreamUrl(s, forceRefresh).then(url => {
    if (thisCall !== S.callId) return;

    function onOK() {
      if (thisCall !== S.callId) return;
      S.playing = true; S.loading = false; S.retryCount = 0;
      localStorage.setItem('radio_playing', '1');
      updateNowPlaying(); renderStations(); updateMediaSession();
      startWatchdog();   // 실제 재생 감시 시작
    }
    function onFail(retry) {
      if (thisCall !== S.callId) return;
      S.loading = false; S.playing = false;
      updateNowPlaying(); renderStations(); updateMediaSession();
      if (retry) scheduleRetry();
    }

    if (window.Hls && window.Hls.isSupported()) {
      const hls = new window.Hls({
        maxBufferLength:             30,
        maxMaxBufferLength:          60,
        liveSyncDurationCount:        3,
        liveMaxLatencyDurationCount:  6,
        enableWorker:                true,
      });
      S.hls = hls;
      hls.loadSource(url); hls.attachMedia(audio);
      hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
        audio.volume = S.volume;
        audio.play().then(onOK).catch(() => {
          showToast('▶ 화면을 탭하면 재생됩니다');
          onFail(false);
        });
      });
      let mediaErrorCount = 0;
      hls.on(window.Hls.Events.ERROR, (_, d) => {
        if (thisCall !== S.callId) { hls.destroy(); return; } // 구 채널 에러 조용히 폐기
        if (d.type === window.Hls.ErrorTypes.NETWORK_ERROR) {
          if (d.fatal) {
            if (S.hls === hls) S.hls = null;
            hls.destroy(); onFail(true);
          } else {
            hls.startLoad();
          }
          return;
        }
        if (d.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
          if (mediaErrorCount < 2) {
            mediaErrorCount++; hls.recoverMediaError();
          } else {
            if (S.hls === hls) S.hls = null;
            hls.destroy(); onFail(true);
          }
          return;
        }
        if (d.fatal) {
          if (S.hls === hls) S.hls = null;
          hls.destroy(); onFail(true);
        }
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url; audio.volume = S.volume;
      audio.play().then(onOK).catch(() => onFail(true));
    } else {
      showError('이 브라우저는 HLS를 지원하지 않습니다.');
      S.loading = false; updateNowPlaying(); renderStations();
    }
  }).catch(() => {
    if (thisCall !== S.callId) return;
    S.loading = false; S.playing = false;
    updateNowPlaying(); renderStations(); updateMediaSession();
    showError('스트림 주소를 가져오지 못했습니다.');
  });
}

function togglePlay() {
  if (!S.current || S.loading) return;
  if (S.playing) {
    clearRetryTimer(); stopWatchdog();
    if (S.hls) S.hls.stopLoad();
    S.userPaused = true; S.wasPlaying = false; S.needReconnect = false;
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    updateNowPlaying(); renderStations(); updateMediaSession();
  } else {
    playStation(S.current);
  }
}

/* ════════════════════════════════════════
   오디오 이벤트 (전화/인터럽트 처리)
════════════════════════════════════════ */
audio.addEventListener('ended', () => { if (S.current && S.playing) scheduleRetry(); });
audio.addEventListener('error', () => { if (S.current && S.playing && !S.loading && !S.hls) scheduleRetry(); });

audio.addEventListener('pause', () => {
  if (S.userPaused) { S.userPaused = false; return; }
  if (S.playing && S.current && !S.loading) {
    S.wasPlaying = true;
    S.needReconnect = true;
    S.playing = false;
    updateNowPlaying(); renderStations();
    if ('mediaSession' in navigator) {
      navigator.mediaSession.playbackState = 'paused';
    }
  }
});

audio.addEventListener('play', () => {
  if (S.needReconnect && S.current) {
    S.needReconnect = false;
    S.wasPlaying    = false;
    S.userPaused    = true;
    audio.pause();
    playStation(S.current);
  }
});

/* ════════════════════════════════════════
   통화 종료 자동 재연결
════════════════════════════════════════ */
(function initCallReconnect() {
  let watchTimer   = null;
  let callSuspect  = false;
  let reconnecting = false;

  function tryReconnect() {
    if (reconnecting || !S.current || !S.wasPlaying) return;
    reconnecting    = true;
    S.wasPlaying    = false;
    S.needReconnect = false;
    callSuspect     = false;
    stopWatch();
    showError(null);
    setTimeout(() => {
      playStation(S.current, true);  // 긴 통화 후 URL 강제 갱신
      setTimeout(() => { reconnecting = false; }, 5000);
    }, 800);
  }

  function startWatch() {
    if (watchTimer || reconnecting) return;
    callSuspect = true;
    watchTimer = setInterval(() => {
      if (!S.wasPlaying || !S.current || reconnecting) { stopWatch(); return; }
      if (audio.paused && navigator.onLine) {
        try {
          const testCtx = new (window.AudioContext || window.webkitAudioContext)();
          const state   = testCtx.state;
          testCtx.close();
          if (state === 'running') { tryReconnect(); return; }
        } catch(e) {}
      }
    }, 2000);
  }

  function stopWatch() {
    if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
    callSuspect = false;
  }

  audio.addEventListener('pause', () => {
    setTimeout(() => {
      if (S.wasPlaying && S.current && !reconnecting) startWatch();
    }, 500);
  });

  audio.addEventListener('play', () => stopWatch());

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    if (S.wasPlaying && S.current) tryReconnect();
  });

  window.addEventListener('online', () => {
    if (S.wasPlaying && S.current) tryReconnect();
  });
})();

/* ════════════════════════════════════════
   블루투스 재연결
════════════════════════════════════════ */
(function initBluetoothReconnect() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.addEventListener) return;

  let audioCtx = null;
  function getAudioCtx() {
    if (audioCtx && audioCtx.state !== 'closed') return audioCtx;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    return audioCtx;
  }

  navigator.mediaDevices.addEventListener('devicechange', async () => {
    if (!S.current) return;
    let hasAudioOut = true;
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      hasAudioOut = devices.some(d => d.kind === 'audiooutput');
    } catch(e) {}
    if (S.wasPlaying && hasAudioOut) {
      setTimeout(() => {
        if (S.wasPlaying && S.current) {
          S.wasPlaying = false; S.needReconnect = false;
          playStation(S.current);
        }
      }, 300);
    }
  });

  audio.addEventListener('play', () => {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
  }, { once: false });

  function watchAudioCtxState() {
    const ctx = getAudioCtx();
    if (!ctx) return;
    ctx.addEventListener('statechange', () => {
      if (ctx.state === 'running' && S.wasPlaying && S.current) {
        S.wasPlaying = false; S.needReconnect = false;
        playStation(S.current);
      }
    });
  }
  document.addEventListener('click',      () => { getAudioCtx(); watchAudioCtxState(); }, { once: true, passive: true });
  document.addEventListener('touchstart', () => { getAudioCtx(); watchAudioCtxState(); }, { once: true, passive: true });
})();

/* ════════════════════════════════════════
   네트워크 오프라인 감지
════════════════════════════════════════ */
window.addEventListener('offline', () => {
  if (!S.current) return;
  if (!S.playing && !S.wasPlaying) return;
  if (S.playing) { S.wasPlaying = true; S.playing = false; }
  clearRetryTimer();
  if (S.hls) S.hls.stopLoad();
  updateNowPlaying(); renderStations();
  showError('네트워크가 끊겼습니다. 연결을 확인 중...');
});

function handleVolume(val) {
  const parsed = parseFloat(val);
  if (isNaN(parsed)) return;
  S.volume = Math.min(1, Math.max(0, parsed));
  audio.volume = S.volume;
  const c  = (S.current && S.current.color) || 'var(--red)';
  const sl = document.getElementById('volSlider');
  if (sl) {
    sl.style.background =
      `linear-gradient(to right,${c} ${S.volume*100}%,var(--bg3) ${S.volume*100}%)`;
  }
}

/* ════════════════════════════════════════
   MediaSession (잠금화면 컨트롤)
════════════════════════════════════════ */
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !S.current) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title:  S.current.name,
    artist: `${S.current.freq} · ${S.current.genre}`,
    album:  'KOREA FM 라디오'
  });

  navigator.mediaSession.setActionHandler('play', () => {
    playStation(S.current);
  });

  navigator.mediaSession.setActionHandler('pause', () => {
    S.userPaused = true; S.wasPlaying = false; S.needReconnect = false;
    if (S.hls) S.hls.stopLoad();
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    updateNowPlaying(); renderStations();
    navigator.mediaSession.playbackState = 'paused';
  });

  navigator.mediaSession.setActionHandler('stop', () => {
    S.userPaused = true;
    if (S.hls) S.hls.stopLoad();
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    updateNowPlaying(); renderStations();
    navigator.mediaSession.playbackState = 'paused';
  });

  ['previoustrack', 'nexttrack', 'seekbackward', 'seekforward'].forEach(a => {
    try { navigator.mediaSession.setActionHandler(a, null); } catch(e) {}
  });

  navigator.mediaSession.playbackState =
    (S.playing || S.loading) ? 'playing' : 'paused';
}

/* ══ firebase.js ══ */
/* ════════════════════════════════════════
   IndexedDB 백업
   localStorage 삭제 시에도 IndexedDB에서 복원
════════════════════════════════════════ */
const DB_NAME    = 'kr-radio-db';
const DB_VERSION = 1;
const DB_STORE   = 'settings';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(DB_STORE, { keyPath: 'key' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbSet(key, value) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(DB_STORE, 'readwrite');
      const st  = tx.objectStore(DB_STORE);
      st.put({ key, value });
      tx.oncomplete = () => resolve();
      tx.onerror    = e => reject(e.target.error);
    });
  } catch(e) { console.warn('IndexedDB 저장 실패:', e); }
}

async function idbGet(key) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).get(key);
      req.onsuccess = e => resolve(e.target.result?.value ?? null);
      req.onerror   = e => reject(e.target.error);
    });
  } catch(e) { return null; }
}

async function saveProtected(key, value) {
  try { localStorage.setItem(key, value); } catch(e) {}
  await idbSet(key, value);
}

async function loadProtected(key) {
  const local = localStorage.getItem(key);
  if (local !== null) return local;
  const idb = await idbGet(key);
  if (idb !== null) {
    try { localStorage.setItem(key, idb); } catch(e) {}
    console.info(`[복원] ${key} → IndexedDB에서 복구됨`);
  }
  return idb;
}

async function restoreFromIDB() {
  const favs = await loadProtected('radio_favs');
  if (favs) {
    try {
      const parsed = JSON.parse(favs);
      if (Array.isArray(parsed)) {
        S.favorites = new Set(parsed);
        updateFavCount(); renderAllList(); updateFavList();
      }
    } catch(e) {}
  }

  const locked = await loadProtected('radio_fav_locked');
  if (locked !== null) {
    favLocked = locked === '1';
    applyFavLock();
  }

  const custom = await loadProtected('radio_custom_stations');
  if (custom) {
    try {
      const parsed = JSON.parse(custom);
      if (Array.isArray(parsed)) {
        parsed.forEach(s => {
          if (!STATIONS.find(x => x.id === s.id)) STATIONS.push(s);
        });
        renderAllList();
      }
    } catch(e) {}
  }
}

/* ════════════════════════════════════════
   사용자 UUID — IndexedDB에만 저장
   인터넷 기록 삭제 후에도 유지됨
════════════════════════════════════════ */
let _userUUID = null;

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

async function getUserUUID() {
  if (_userUUID) return _userUUID;
  let uuid = await idbGet('user_uuid');
  if (!uuid) {
    uuid = generateUUID();
    await idbSet('user_uuid', uuid);
    console.info('[UUID] 새 UUID 생성:', uuid);
  } else {
    console.info('[UUID] IndexedDB에서 복원:', uuid);
  }
  _userUUID = uuid;
  return uuid;
}

async function fbSaveUserData() {
  if (!fbReady || !fbDb) return;
  try {
    const uuid = await getUserUUID();
    await fbDb.ref(`users/${uuid}`).set({
      favorites:      [...S.favorites],
      favLocked:      favLocked,
      customStations: JSON.parse(localStorage.getItem('radio_custom_stations') || '[]'),
      updatedAt:      Date.now(),
    });
  } catch(e) { console.warn('Firebase 사용자 데이터 저장 실패:', e); }
}

async function fbLoadUserData() {
  if (!fbReady || !fbDb) return false;
  try {
    const uuid = await getUserUUID();
    const snap = await fbDb.ref(`users/${uuid}`).once('value');
    const data = snap.val();
    if (!data) return false;

    if (Array.isArray(data.favorites) && data.favorites.length > 0) {
      S.favorites = new Set(data.favorites);
      saveFav(); updateFavCount(); renderAllList(); updateFavList();
    }

    if (typeof data.favLocked === 'boolean') {
      favLocked = data.favLocked;
      const lockVal = favLocked ? '1' : '0';
      try { localStorage.setItem('radio_fav_locked', lockVal); } catch(e) {}
      await idbSet('radio_fav_locked', lockVal);
      applyFavLock();
    }

    if (Array.isArray(data.customStations) && data.customStations.length > 0) {
      const existing = JSON.parse(localStorage.getItem('radio_custom_stations') || '[]');
      const merged = [...existing];
      data.customStations.forEach(s => {
        if (!merged.find(x => x.id === s.id)) merged.push(s);
      });
      saveCustomStations(merged);
      merged.forEach(s => {
        if (!STATIONS.find(x => x.id === s.id)) STATIONS.push(s);
      });
      renderAllList();
    }

    console.info('[Firebase] 사용자 데이터 복원 완료');
    return true;
  } catch(e) {
    console.warn('Firebase 사용자 데이터 불러오기 실패:', e);
    return false;
  }
}

async function initUserData() {
  const fbRestored = await fbLoadUserData();
  if (!fbRestored) await restoreFromIDB();
  console.info('[초기화] 사용자 데이터 로드 완료');
}

/* ════════════════════════════════════════
   함께 듣기 (실시간 채널 동기화)
════════════════════════════════════════ */
function startSync() {
  if (!fbReady) return;
  fbListener = fbDb.ref('shared/station').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    if (_fbIgnore) { _fbIgnore = false; return; }
    const s = STATIONS.find(x => x.id === data.id);
    if (!s || (S.current && S.current.id === s.id)) return;
    if (data.nick === myNick) return;
    _fbIgnore = true;
    playStation(s, true);
    showToast(`📻 ${data.nick || '누군가'}님이 ${s.name}으로 변경했습니다`);
  });
}

function stopSync() {
  if (fbDb && fbListener) {
    fbDb.ref('shared/station').off('value', fbListener);
    fbListener = null;
  }
}

function toggleSync() {
  if (syncMode) {
    syncMode = false; stopSync();
    document.getElementById('syncBtn').classList.remove('on');
    showToast('함께 듣기가 종료되었습니다');
  } else {
    if (myNick) confirmSync();
    else {
      document.getElementById('nickModalBg').classList.add('show');
      setTimeout(() => document.getElementById('nickInput').focus(), 100);
    }
  }
}

function closeNickModal() {
  document.getElementById('nickModalBg').classList.remove('show');
}

function confirmSync() {
  stopSync();
  const inp = document.getElementById('nickInput').value.trim();
  if (inp) { myNick = inp; localStorage.setItem('radio_nick', myNick); }
  if (!myNick) myNick = '익명';
  closeNickModal();
  initFirebase();
  if (!fbReady) { showToast('⚠️ Firebase 연결에 실패했습니다'); return; }
  syncMode = true;
  document.getElementById('syncBtn').classList.add('on');
  startSync();
  showToast(`🔗 함께 듣기 시작 (${myNick})`);
}

document.getElementById('nickInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmSync();
});

/* ════════════════════════════════════════
   채널 카드
════════════════════════════════════════ */
function createCard(s) {
  const isActive = S.current && S.current.id === s.id;
  const isFav    = S.favorites.has(s.id);
  const freqShort = s.freq.replace(' MHz','').replace(' ','');
  const div = document.createElement('div');
  div.className = `station-card${isActive ? ' active' : ''}`;
  div.dataset.id = s.id;
  div.innerHTML = `
    <div class="st-badge" style="background:${s.color}22;color:${s.color}">
      ${esc(freqShort)}
    </div>
    <div class="st-info">
      <div class="st-name">
        ${esc(s.name)}${s.custom ? '<span class="custom-station-badge">MY</span>' : ''}
      </div>
      <div class="st-desc">${esc(s.genre)}</div>
    </div>
    <div class="st-freq">${esc(s.freq)}</div>
    <div class="live-dot"></div>
    <button class="s-fav-btn${isFav?' on':''}" data-id="${s.id}" aria-label="즐겨찾기">
      ${isFav ? '★' : '☆'}
    </button>
    ${s.custom ? `<button class="st-delete-btn" data-id="${s.id}" aria-label="삭제">✕</button>` : ''}
  `;
  div.addEventListener('click', () => {
    if (S.current && S.current.id === s.id && !S.loading) togglePlay();
    else playStation(s, true);
  });
  div.querySelector('.s-fav-btn').addEventListener('click', e => toggleFav(s.id, e));
  if (s.custom) {
    div.querySelector('.st-delete-btn').addEventListener('click', e => deleteCustomStation(s.id, e));
  }
  return div;
}

function renderAllList() {
  const list = document.getElementById('list-all');
  if (!list) return;
  list.innerHTML = '';
  STATIONS.forEach(s => list.appendChild(createCard(s)));
}

function updateFavList() {
  const list = document.getElementById('list-fav');
  if (!list) return;
  list.innerHTML = '';
  STATIONS.filter(s => S.favorites.has(s.id)).forEach(s => list.appendChild(createCard(s)));
  updateEmptyState();
}

function renderStations() {
  renderAllList();
  updateFavList();
}

  try {

    const parsed = JSON.parse(saved);
    return Array.isArray(parsed) ? parsed : [];

function saveCustomStations(list) {

    showToast('⚠️ 저장 공간이 부족합니다.');
  }
  idbSet('radio_custom_stations', data);
  fbSaveUserData();
}

function mergeCustomStations() {
  const custom = loadCustomStations();

    if (!STATIONS.find(x => x.id === s.id)) STATIONS.push(s);
  });
}

function openAddStation() {
  ['asi-name','asi-freq','asi-genre','asi-url'].forEach(id => {

  });

}

function closeAddStation(e) {
  if (e && e.target !== document.getElementById('addStationBg')) return;
  document.getElementById('addStationBg').classList.remove('show');
}

function confirmAddStation() {
  const name  = document.getElementById('asi-name').value.trim();
  const freq  = document.getElementById('asi-freq').value.trim() || '—';
  const genre = document.getElementById('asi-genre').value.trim() || '기타';
  const url   = document.getElementById('asi-url').value.trim();
  const color = document.getElementById('asi-color').value;

  if (!name) { showToast('⚠️ 방송국 이름을 입력해주세요.'); return; }
  if (!url)  { showToast('⚠️ 스트림 URL을 입력해주세요.'); return; }
  if (!url.startsWith('http')) { showToast('⚠️ URL은 http로 시작해야 합니다.'); return; }

  const custom    = loadCustomStations();
  const newId     = 1000 + Date.now() % 100000;
  const newStation = { id: newId, name, freq, genre, color, stream: url, custom: true };

  custom.push(newStation);
  saveCustomStations(custom);
  STATIONS.push(newStation);
  renderAllList(); updateFavCount();
  closeAddStation();
  showToast(`✅ "${name}" 채널이 추가됐습니다.`);
}

function deleteCustomStation(id, e) {
  e.stopPropagation();
  const s = STATIONS.find(x => x.id === id);
  if (!s || !s.custom) return;
  if (S.current && S.current.id === id) {
    showToast('⚠️ 재생 중인 채널은 삭제할 수 없습니다.'); return;
  }
  const custom = loadCustomStations().filter(x => x.id !== id);
  saveCustomStations(custom);
  const idx = STATIONS.findIndex(x => x.id === id);
  if (idx > -1) STATIONS.splice(idx, 1);
  S.favorites.delete(id); saveFav();
  renderAllList(); updateFavCount();
  showToast('🗑️ 채널이 삭제됐습니다.');
}

/* ════════════════════════════════════════
   변경 이력
════════════════════════════════════════ */
function openChangelog() {
  const body = document.getElementById('changelogBody');
  body.innerHTML = '';
  CHANGELOG.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'changelog-entry';
    div.innerHTML = `
      <div class="changelog-ver">
        <span class="changelog-ver-badge${i > 0 ? ' old' : ''}">${entry.version}</span>
        <span class="changelog-date">${entry.date}</span>
      </div>
      <div class="changelog-list">
        ${entry.changes.map(c => `<div class="changelog-item">${c}</div>`).join('')}
      </div>`;
    body.appendChild(div);
  });
  document.getElementById('changelogBg').classList.add('show');
}

function closeChangelog(e) {
  if (e && e.target !== document.getElementById('changelogBg')) return;
  document.getElementById('changelogBg').classList.remove('show');
}

/* ════════════════════════════════════════
   스와이프 제스처
════════════════════════════════════════ */
(function() {
  const vp    = document.getElementById('swipeViewport');
  const track = document.getElementById('swipeTrack');
  let sx = 0, sy = 0, st = 0, dragging = false, base = 0;

  vp.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    st = Date.now(); dragging = false;
    base = S.activeTab === 'all' ? 0 : -50;
    track.style.transition = 'none';
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (!dragging && Math.abs(dy) > Math.abs(dx)) return;
    dragging = true;
    const next = Math.max(-50, Math.min(0, base + (dx / vp.clientWidth) * 100));
    track.style.transform = `translateX(${next}%)`;
  }, { passive: true });

  vp.addEventListener('touchend', e => {
    if (!dragging) return;
    track.style.transition = '';
    const dx   = e.changedTouches[0].clientX - sx;
    const fast = Date.now() - st < 250 && Math.abs(dx) > 40;
    const far  = Math.abs(dx) > vp.clientWidth * 0.35;
    if (fast || far) switchTab(dx < 0 ? 'fav' : 'all');
    else track.style.transform = `translateX(${base}%)`;
  }, { passive: true });
})();

/* ════════════════════════════════════════
   초기화
════════════════════════════════════════ */
document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('volSlider').addEventListener('input', function() {
  handleVolume(this.value);
});
document.querySelectorAll('.tab-btn').forEach(b =>
  b.addEventListener('click', () => switchTab(b.dataset.tab))
);

mergeCustomStations();
applyFavLock();
handleVolume(S.volume);

// 업데이트 토스트
(function checkUpdate() {
  const lastSeen = localStorage.getItem('radio_seen_version');
  if (lastSeen && lastSeen !== APP_VERSION) {
    const latest  = CHANGELOG[0];
    const summary = latest.changes.slice(0, 2).join(', ');
    setTimeout(() => showToast(`🆕 ${APP_VERSION} 업데이트: ${summary}`), 1500);
  }
  localStorage.setItem('radio_seen_version', APP_VERSION);
})();

// 1. 즉시 렌더링
updateFavCount();
renderAllList();
updateFavList();

// 2. 마지막 방송국 즉시 복원
// PWA 바로가기(?autoplay=id) 우선, 없으면 마지막 채널 복원
const _autoplayId = parseInt(new URLSearchParams(location.search).get('autoplay'));
const _lastId = _autoplayId || parseInt(localStorage.getItem('radio_last'));
if (_lastId) {
  S.current = STATIONS.find(s => s.id === _lastId) || null;
  if (S.current) {
    updateNowPlaying(); renderStations();
    if (localStorage.getItem('radio_playing') === '1') {
      playStation(S.current);
      const resumeOnGesture = () => {
        if (!S.playing && !S.loading && S.current) playStation(S.current);
        document.removeEventListener('touchstart', resumeOnGesture);
        document.removeEventListener('click', resumeOnGesture);
      };
      document.addEventListener('touchstart', resumeOnGesture, { once: true, passive: true });
      document.addEventListener('click', resumeOnGesture, { once: true });
    }
  }
}

// 3. Firebase/IndexedDB 복원 — 백그라운드
(async function initData() {
  // ★ localStorage가 비어있으면(인터넷 기록 삭제 등) 반드시 IndexedDB 먼저 복원
  const localFavs = localStorage.getItem('radio_favs');
  if (!localFavs) {
    await restoreFromIDB().catch(() => {});
  }

  try {
    if (!fbReady) {
      firebase.initializeApp(FB_CONFIG);
      fbDb    = firebase.database();
      fbReady = true;
    }
    await initUserData();
  } catch(e) {
    console.warn('Firebase 초기화 실패:', e);
    // Firebase 실패 시 IndexedDB로만 (이미 위에서 했을 수도 있지만 재시도)
    if (!localFavs) await restoreFromIDB().catch(() => {});
  }
  updateFavCount();
  updateFavList();
  applyFavLock();
})();

</script>
