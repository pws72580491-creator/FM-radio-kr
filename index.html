<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
/* ── Reset ─────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}

/* iOS Safari: 100vh = 주소창 포함 높이 버그 → dvh 폴백 */
html{height:100%;height:-webkit-fill-available;}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  background:#f1f5f9;color:#0f172a;
  min-height:100vh;min-height:100dvh;
  min-height:-webkit-fill-available;
  /* iOS 고무줄 스크롤 제거 */
  overscroll-behavior:none;
  -webkit-text-size-adjust:100%;
}

/* 모든 인터랙티브 요소: tap 딜레이 제거 + 하이라이트 제거 */
button,a,[role="button"]{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  -webkit-touch-callout:none;
  cursor:pointer;
}
button,input,select,textarea{font-family:inherit;}

/* iOS Safari: input 포커스 시 자동 확대 방지 (font-size ≥ 16px) */
input,select,textarea{font-size:16px!important;}
/* 작은 라벨 등 나머지는 그대로 유지 */
input::placeholder{font-size:14px;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#f1f5f9;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

/* ── Layout ────────────────────────────────────────────────────────────── */
#app{display:flex;min-height:100vh;min-height:100dvh;}
.main-col{flex:1;display:flex;flex-direction:column;min-width:0;}
.sidebar{
  width:200px;flex-shrink:0;background:#fff;
  border-right:1px solid #e2e8f0;display:flex;flex-direction:column;
  /* iOS: 사이드바 내 스크롤 */
  -webkit-overflow-scrolling:touch;
}
.mobile-header{
  display:none;align-items:center;justify-content:space-between;
  padding:0 16px;
  /* Safe Area 상단 여백 (노치) */
  padding-top:env(safe-area-inset-top,0px);
  height:calc(52px + env(safe-area-inset-top,0px));
  background:#fff;border-bottom:1px solid #e2e8f0;
  position:sticky;top:0;z-index:30;
}
/* 하단 고정 래퍼: Safe Area 홈바 여백 자동 처리 */
.bottom-wrap{
  display:none;
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:30;
  background:#fff;
  /* Safe Area 하단 여백 */
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bottom-nav{height:52px;background:#fff;padding:0 8px;display:none;}

/* iOS Safari: position:fixed 오버레이 → inset 대신 longhand */
.sidebar-overlay{
  display:none;
  position:fixed;top:0;right:0;bottom:0;left:0;
  z-index:40;background:rgba(15,23,42,.35);
}
.sidebar-drawer{
  position:fixed;top:0;left:0;bottom:0;
  width:220px;background:#fff;
  border-right:1px solid #e2e8f0;
  z-index:41;
  transform:translateX(-100%);
  transition:transform .22s ease;
  display:flex;flex-direction:column;
  /* iOS: 드로어 내부 스크롤 */
  -webkit-overflow-scrolling:touch;
  overflow-y:auto;
}
.sidebar-drawer.open{transform:translateX(0);}
.nav-btn:hover{background:#f1f5f9!important;}
.hover-row:hover{background:#f8fafc!important;}

/* 스크롤 가능한 main 영역 */
main{
  -webkit-overflow-scrolling:touch;
  overflow-y:auto;
}

/* ── Responsive Grids ──────────────────────────────────────────────────── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.dash-layout{display:grid;grid-template-columns:1fr 340px;gap:12px;}
.dash-right{display:flex;flex-direction:column;gap:12px;}
.dash-right-inner{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ── Table columns ─────────────────────────────────────────────────────── */
.th,.td{display:flex;align-items:center;}
.col-date{width:90px;flex-shrink:0;}
.col-type{width:36px;flex-shrink:0;justify-content:center;}
.col-amt{width:110px;flex-shrink:0;justify-content:flex-end;}
.col-tax{width:86px;flex-shrink:0;justify-content:flex-end;}
.col-status{width:78px;flex-shrink:0;justify-content:center;}
.col-actions{width:50px;flex-shrink:0;justify-content:center;gap:10px;}

/* ── Tablet ────────────────────────────────────────────────────────────── */
@media(max-width:1023px){
  .g4{grid-template-columns:repeat(2,1fr);}
  .dash-layout{grid-template-columns:1fr;}
  .dash-right{display:grid;grid-template-columns:1fr 1fr;}
  .dash-right-inner{grid-template-columns:repeat(4,1fr);}
}

/* ── Mobile ────────────────────────────────────────────────────────────── */
@media(max-width:639px){
  .sidebar{display:none!important;}
  .mobile-header{display:flex;}
  .bottom-wrap{display:block;}
  .bottom-nav{display:flex;}
  /* 하단 탭바 + Safe Area 높이만큼 본문 여백 */
  .main-col>main{padding-bottom:calc(76px + env(safe-area-inset-bottom,0px));}
  .g4{grid-template-columns:1fr 1fr;gap:8px;}
  .g3{grid-template-columns:1fr;}
  .g2{grid-template-columns:1fr;}
  .dash-layout{grid-template-columns:1fr;}
  .dash-right{display:flex;flex-direction:column;}
  .dash-right-inner{grid-template-columns:1fr 1fr;}
  .hide-sm{display:none!important;}
  .stat-val{font-size:17px!important;}
  .col-date,.col-tax{display:none!important;}
  .col-amt{width:90px;}
  .col-status{width:68px;}
  .pad-main{padding:14px 12px!important;}
  .page-title{font-size:16px!important;}
}
/* datalist 역삼각형 제거 */
#tf_clientName::-webkit-calendar-picker-indicator{display:none!important;}
#tf_clientName::-webkit-list-button{display:none!important;}
</style>

// 금액 input 콤마 포맷 헬퍼 (커서 위치 보정)
function applyAmtFmt(el){
  const raw=el.value.replace(/[^0-9]/g,"");
  const formatted=raw?new Intl.NumberFormat("ko-KR").format(Number(raw)):"";
  if(el.value===formatted)return;
  const cur=el.selectionStart||0;
  const digBefore=el.value.slice(0,cur).replace(/[^0-9]/g,"").length;
  el.value=formatted;
  let cnt=0,pos=0;
  for(;pos<formatted.length;pos++){if(/[0-9]/.test(formatted[pos]))cnt++;if(cnt>=digBefore)break;}
  const newPos=formatted.length>0?(digBefore===0?0:pos+1):0;
  try{el.setSelectionRange(newPos,newPos);}catch{}
}

};

const matchStr=(text,q)=>{if(!q)return true;const t=String(text??'').toLowerCase(),lq=q.toLowerCase();if(t.includes(lq))return true;if([...lq].every(c=>CHO.includes(c)))return getCs(t).includes(lq);return false;};

let _toastTimer=null;
function showToast(msg){
  let el=document.getElementById('toast');
  if(!el){
    el=document.createElement('div');el.id='toast';
    el.style.cssText='position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(60px);background:#0f172a;color:#fff;padding:10px 20px;border-radius:9999px;font-size:13px;font-weight:500;z-index:9999;transition:transform .25s,opacity .25s;opacity:0;white-space:nowrap;pointer-events:none;';
    document.body.appendChild(el);
  }
  el.textContent=msg;el.style.transform='translateX(-50%) translateY(0)';el.style.opacity='1';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>{el.style.transform='translateX(-50%) translateY(60px)';el.style.opacity='0';},2400);
}

// 스크립트 동적 로드 헬퍼
function loadScript(src){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src=src;s.async=true;
    s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function initFirebase(){
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');
    if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
    db=firebase.database();
    _fbReady=true;
    // 연결 상태 실시간 감지
    db.ref('.info/connected').on('value',snap=>{
      DB_ONLINE=!!snap.val();
      updateSyncBadge();
    });
  }catch(e){
    console.warn('Firebase SDK 로드 실패 → 로컬 모드로 동작:', e.message);
    db=null; _fbReady=false;
    updateSyncBadge();
  }
}

// ── Persistence (Realtime DB + localStorage 캐시) ─────────────────────────────
function lsGet(key,def){try{const v=JSON.parse(localStorage.getItem(key));return v!=null?v:def;}catch{return def;}}
function lsSet(key,val){
  try{localStorage.setItem(key,JSON.stringify(val));}
  catch(e){
    if(e.name==='QuotaExceededError'||e.code===22){
      // 용량 초과: 납품 synced 캐시 등 보조 키 정리 후 재시도
      try{
        ['crm_napum_synced','crm_napum_void_migrated_v1'].forEach(k=>localStorage.removeItem(k));
        localStorage.setItem(key,JSON.stringify(val));
        console.warn('[lsSet] 용량 초과 → 보조 캐시 정리 후 재저장 성공');
      }catch(e2){
        console.error('[lsSet] 저장 실패 (용량 초과):', key, e2.message);
        showToast('⚠️ 저장 공간 부족. 백업 후 오래된 데이터를 정리하세요.');
      }
    }
  }
}

const toMap=arr=>arr.reduce((m,o)=>{m[o.id]=o;return m;},{});
const toArr=map=>Object.values(map||{}).sort((a,b)=>a.id-b.id);

async function loadData(){
  // 1) 로컬 캐시 즉시 렌더 — 반드시 스플래시 제거
  S.clients     =lsGet('crm_clients',SAMPLE_CLIENTS);
  S.transactions=lsGet('crm_tx',SAMPLE_TX);

  // ── 마이그레이션 1: 납품 연동 거래의 잘못된 tax 보정
  let _migrated=false;
  S.transactions=S.transactions.map(t=>{
    if(t._napumId && t.tax>0 && Math.round(t.amount*0.1)===t.tax){
      _migrated=true;
      return {...t, tax:0};
    }
    return t;
  });
  if(_migrated){
    lsSet('crm_tx',S.transactions);
    console.info('[마이그레이션1] 납품 연동 거래의 tax 자동 보정 완료');
  }

  // ── 마이그레이션 2: isVoid(타인거래) 누락 건 재동기화 유도
  // v2: crmClientId 없어서 스킵된 타인거래까지 포함하도록 synced 캐시 재초기화
  const _syncedMigKey='crm_napum_void_migrated_v2';
  if(!lsGet(_syncedMigKey, false)){
    lsSet('crm_napum_synced',[]);
    lsSet('crm_napum_void_migrated_v1', true); // 구버전도 완료 마킹
    lsSet(_syncedMigKey, true);
    console.info('[마이그레이션3] 타인거래 거래처 자동생성 포함 재동기화');
  }

  try{ render(); }catch(e){ console.error('render 오류:',e); }
  finally{ hideSplash(); }

  // 2) Firebase 초기화 시도
  await initFirebase();
  updateSyncBadge();

  if(!db){
    // Firebase 없음 → 로컬 전용 모드로 완료
    showToast('📴 오프라인 모드 (로컬 저장)');
    return;
  }

  // 3) RTDB 최신 데이터 로드
  try{
    const [csSnap,txSnap]=await Promise.all([
      db.ref('clients').get(),
      db.ref('transactions').get(),
    ]);
    const csVal=csSnap.val();
    const txVal=txSnap.val();
    if(csVal||txVal){
      S.clients     =toArr(csVal);
      S.transactions=toArr(txVal);
      lsSet('crm_clients',S.clients);
      lsSet('crm_tx',S.transactions);
      render();
    } else {
      await _uploadAll();
    }
  }catch(e){
    console.warn('RTDB 로드 실패, 로컬 캐시 사용:',e.message);
  }

  // 4) 실시간 리스너 (CRM)
  _attachListeners();

  // 5) 납품앱 실시간 리스너 시작
  attachNapumListeners().catch(e=>console.warn('납품 리스너 시작 실패:',e));

  // 6) 마이그레이션된 데이터 Firebase에도 반영 (fire-and-forget)
  if(_migrated && db){
    try{ await db.ref('transactions').set(toMap(S.transactions)); }
    catch(e){ console.warn('마이그레이션 클라우드 반영 실패:',e); }
  }

  // 7) 자동 백업 체크 (15일·말일) + Firebase 백업 목록 동기화
  setTimeout(async ()=>{
    await _syncBackupsFromFb();
    checkAutoBackup();
  }, 1500);
}

let _offC=null,_offTX=null;
function _attachListeners(){
  if(!db)return;
  if(_offC){db.ref('clients').off('value',_offC);}
  if(_offTX){db.ref('transactions').off('value',_offTX);}

  _offC=db.ref('clients').on('value',snap=>{
    const arr=toArr(snap.val());
    if(JSON.stringify(arr)===JSON.stringify(S.clients))return;
    S.clients=arr;lsSet('crm_clients',S.clients);render();
  },e=>console.warn('clients 리스너:',e));

  _offTX=db.ref('transactions').on('value',snap=>{
    const arr=toArr(snap.val());
    if(JSON.stringify(arr)===JSON.stringify(S.transactions))return;
    S.transactions=arr;lsSet('crm_tx',S.transactions);render();
  },e=>console.warn('transactions 리스너:',e));
}

// ── 납품앱 실시간 리스너 ────────────────────────────────────────────
// wsId → { clientsRef, ordersRef } 형태로 리스너 핸들 보관
const _napumListeners = {};

async function attachNapumListeners(){
  const workspaces = _getWorkspaces();
  if(!workspaces.length) return;

  // Firebase SDK 및 납품앱 instance 확보
  if(typeof firebase === 'undefined') return;
  let napumApp;
  try{ napumApp = firebase.app('napum'); }
  catch(e){ napumApp = firebase.initializeApp(NAPUM_FB_CFG, 'napum'); }
  const napumDb = napumApp.database();

  // 더 이상 없는 워크스페이스 리스너 제거
  const wsIds = new Set(workspaces.map(w => w.id));
  for(const wsId of Object.keys(_napumListeners)){
    if(!wsIds.has(wsId)){
      const h = _napumListeners[wsId];
      if(h.clientsRef) h.clientsRef.off('value', h.clientsCb);
      if(h.ordersRef)  h.ordersRef.off('value',  h.ordersCb);
      delete _napumListeners[wsId];
    }
  }

  // 새 워크스페이스 리스너 등록
  for(const ws of workspaces){
    if(_napumListeners[ws.id]) continue; // 이미 등록됨

    const wsRef = napumDb.ref('workspaces/' + ws.id);
    // 클라이언트 캐시 (주문 처리에 필요)
    let _napumClientsCache = {};

    const clientsCb = snap => {
      _napumClientsCache = snap.val() || {};
    };
    const clientsRef = wsRef.child('clients');
    clientsRef.on('value', clientsCb, e => console.warn('납품 clients 리스너:', e));

    const ordersCb = snap => {
      const orders = snap.val() || {};
      _processNapumOrdersSnapshot(ws, orders, _napumClientsCache);
    };
    const ordersRef = wsRef.child('orders');
    ordersRef.on('value', ordersCb, e => console.warn('납품 orders 리스너:', e));

    _napumListeners[ws.id] = { clientsRef, clientsCb, ordersRef, ordersCb };
    console.info('[납품 실시간] 리스너 등록:', ws.label, ws.id);
  }
}

function detachNapumListeners(){
  for(const wsId of Object.keys(_napumListeners)){
    const h = _napumListeners[wsId];
    if(h.clientsRef) h.clientsRef.off('value', h.clientsCb);
    if(h.ordersRef)  h.ordersRef.off('value',  h.ordersCb);
    delete _napumListeners[wsId];
  }
}

// 납품앱 orders 스냅샷을 받아 CRM에 반영
function _processNapumOrdersSnapshot(ws, ordersObj, napumClientsObj){
  const orders = Object.values(ordersObj);
  const napumClients = Object.values(napumClientsObj);

  const nameToId = {};
  S.clients.forEach(c => { nameToId[c.name] = c.id; });

  const napumIdToCrmId = {};
  S.transactions.forEach(t => { if(t._napumId) napumIdToCrmId[t._napumId] = t.id; });

  const synced = new Set(lsGet('crm_napum_synced', []));

  let changed = false;

  // 거래처 자동 추가 + 기존 거래처 phone/address 업데이트
  napumClients.forEach(nc => {
    if(!nc.name || nc.isHidden) return;
    if(!nameToId[nc.name]){
      // 신규 생성: 납품앱 필드 그대로 반영
      const newC = {
        id: nextId(S.clients),
        name: nc.name, bizNo:'', rep:'', email:'',
        phone: nc.phone || '',
        address: nc.address || '',
        type:'매출처',
        memo:`[${ws.label}]${nc.note?' '+nc.note:''}`
      };
      S.clients = [...S.clients, newC];
      nameToId[nc.name] = newC.id;
      changed = true;
    } else {
      // 기존 거래처: phone/address가 납품앱에 있으면 업데이트
      const cid = nameToId[nc.name];
      S.clients = S.clients.map(c => {
        if(c.id !== cid) return c;
        const prev = JSON.stringify(c);
        const next = {...c};
        if(nc.phone   && !c.phone)   next.phone   = nc.phone;
        if(nc.address && !c.address) next.address = nc.address;
        if(JSON.stringify(next) !== prev){ changed = true; return next; }
        return c;
      });
    }
  });

  // ── 납품앱에서 삭제된 주문 → CRM 전표도 삭제 ──────────────────────────────
  // 현재 스냅샷에 있는 napumKey 집합
  const snapshotKeys = new Set(
    orders
      .filter(o => o.date && o.total)
      .map(o => `${ws.id}:${o.id}`)
  );
  // 안전장치: 스냅샷이 완전히 비어있으면(네트워크 오류 가능성) 삭제 스킵
  const wsHasCrmTx = S.transactions.some(t => t._napumId && t._napumId.startsWith(`${ws.id}:`));
  // 이 워크스페이스(_napumId가 ws.id:로 시작)에 속한 CRM 전표 중
  // 스냅샷에 없는 것 = 납품앱에서 삭제된 것
  const deletedIds = (orders.length > 0 || !wsHasCrmTx) ? S.transactions
    .filter(t => t._napumId && t._napumId.startsWith(`${ws.id}:`) && !snapshotKeys.has(t._napumId))
    .map(t => t.id) : [];
  if(deletedIds.length > 0){
    S.transactions = S.transactions.filter(t => !deletedIds.includes(t.id));
    // synced 캐시에서도 제거
    deletedIds.forEach(id => {
      const napumId = [...synced].find(k => napumIdToCrmId[k] === id);
      if(napumId) synced.delete(napumId);
    });
    console.info(`[납품 삭제 동기화] ${ws.label}: ${deletedIds.length}건 CRM에서 제거`);
    changed = true;
  }

  // 주문 처리
  orders.forEach(o => {
    // isVoid = 타인거래 (취소 아님) → 수금 처리 가능하므로 CRM에도 포함
    if(!o.date) return;
    if(!o.total) return; // 금액 없는 거래는 스킵

    const napumClient = napumClients.find(c => String(c.id) === String(o.clientId));
    const crmName = o.clientName || (napumClient?.name || '');
    const crmClientId = nameToId[crmName];
    if(!crmClientId) return;

    const memoItems = (o.items||[]).map(i=>`${i.name}${i.qty>1?` ×${i.qty}`:''}`).join(', ');
    const memo = `[${ws.label}]${o.isVoid?' [타인]':''} ${o.note||(memoItems||'납품')}`;
    // discount(할인 완납): 실제 금액 = total - discount
    const amount = Number(o.total) - (Number(o.discount)||0) || 0;
    const tax = 0;
    const status = o.isPaid ? '수금완료' : '미수금';
    const napumKey = `${ws.id}:${o.id}`;

    if(napumIdToCrmId[napumKey]){
      // 기존 전표 업데이트
      S.transactions = S.transactions.map(t => {
        if(t.id !== napumIdToCrmId[napumKey]) return t;
        const prev = JSON.stringify(t);
        // 타이밍 경쟁 방지: CRM에서 최근 수금 처리한 경우 납품앱 값으로 덮어쓰지 않음
        // CRM paidAt이 납품앱 updatedAt보다 나중이면 수금 정보는 CRM 우선
        const crmPaidAt = t.paidAt ? new Date(t.paidAt).getTime() : 0;
        const napumUpdAt = o.updatedAt ? new Date(o.updatedAt).getTime() : 0;
        const crmIsNewer = crmPaidAt > 0 && crmPaidAt > napumUpdAt;
        const next = {...t, amount, tax, memo};
        if(crmIsNewer){
          // CRM 수금 정보 유지, 납품 status만 참고
          next.status = t.status; // CRM 상태 유지
        } else {
          next.status = status;
          if(o.paidAmount) next.paidAmount = o.paidAmount; else delete next.paidAmount;
          if(o.paidAt)     next.paidAt = o.paidAt;
          if(o.paidMethod) next.paidMethod = o.paidMethod;
          if(o.paidMethodDetail) next.paidMethodDetail = o.paidMethodDetail;
          else delete next.paidMethodDetail;
        }
        if(JSON.stringify(next) !== prev) changed = true;
        return next;
      });
    } else {
      // synced에 있어도 실제 전표가 없으면 재생성 (타인거래 누락 방지)
      const alreadyExists = S.transactions.some(t => t._napumId === napumKey);
      if(!alreadyExists){
        const newT = {
          id: nextId(S.transactions),
          date: o.date, clientId: crmClientId,
          type:'매출', amount, tax, memo, status,
          _napumId: napumKey
        };
        if(o.paidAmount) newT.paidAmount = o.paidAmount;
        if(o.paidAt)     newT.paidAt = o.paidAt;
        if(o.paidMethod) newT.paidMethod = o.paidMethod;
        if(o.paidMethodDetail) newT.paidMethodDetail = o.paidMethodDetail;
        S.transactions = [...S.transactions, newT];
        synced.add(napumKey);
        changed = true;
      }
    }
  });

  if(changed){
    lsSet('crm_clients', S.clients);
    lsSet('crm_tx', S.transactions);
    lsSet('crm_napum_synced', [...synced]);
    (async()=>{ await saveC(); await saveTX(); })(); // ③fix: 직렬화
    render();
    showToast('📦 납품 관리에서 업데이트됨');
  }
}

async function _uploadAll(){
  if(!db)return;
  await Promise.all([
    db.ref('clients').set(toMap(S.clients)),
    db.ref('transactions').set(toMap(S.transactions)),
  ]);
}

async function _saveOneTx(obj){
  lsSet('crm_tx',S.transactions);
  if(!db)return;
  try{ await db.ref('transactions/'+obj.id).set(obj); }
  catch(e){ showToast('⚠️ 클라우드 저장 실패 (로컬 저장됨)'); console.warn('_saveOneTx:',e); }
}
async function _deleteOneClient(id){
  lsSet('crm_clients',S.clients);
  if(!db)return;
  try{ await db.ref('clients/'+id).remove(); }
  catch(e){ console.warn('_deleteOneClient:',e); }
}
async function _deleteOneTx(id){
  lsSet('crm_tx',S.transactions);
  if(!db)return;
  try{ await db.ref('transactions/'+id).remove(); }
  catch(e){ console.warn('_deleteOneTx:',e); }
}
async function _deleteDoc(col,id){
  if(!db)return;
  try{ await db.ref(`${col}/${id}`).remove(); }
  catch(e){ console.warn('_deleteDoc:',e); }
}
// ── CRUD ──────────────────────────────────────────────────────────────────────
function saveClient(f){
  if(f.id){ S.clients=S.clients.map(c=>c.id===f.id?f:c); _saveOneClient(f); }
  else{ const nf={...f,id:nextId(S.clients)}; S.clients=[...S.clients,nf]; _saveOneClient(nf); }
  lsSet('crm_clients',S.clients);
  M.clientModal=null;render();
}
function deleteClient(id){
  S.transactions.filter(t=>t.clientId===id).forEach(t=>_deleteOneTx(t.id));
  _deleteOneClient(id);
  S.clients=S.clients.filter(c=>c.id!==id);
  S.transactions=S.transactions.filter(t=>t.clientId!==id);
  lsSet('crm_clients',S.clients); lsSet('crm_tx',S.transactions);
  if(S.cExpanded===id)S.cExpanded=null;
  M.confirm=null;render();
}
function saveTxFn(f){
  if(f.id){ S.transactions=S.transactions.map(t=>t.id===f.id?f:t); _saveOneTx(f); }
  else{ const nf={...f,id:nextId(S.transactions)}; S.transactions=[...S.transactions,nf]; _saveOneTx(nf); }
  lsSet('crm_tx',S.transactions);
  M.txModal=null;render();
}
function deleteTxFn(id){
  _deleteOneTx(id);
  S.transactions=S.transactions.filter(t=>t.id!==id);
  lsSet('crm_tx',S.transactions);
  M.confirm=null;render();
}
function toggleStatus(txId){
  const next={미수금:'수금완료',수금완료:'미수금',미지급금:'지급완료',지급완료:'미지급금'};
  let updatedTx=null;
  S.transactions=S.transactions.map(t=>{
    if(t.id!==txId) return t;
    const newStatus=next[t.status]||t.status;
    const isFull=newStatus==='수금완료'||newStatus==='지급완료';
    const isPending=newStatus==='미수금'||newStatus==='미지급금';
    const u={...t,status:newStatus};
    if(isFull&&!u.paidAmount){
      // 미수금→수금완료: paidAmount가 없으면 전액 세팅
      u.paidAmount=t.amount+t.tax;
      u.paidAt=new Date().toISOString();
      u.paidMethod=u.paidMethod||'cash';
    } else if(isPending){
      // 수금완료→미수금 롤백: 수금 기록 초기화
      delete u.paidAmount;
      delete u.paidAt;
      delete u.paidMethod;
      delete u.paidMethodDetail;
    }
    updatedTx=u;
    return u;
  });
  if(updatedTx) _saveOneTx(updatedTx); else saveTX(); // ⑧fix: 단건 저장
  lsSet('crm_tx',S.transactions);
  render();
  // 납품 관리 역방향 패치
  if(updatedTx&&updatedTx._napumId){
    setTimeout(()=>{
      _patchNapumOrder(updatedTx._napumId,_buildNapumPatch(updatedTx))
        .then(ok=>showToast(ok?'📦 납품 관리에도 반영됨':'⚠️ 납품 관리 반영 실패 (로그 확인)'))
        .catch(()=>showToast('⚠️ 납품 관리 반영 실패'));
    },800);
  }
}
function completeStatus(txId,status){
  let updatedTx=null;
  S.transactions=S.transactions.map(t=>{
    if(t.id!==txId) return t;
    const isFull=status==='수금완료'||status==='지급완료';
    const u={...t,status};
    if(isFull&&!u.paidAmount){
      u.paidAmount=t.amount+t.tax;
      u.paidAt=new Date().toISOString();
      u.paidMethod=u.paidMethod||'cash';
    }
    updatedTx=u;
    return u;
  });
  if(updatedTx) _saveOneTx(updatedTx); else saveTX(); // ⑧fix: 단건 저장
  lsSet('crm_tx',S.transactions);
  render();
  // 납품 관리 역방향 패치
  if(updatedTx&&updatedTx._napumId){
    setTimeout(()=>{
      _patchNapumOrder(updatedTx._napumId,_buildNapumPatch(updatedTx))
        .then(ok=>showToast(ok?'📦 납품 관리에도 반영됨':'⚠️ 납품 관리 반영 실패 (로그 확인)'))
        .catch(()=>showToast('⚠️ 납품 관리 반영 실패'));
    },800);
  }
}

// 대시보드 캐시 (데이터/월 변경 시에만 재계산)
let _dashCache = null;
let _dashCacheKey = '';
function _dashKey(){ return S.txMonth + '|' + S.transactions.length + '|' + S.clients.length + '|' + S.transactions.map(t=>t.id+'_'+t.status+'_'+(t.paidAmount||0)+'_'+t.amount).join(','); }
function buildDashboard(){
  const ck = _dashKey();
  if(_dashCache && _dashCacheKey === ck) return _dashCache;
  _dashCacheKey = ck;
  const mon=S.txMonth;
  const cur=thisMonth();
  const canNext=mon<cur;
  const monT=S.transactions.filter(t=>t.date.startsWith(mon));
  const rev=monT.filter(t=>t.type==='매출').reduce((s,t)=>s+t.amount,0);
  const pur=monT.filter(t=>t.type==='매입').reduce((s,t)=>s+t.amount,0);
  const pl=rev-pur;
  // 전월 데이터 (증감률용)
  const prevMon=prevMonth(mon);
  const prevMonT=S.transactions.filter(t=>t.date.startsWith(prevMon));
  const prevRev=prevMonT.filter(t=>t.type==='매출').reduce((s,t)=>s+t.amount,0);
  const prevPur=prevMonT.filter(t=>t.type==='매입').reduce((s,t)=>s+t.amount,0);
  const prevPl=prevRev-prevPur;
  const _growthBadge=(cur,prev,posColor,negColor)=>{
    if(prev===0&&cur===0) return '';
    if(prev===0) return `<span style="font-size:10px;color:${posColor};font-weight:600;">NEW</span>`;
    const pct=Math.round((cur-prev)/prev*100);
    const up=pct>=0;
    const c=up?posColor:negColor;
    return `<span style="font-size:10px;color:${c};font-weight:600;">${up?'▲':'▼'}${Math.abs(pct)}%</span>`;
  };
  const plColor=pl>=0?'#16a34a':'#dc2626';
  const plBg=pl>=0?'#f0fdf4':'#fff1f2';
  const plBd=pl>=0?'#bbf7d0':'#fecdd3';

  // 미수금/미지급금
  const rcv=S.transactions.filter(t=>t.status==='미수금').reduce((s,t)=>s+_txRemain(t),0);
  const pay=S.transactions.filter(t=>t.status==='미지급금').reduce((s,t)=>s+_txRemain(t),0);

  // 수금률 (이달 매출 기준)
  const monRev=monT.filter(t=>t.type==='매출');
  const totalBill=monRev.reduce((s,t)=>s+t.amount+t.tax,0);
  const totalPaid=monRev.reduce((s,t)=>s+(t.paidAmount||0),0);
  const collectRate=totalBill>0?Math.round((totalPaid/totalBill)*100):null;

  // 6개월 추이 데이터 (④fix: 루프마다 new Date() 생성)
  const months6=[];
  for(let i=5;i>=0;i--){
    const _base=new Date();_base.setDate(1);_base.setMonth(_base.getMonth()-i);
    const ym=localDate(_base).slice(0,7);
    const mT=S.transactions.filter(t=>t.date.startsWith(ym));
    months6.push({
      ym, label:_base.toLocaleDateString('ko-KR',{month:'short'}),

      pur:mT.filter(t=>t.type==='매입').reduce((s,t)=>s+t.amount,0),
    });
  }
  const maxBar=Math.max(...months6.map(m=>Math.max(m.rev,m.pur)),1);

  // 이달 매출 상위 거래처 TOP5
  const clientRev={};
  monT.filter(t=>t.type==='매출').forEach(t=>{clientRev[t.clientId]=(clientRev[t.clientId]||0)+t.amount;});
  const top=Object.entries(clientRev).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([id,v])=>({c:S.clients.find(x=>x.id===+id),v}));
  const maxV=top[0]?.v||1;

  // 미수금 오래된 순 TOP5
  const oldUnpaid=[...S.transactions]
    .filter(t=>t.status==='미수금')
    .sort((a,b)=>a.date.localeCompare(b.date))
    .slice(0,5);

  // 거래처 현황
  const cAll=S.clients.length;
  const cSell=S.clients.filter(c=>c.type==='매출처').length;
  const cBuy=S.clients.filter(c=>c.type==='매입처').length;
  const cBoth=S.clients.filter(c=>c.type==='매출/매입').length;

  const dateStr=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const monthNav=`<div style="display:flex;align-items:center;gap:6px;">
    <button onclick="setTxMonth('${prevMonth(mon)}')" style="width:28px;height:28px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:15px;color:#64748b;">‹</button>

    </select>
    <button onclick="setTxMonth('${nextMonth(mon)}')" ${canNext?'':'disabled'} style="width:28px;height:28px;border-radius:7px;border:1px solid #e2e8f0;background:${canNext?'#f8fafc':'#f1f5f9'};cursor:${canNext?'pointer':'default'};font-size:15px;color:${canNext?'#64748b':'#cbd5e1'};">›</button>
    ${mon!==cur?`<button onclick="setTxMonth('${cur}')" style="padding:4px 9px;border-radius:7px;border:1px solid #d97706;background:#fef3c7;color:#d97706;font-size:11px;font-weight:600;cursor:pointer;">이번달</button>`:''}
  </div>`;

  // ── 상단 3카드 (매출/매입/손익)
  const topCards=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:14px 12px;">

        </div>

        <div style="color:#86efac;font-size:11px;margin-top:4px;">${monT.filter(t=>t.type==='매출').length}건</div>
      </div>
      <div style="background:#fff1f2;border:1px solid #fecdd3;border-radius:14px;padding:14px 12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="color:#dc2626;font-size:10px;font-weight:600;letter-spacing:.5px;">매입</span>
          ${_growthBadge(pur,prevPur,'#dc2626','#16a34a')}
        </div>
        <div style="color:#dc2626;font-size:17px;font-weight:800;line-height:1.1;">${fmtW(pur)}</div>
        <div style="color:#fca5a5;font-size:11px;margin-top:4px;">${monT.filter(t=>t.type==='매입').length}건</div>
      </div>
      <div style="background:${plBg};border:1px solid ${plBd};border-radius:14px;padding:14px 12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="color:${plColor};font-size:10px;font-weight:600;letter-spacing:.5px;">손익</span>

      </div>
    </div>`;

  // ── 미수금/미지급금/수금률 카드
  const midCards=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <div onclick="setView('receivables')" style="background:#fefce8;border:1px solid #fef08a;border-radius:14px;padding:14px 12px;cursor:pointer;">
        <div style="color:#b45309;font-size:10px;font-weight:600;letter-spacing:.5px;margin-bottom:6px;">미수금</div>
        <div style="color:#b45309;font-size:17px;font-weight:800;line-height:1.1;">${fmtW(rcv)}</div>
        <div style="color:#fcd34d;font-size:11px;margin-top:4px;">전체 누적</div>
      </div>
      <div onclick="setView('receivables')" style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:14px 12px;cursor:pointer;">
        <div style="color:#1d4ed8;font-size:10px;font-weight:600;letter-spacing:.5px;margin-bottom:6px;">미지급금</div>
        <div style="color:#1d4ed8;font-size:17px;font-weight:800;line-height:1.1;">${fmtW(pay)}</div>
        <div style="color:#93c5fd;font-size:11px;margin-top:4px;">전체 누적</div>
      </div>
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:14px 12px;">
        <div style="color:#475569;font-size:10px;font-weight:600;letter-spacing:.5px;margin-bottom:6px;">수금률</div>
        <div style="color:#0f172a;font-size:17px;font-weight:800;line-height:1.1;">${collectRate!==null?collectRate+'%':'—'}</div>
        <div style="color:#94a3b8;font-size:11px;margin-top:4px;">이달 기준</div>
      </div>
    </div>`;

  // ── 6개월 추이 막대 그래프
  const barH=56;
  const barCols=months6.map(m=>{
    const rH=Math.round((m.rev/maxBar)*barH);
    const pH=Math.round((m.pur/maxBar)*barH);

  const chartSection=`

          <span style="display:flex;align-items:center;gap:3px;font-size:10px;color:#64748b;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#16a34a;"></span>매출</span>
          <span style="display:flex;align-items:center;gap:3px;font-size:10px;color:#64748b;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#dc2626;"></span>매입</span>
        </div>

  // ── TOP5 매출 거래처
  const topRows=top.length?top.map(({c,v},i)=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc;">
      <div style="width:20px;height:20px;border-radius:50%;background:${i===0?'#fbbf24':i===1?'#94a3b8':i===2?'#b45309':'#e2e8f0'};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${i<3?'#fff':'#94a3b8'};flex-shrink:0;">${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div style="color:#0f172a;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c?.name||'?')}</div>
        <div style="height:4px;background:#f1f5f9;border-radius:2px;margin-top:4px;"><div style="height:100%;background:#16a34a;border-radius:2px;width:${Math.round((v/maxV)*100)}%;opacity:.7;"></div></div>
      </div>
      <div style="color:#16a34a;font-size:12px;font-weight:700;flex-shrink:0;">${fmtW(v)}</div>
    </div>`).join('')
    :'<div style="color:#94a3b8;font-size:12px;text-align:center;padding:16px 0;">이달 매출 없음</div>';

  // ── 미수금 오래된 순 TOP5
  const unpaidRows=oldUnpaid.length?oldUnpaid.map(tx=>{
    const cl=S.clients.find(c=>c.id===tx.clientId);
    const remain=_txRemain(tx);
    const daysAgo=Math.floor((Date.now()-new Date(tx.date))/(86400000));
    const urgColor=daysAgo>=60?'#dc2626':daysAgo>=30?'#b45309':'#64748b';
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f8fafc;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:5px;">
            <span style="color:#0f172a;font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(cl?.name||'?')}</span>
            <span style="color:${urgColor};font-size:10px;font-weight:600;flex-shrink:0;">${daysAgo}일 경과</span>
          </div>
          <div style="color:#94a3b8;font-size:10px;margin-top:1px;">${esc(tx.date)} · ${esc(tx.memo||'-').slice(0,20)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="color:#b45309;font-size:12px;font-weight:700;">${fmtW(remain)}</div>
        </div>
      </div>`;
  }).join('')
    :'<div style="color:#94a3b8;font-size:12px;text-align:center;padding:16px 0;">미수금 없음 🎉</div>';

  // ── 거래처 현황
  const clientSection=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
      ${[
        {label:'전체',val:cAll,color:'#334155',bg:'#f8fafc',bd:'#e2e8f0'},
        {label:'매출처',val:cSell,color:'#16a34a',bg:'#f0fdf4',bd:'#bbf7d0'},
        {label:'매입처',val:cBuy,color:'#1d4ed8',bg:'#eff6ff',bd:'#bfdbfe'},
        {label:'매출/매입',val:cBoth,color:'#b45309',bg:'#fefce8',bd:'#fef08a'},
      ].map(({label,val,color,bg,bd})=>`
        <div style="background:${bg};border:1px solid ${bd};border-radius:10px;padding:10px 6px;text-align:center;">

          <h1 class="page-title" style="color:#0f172a;font-size:20px;font-weight:700;">대시보드</h1>

        ${monthNav}

      <!-- 미수금/미지급금/수금률 -->

// ── CLIENTS VIEW ──────────────────────────────────────────────────────────────
function buildClients(){
  // 워크스페이스 목록 (거래처 그룹 정렬용)
  const workspaces = _getWorkspaces(); // [{id, label}, ...]

  // 거래처에 연결된 워크스페이스 ID 추출 (첫 번째 납품 거래의 _napumId wsId)
  function clientWsId(clientId){
    const tx = S.transactions.find(t => t.clientId === clientId && t._napumId);
    if(!tx) return null;
    const sep = tx._napumId.lastIndexOf(':');
    return sep > -1 ? tx._napumId.slice(0, sep) : null;
  }

  // 워크스페이스 순서 맵 (wsId → 인덱스)
  const wsOrder = {};
  workspaces.forEach((w, i) => { wsOrder[w.id] = i; });

  // WS 필터 적용 후 타입 필터 + 검색 필터
  const filtered = S.clients.filter(c => {
    // WS 필터
    const wsId = clientWsId(c.id);
    const wsOk = S.cWsFilter === '전체'
      || (S.cWsFilter === '__direct__' && wsId === null)
      || wsId === S.cWsFilter;
    return wsOk
      && (S.cFilter === '전체' || c.type === S.cFilter)
      && matchAny(S.cSearch, c.name, c.bizNo, c.rep, c.phone, c.memo);
  });

  // 워크스페이스 ID별 정렬: 등록된 WS 순 → 직접등록(WS없음) 마지막
  filtered.sort((a, b) => {
    const wa = clientWsId(a.id);
    const wb = clientWsId(b.id);
    const ia = wa !== null && wsOrder[wa] !== undefined ? wsOrder[wa] : 9999;
    const ib = wb !== null && wsOrder[wb] !== undefined ? wsOrder[wb] : 9999;
    if(ia !== ib) return ia - ib;
    return a.name.localeCompare(b.name, 'ko');
  });

  const clientStats = id => {
    const txs = S.transactions.filter(t => t.clientId === id);
    const unpaid = txs.filter(t => t.status === '미수금').reduce((s,t) => s + _txRemain(t), 0);
    const unpaidPay = txs.filter(t => t.status === '미지급금').reduce((s,t) => s + _txRemain(t), 0);
    return { txs, unpaid, unpaidPay };
  };

  // 타입 필터 버튼
  const filterBtns = ['전체','매출처','매입처','매출/매입'].map(t => {
    const a = S.cFilter === t;
    return `<button onclick="setCFilter('${t}')" style="padding:7px 11px;border-radius:8px;font-size:12px;font-weight:${a?700:400};background:${a?'#d97706':'#f8fafc'};color:${a?'#fff':'#64748b'};border:1px solid ${a?'#d97706':'#e2e8f0'};cursor:pointer;">${esc(t)}</button>`;
  }).join('');

  // WS 필터 버튼 (WS가 1개 이상일 때 표시)
  // 직접 등록 거래처 존재 여부 확인
  const hasDirectClients = S.clients.some(c => clientWsId(c.id) === null);
  const wsFilterOptions = [
    {id:'전체', label:'전체'},
    ...workspaces.map(w => ({id: w.id, label: w.label || w.id})),
    ...(hasDirectClients ? [{id:'__direct__', label:'직접 등록'}] : []),
  ];
  const wsBtns = workspaces.length >= 1
    ? wsFilterOptions.map(opt => {
        const a = S.cWsFilter === opt.id;
        const icon = opt.id === '전체' ? '' : opt.id === '__direct__' ? '✏️ ' : '📦 ';
        return `<button onclick="setCWsFilter('${opt.id}')"
          style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:${a?700:500};
          background:${a?'#0f172a':'#f8fafc'};color:${a?'#fff':'#64748b'};
          border:1px solid ${a?'#0f172a':'#e2e8f0'};cursor:pointer;white-space:nowrap;">
          ${icon}${esc(opt.label)}</button>`;
      }).join('')
    : '';

  // 워크스페이스 그룹 헤더 렌더링용
  let lastWsGroup = undefined; // undefined = 초기화 전
  const rows = filtered.map(c => {
    const s = clientStats(c.id);
    const open = S.cExpanded === c.id;
    const tc = c.type==='매출처'?'#16a34a':c.type==='매입처'?'#1d4ed8':'#b45309';
    const wsId = clientWsId(c.id);
    const wsLabel = wsId && wsOrder[wsId] !== undefined
      ? (workspaces.find(w => w.id === wsId)?.label || wsId)
      : '직접 등록';

    // 그룹 헤더 (워크스페이스가 바뀔 때마다 표시)
    let groupHeader = '';
    if(wsLabel !== lastWsGroup){
      lastWsGroup = wsLabel;
      const headerColor = wsId ? '#b45309' : '#94a3b8';
      const headerBg = wsId ? '#fefce8' : '#f8fafc';
      const headerBd = wsId ? '#fef08a' : '#e2e8f0';
      groupHeader = `
        <div style="padding:6px 14px;background:${headerBg};border-bottom:1px solid ${headerBd};border-top:1px solid ${headerBd};">
          <span style="font-size:11px;font-weight:700;color:${headerColor};">📦 ${esc(wsLabel)}</span>
        </div>`;
    }

    let expHtml = '';
    if(open){
      // 거래처 기본 정보만 표시 (거래 이력 제외)
      const info = [['사업자번호',c.bizNo],['대표자',c.rep],['전화',c.phone],['이메일',c.email],['주소',c.address],['메모',c.memo]]
        .filter(([,v]) => v)
        .map(([k,v]) => `<div style="display:flex;gap:8px;"><span style="color:#94a3b8;min-width:60px;font-size:12px;">${esc(k)}</span><span style="color:#334155;font-size:12px;word-break:break-all;">${esc(v)}</span></div>`)
        .join('');
      expHtml = `
        <div style="background:#fafafa;border-bottom:1px solid #e2e8f0;padding:14px;">
          ${info
            ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;">${info}</div>`
            : `<div style="color:#94a3b8;font-size:12px;text-align:center;padding:8px 0;">등록된 정보가 없습니다.</div>`}
        </div>`;
    }

    const unpaidBadge = s.unpaid > 0
      ? `<span style="font-size:11px;font-weight:700;color:#b45309;">${fmtW(s.unpaid)}</span>`
      : `<span style="font-size:11px;color:#94a3b8;">—</span>`;

    return `
      ${groupHeader}
      <div>
        <div onclick="toggleExpand(${c.id})" class="hover-row" style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;gap:8px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:5px;">
              <span style="color:${open?'#d97706':'#0f172a'};font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.name)}</span>
              <span style="color:#94a3b8;flex-shrink:0;">${open ? I.chevD : I.chevR}</span>
            </div>
            <div style="color:#94a3b8;font-size:11px;margin-top:1px;">
              <span style="font-size:10px;font-weight:600;color:${tc};">${esc(c.type)}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;">${unpaidBadge}</div>
          <div style="width:52px;display:flex;justify-content:center;gap:8px;flex-shrink:0;" onclick="event.stopPropagation()">
            <button onclick="editClient(${c.id})" style="color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseenter="this.style.color='#d97706'" onmouseleave="this.style.color='#94a3b8'">${I.edit}</button>
            <button onclick="confirmDelClient(${c.id})" style="color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseenter="this.style.color='#dc2626'" onmouseleave="this.style.color='#94a3b8'">${I.trash}</button>
          </div>
        </div>
        ${expHtml}
      </div>`;
  }).join('');

  return `
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <div>
          <h1 class="page-title" style="color:#0f172a;font-size:20px;font-weight:700;">거래처 관리</h1>
          <p style="color:#64748b;font-size:12px;margin-top:2px;">총 ${S.clients.length}개</p>
        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="openResetModal()" style="display:flex;align-items:center;gap:5px;background:#fff1f2;color:#dc2626;border:1px solid #fecdd3;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;">🗑 초기화</button>
          <button onclick="openClientModal('add')" style="display:flex;align-items:center;gap:5px;background:#d97706;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;">${I.plus} <span class="hide-sm">거래처</span> 추가</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <div style="position:relative;flex:1;min-width:160px;">
          <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;">${I.search}</span>
          <input id="cSearchInput" value="${esc(S.cSearch)}" oninput="setCSearch(this.value)" onkeydown="if(event.key==='Enter'||event.keyCode===13){this.blur();}" enterkeyhint="search" placeholder="검색… (초성 가능)" style="${ISX}padding-left:30px;" ${FB}>
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">${filterBtns}</div>
      </div>
      ${wsBtns ? `<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:11px;color:#94a3b8;white-space:nowrap;flex-shrink:0;">거래처:</span>
        ${wsBtns}
      </div>` : ''}
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
        <div style="display:flex;padding:9px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;gap:8px;">
          <span style="flex:1;color:#94a3b8;font-size:11px;font-weight:500;">거래처명</span>
          <span style="color:#94a3b8;font-size:11px;text-align:right;">미수금</span>
          <span style="width:52px;color:#94a3b8;font-size:11px;text-align:center;">관리</span>
        </div>
        <div id="cListRows">${filtered.length === 0 ? '<div style="padding:40px 0;text-align:center;color:#94a3b8;font-size:13px;">거래처가 없습니다.</div>' : rows}</div>
      </div>
    </div>`;
}

// ── TRANSACTIONS VIEW ─────────────────────────────────────────────────────────
function buildTransactions(){
  // ── 기간 필터 계산
  const mode=S.txPeriodMode||'monthly';
  if(!S.txWeek) S.txWeek=_weekOf(localDate());

  const dateOk = t => {
    if(mode==='all')     return true;
    if(mode==='monthly') return S.txMonth==='전체'||t.date.startsWith(S.txMonth);
    if(mode==='daily')   return t.date===S.txDate;
    if(mode==='weekly')  return _inWeek(t.date,S.txWeek);
    return true;
  };

  // 워크스페이스 순서 맵
  const _txWsWorkspaces = _getWorkspaces();
  _cachedWsCount = _txWsWorkspaces.length; // _buildTxRow 캐시 갱신
  const _txWsOrder = {};
  _txWsWorkspaces.forEach((w, i) => { _txWsOrder[w.id] = i; });

  // 거래(tx) 자체의 _napumId에서 wsId를 추출해 순서 반환
  // clientId 기반이 아닌 tx 기반으로 판단해야 같은 이름의 거래처가 다른 WS에 등록된 경우도 정확히 처리
  function _txWsIdx(tx){
    if(!tx._napumId) return 9999;
    const sep = tx._napumId.lastIndexOf(':');
    const wsId = sep > -1 ? tx._napumId.slice(0, sep) : null;
    return (wsId !== null && _txWsOrder[wsId] !== undefined) ? _txWsOrder[wsId] : 9998;
  }
  // 거래처명 캐시 (매 정렬마다 find 반복 방지)
  const _clientNameCache = {};
  S.clients.forEach(c => { _clientNameCache[c.id] = c.name || ''; });

  function _txSortKey(tx){
    return [
      tx.date,                          // 날짜 (내림차순이므로 비교 시 반전)
      _txWsIdx(tx),                     // WS 등록 순
      _clientNameCache[tx.clientId]||'',// 거래처명 가나다
      tx.id,                            // 동일 거래처 내 등록순
    ];
  }

  const filtered=[...S.transactions].filter(t=>{
    const cl=S.clients.find(c=>c.id===t.clientId);
    // WS 필터: '전체'가 아니면 해당 wsId의 거래만
    const wsOk = S.txWsFilter==='전체' || _txWsIdx(t) === _txWsOrder[S.txWsFilter];
    return wsOk
      &&dateOk(t)
      &&(S.txTf==='전체'||t.type===S.txTf)
      &&(S.txSf==='전체'||t.status===S.txSf)
      &&matchAny(S.txSearch,cl?.name,t.memo);
  }).sort((a,b)=>{
    // 1. 날짜 내림차순
    const dateCmp = b.date.localeCompare(a.date);
    if(dateCmp !== 0) return dateCmp;
    // 2. 같은 날짜: WS 등록 순
    const wsCmp = _txWsIdx(a) - _txWsIdx(b);
    if(wsCmp !== 0) return wsCmp;
    // 3. 같은 WS: 거래처명 가나다
    const nameCmp = (_clientNameCache[a.clientId]||'').localeCompare(_clientNameCache[b.clientId]||'','ko');
    if(nameCmp !== 0) return nameCmp;
    // 4. 동일 거래처: 거래 id 오름차순 (등록순)
    return a.id - b.id;
  });

  const sumRev=filtered.filter(t=>t.type==='매출').reduce((s,t)=>s+t.amount,0);
  const sumPur=filtered.filter(t=>t.type==='매입').reduce((s,t)=>s+t.amount,0);
  const plColor=sumRev-sumPur>=0?'#16a34a':'#dc2626';

  // ── 기간 모드 탭
  const modeTabs=[
    {k:'daily',  label:'일별'},
    {k:'weekly', label:'주별'},
    {k:'monthly',label:'월별'},
    {k:'all',    label:'전체'},
  ].map(({k,label})=>{
    const a=mode===k;
    return '<button onclick="setTxPeriodMode(\''+k+'\')"'+
      ' style="flex:1;padding:7px 0;border-radius:8px;font-size:12px;'+
      'font-weight:'+(a?700:400)+';'+
      'background:'+(a?'#d97706':'#f8fafc')+';'+
      'color:'+(a?'#fff':'#64748b')+';'+
      'border:1px solid '+(a?'#d97706':'#e2e8f0')+';'+
      'cursor:pointer;">'+label+'</button>';
  }).join('');

  // ── 기간 네비게이터
  const today=localDate();
  let navHtml='';
  if(mode==='daily'){
    const isToday=S.txDate===today;
    const canNext=S.txDate<today;
    navHtml='<div style="display:flex;align-items:center;gap:6px;">'+
      '<button onclick="S.txDate=_prevDay(S.txDate);renderContent()" style="width:28px;height:28px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:15px;color:#64748b;">&#8249;</button>'+
      '<input type="date" value="'+S.txDate+'" max="'+today+'" onchange="S.txDate=this.value;renderContent()" style="border:1px solid #e2e8f0;border-radius:8px;padding:4px 8px;font-size:12px;color:#0f172a;background:#fff;cursor:pointer;">'+
      '<button onclick="S.txDate=_nextDay(S.txDate);renderContent()" '+(canNext?'':' disabled')+' style="width:28px;height:28px;border-radius:7px;border:1px solid '+(canNext?'#e2e8f0':'#f1f5f9')+';background:'+(canNext?'#f8fafc':'#f1f5f9')+';cursor:'+(canNext?'pointer':'default')+';font-size:15px;color:'+(canNext?'#64748b':'#cbd5e1')+';">&#8250;</button>'+
      (!isToday?'<button onclick="S.txDate=\''+today+'\';renderContent()" style="padding:4px 9px;border-radius:7px;border:1px solid #d97706;background:#fef3c7;color:#d97706;font-size:11px;font-weight:600;cursor:pointer;">오늘</button>':'')+
      '</div>';
  } else if(mode==='weekly'){
    const curWeek=_weekOf(today);
    const isThisWeek=S.txWeek===curWeek;
    const canNext=S.txWeek<curWeek;
    navHtml='<div style="display:flex;align-items:center;gap:6px;">'+
      '<button onclick="S.txWeek=_prevWeek(S.txWeek);renderContent()" style="width:28px;height:28px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:15px;color:#64748b;">&#8249;</button>'+
      '<span style="border:1px solid #e2e8f0;border-radius:8px;padding:4px 10px;font-size:12px;color:#0f172a;background:#fff;white-space:nowrap;">'+_fmtWeek(S.txWeek)+'</span>'+
      '<button onclick="S.txWeek=_nextWeek(S.txWeek);renderContent()" '+(canNext?'':' disabled')+' style="width:28px;height:28px;border-radius:7px;border:1px solid '+(canNext?'#e2e8f0':'#f1f5f9')+';background:'+(canNext?'#f8fafc':'#f1f5f9')+';cursor:'+(canNext?'pointer':'default')+';font-size:15px;color:'+(canNext?'#64748b':'#cbd5e1')+';">&#8250;</button>'+
      (!isThisWeek?'<button onclick="S.txWeek=\''+curWeek+'\';renderContent()" style="padding:4px 9px;border-radius:7px;border:1px solid #d97706;background:#fef3c7;color:#d97706;font-size:11px;font-weight:600;cursor:pointer;">이번주</button>':'')+
      '</div>';
  } else if(mode==='monthly'){
    if(S.txMonth==='전체') S.txMonth=thisMonth();
    const mon=S.txMonth;
    const cur=thisMonth();
    const canNext=mon<cur;
    navHtml='<div style="display:flex;align-items:center;gap:6px;">'+
      '<button onclick="setTxMonth(\''+prevMonth(mon)+'\')"'+' style="width:28px;height:28px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;cursor:pointer;font-size:15px;color:#64748b;">&#8249;</button>'+
      '<select onchange="setTxMonth(this.value)" style="border:1px solid #e2e8f0;border-radius:8px;padding:4px 8px;font-size:12px;color:#0f172a;background:#fff;cursor:pointer;">'+
      monthOptions().map(m=>'<option value="'+m+'"'+(m===mon?' selected':'')+'>'+fmtMonth(m)+'</option>').join('')+
      '</select>'+
      '<button onclick="setTxMonth(\''+nextMonth(mon)+'\')"'+' '+(canNext?'':' disabled')+' style="width:28px;height:28px;border-radius:7px;border:1px solid '+(canNext?'#e2e8f0':'#f1f5f9')+';background:'+(canNext?'#f8fafc':'#f1f5f9')+';cursor:'+(canNext?'pointer':'default')+';font-size:15px;color:'+(canNext?'#64748b':'#cbd5e1')+';">&#8250;</button>'+
      (mon!==cur?'<button onclick="setTxMonth(\''+cur+'\')"'+' style="padding:4px 9px;border-radius:7px;border:1px solid #d97706;background:#fef3c7;color:#d97706;font-size:11px;font-weight:600;cursor:pointer;">이번달</button>':'')+
      '</div>';
  }

  // ── 기간 레이블
  const periodLabel =
    mode==='daily'   ? _fmtDayFull(S.txDate) :
    mode==='weekly'  ? _fmtWeek(S.txWeek) :
    mode==='monthly' ? fmtMonth(S.txMonth) :
    '전체 기간';

  // ── WS 필터 버튼 (동기화된 워크스페이스가 2개 이상일 때만 표시)
  const _wsList = _txWsWorkspaces; // 이미 buildTransactions 상단에서 선언됨
  const wsBtns = _wsList.length >= 1
    ? ['전체', ..._wsList.map(w=>w.id)].map(wsId=>{
        const a = S.txWsFilter === wsId;
        const label = wsId === '전체' ? '전체' : (_wsList.find(w=>w.id===wsId)?.label || wsId);
        return '<button onclick="setTxWsFilter(\''+wsId+'\')"'+
          ' style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:'+(a?700:500)+';'+
          'background:'+(a?'#0f172a':'#f8fafc')+';color:'+(a?'#fff':'#64748b')+';'+
          'border:1px solid '+(a?'#0f172a':'#e2e8f0')+';cursor:pointer;white-space:nowrap;">'+
          (wsId==='전체'?'전체':'📦 '+esc(label))+'</button>';
      }).join('')
    : '';

  // ── 필터 버튼
  const typeBtns=['전체','매출','매입'].map(t=>{const a=S.txTf===t;return'<button onclick="setTxTf(\''+t+'\')"'+' style="padding:7px 10px;border-radius:8px;font-size:12px;font-weight:'+(a?700:400)+';background:'+(a?'#d97706':'#f8fafc')+';color:'+(a?'#fff':'#64748b')+';border:1px solid '+(a?'#d97706':'#e2e8f0')+';cursor:pointer;">'+t+'</button>';}).join('');
  const stBtns=['전체','미수금','수금완료','미지급금','지급완료'].map(s=>{const a=S.txSf===s;return'<button onclick="setTxSf(\''+s+'\')"'+' style="padding:7px 9px;border-radius:8px;font-size:11px;font-weight:'+(a?700:400)+';background:'+(a?'#d97706':'#f8fafc')+';color:'+(a?'#fff':'#64748b')+';border:1px solid '+(a?'#d97706':'#e2e8f0')+';cursor:pointer;">'+s+'</button>';}).join('');

  const sumCards=[
    {label:'조회 매출',val:fmtW(sumRev),color:'#16a34a',bg:'#f0fdf4',bd:'#bbf7d0'},
    {label:'조회 매입',val:fmtW(sumPur),color:'#dc2626',bg:'#fff1f2',bd:'#fecdd3'},
    {label:'손익',val:fmtW(sumRev-sumPur),color:plColor,bg:'#f8fafc',bd:'#e2e8f0'},
  ].map(({label,val,color,bg,bd})=>
    '<div style="background:'+bg+';border:1px solid '+bd+';border-radius:10px;padding:12px 14px;">'+
    '<div style="color:#64748b;font-size:11px;margin-bottom:4px;">'+label+'</div>'+
    '<div style="color:'+color+';font-size:18px;font-weight:700;">'+val+'</div></div>'
  ).join('');

  // ── 날짜 그룹 헤더 (주별/월별/전체)
  const grouped = mode==='weekly'||mode==='monthly'||mode==='all';
  let rows='';
  if(grouped && filtered.length>0){
    const byDate={};
    filtered.forEach(tx=>{ if(!byDate[tx.date]) byDate[tx.date]=[]; byDate[tx.date].push(tx); });
    Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
      const dayTxs=byDate[date];
      const dayRev=dayTxs.filter(t=>t.type==='매출').reduce((s,t)=>s+t.amount,0);
      const dayPur=dayTxs.filter(t=>t.type==='매입').reduce((s,t)=>s+t.amount,0);
      rows+='<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;border-top:1px solid #e2e8f0;">'+
        '<span style="font-size:11px;font-weight:600;color:#475569;">'+_fmtDayFull(date)+'</span>'+
        '<span style="font-size:11px;color:#64748b;">'+
        (dayRev>0?'<span style="color:#16a34a;">↑'+fmtW(dayRev)+'</span> ':'')+
        (dayPur>0?'<span style="color:#dc2626;">↓'+fmtW(dayPur)+'</span>':'')+
        '</span></div>';
      rows+=dayTxs.slice().sort((a,b)=>{
        const wsCmp = _txWsIdx(a) - _txWsIdx(b);
        if(wsCmp !== 0) return wsCmp;
        const nameCmp = (_clientNameCache[a.clientId]||'').localeCompare(_clientNameCache[b.clientId]||'','ko');
        if(nameCmp !== 0) return nameCmp;
        return a.id - b.id;
      }).map(tx=>_buildTxRow(tx,true)).join('');
    });
  } else {
    rows=filtered.map(tx=>_buildTxRow(tx,false)).join('');
  }

  return '<div style="display:flex;flex-direction:column;gap:14px;">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">'+
      '<div><h1 class="page-title" style="color:#0f172a;font-size:20px;font-weight:700;">거래 내역</h1>'+
      '<p style="color:#64748b;font-size:12px;margin-top:2px;">'+periodLabel+' · '+filtered.length+'건</p></div>'+
      '<div style="display:flex;gap:6px;">'+
        '<button onclick="openTxModal(\'add\')" style="display:flex;align-items:center;gap:5px;background:#d97706;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;">'+I.plus+' 추가</button>'+
        '<button onclick="openScanInput()" style="display:flex;align-items:center;gap:5px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;">'+I.camera+' 스캔</button>'+
      '</div></div>'+
    '<div style="display:flex;gap:4px;background:#f1f5f9;border-radius:10px;padding:3px;">'+modeTabs+'</div>'+
    (navHtml?'<div style="display:flex;align-items:center;">'+navHtml+'</div>':'')+
    '<div class="g3">'+sumCards+'</div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap;">'+
      '<div style="position:relative;flex:1;min-width:140px;">'+
        '<span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;">'+I.search+'</span>'+
        '<input id="txSearchInput" value="'+esc(S.txSearch)+'" oninput="setTxSearch(this.value)" onkeydown="if(event.key===\'Enter\'||event.keyCode===13){this.blur();}" enterkeyhint="search" placeholder="검색… (초성 가능)" style="'+ISX+'padding-left:30px;" '+FB+'>'+
      '</div>'+
      '<div style="display:flex;gap:4px;flex-wrap:wrap;">'+typeBtns+'</div>'+
      '<div style="display:flex;gap:4px;flex-wrap:wrap;">'+stBtns+'</div>'+
    '</div>'+
    (wsBtns?'<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center;">'+
      '<span style="font-size:11px;color:#94a3b8;white-space:nowrap;">거래처:</span>'+wsBtns+
    '</div>':'')+
    '<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">'+
      '<div style="display:flex;padding:9px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;gap:8px;">'+
        (!grouped?'<span class="col-date" style="color:#94a3b8;font-size:11px;font-weight:500;">날짜</span>':'')+
        '<span style="flex:1;color:#94a3b8;font-size:11px;font-weight:500;">거래처</span>'+
        '<span class="col-type" style="color:#94a3b8;font-size:11px;">구분</span>'+
        '<span class="col-amt" style="color:#94a3b8;font-size:11px;">공급가액</span>'+
        '<span class="col-tax hide-sm" style="color:#94a3b8;font-size:11px;">세액</span>'+
        '<span class="col-status" style="color:#94a3b8;font-size:11px;text-align:center;">상태</span>'+
        '<span class="col-actions" style="color:#94a3b8;font-size:11px;">관리</span>'+
      '</div>'+
      (filtered.length===0?'<div id="txListRows" style="padding:40px 0;text-align:center;color:#94a3b8;font-size:13px;">거래 내역이 없습니다.</div>':'<div id="txListRows">'+rows+'</div>')+
    '</div>'+
    '<p style="color:#cbd5e1;font-size:11px;text-align:center;">미수금·미지급금 배지를 클릭하면 결제 처리 모달이 열립니다.</p>'+
  '</div>';
}

// buildTransactions 호출 시 갱신되는 WS 캐시 (행 렌더 시 반복 호출 방지)
let _cachedWsCount = -1;
function _hasWorkspaces(){ return _cachedWsCount > 0; }

function _buildTxRow(tx,hideDate){
  const cl=S.clients.find(c=>c.id===tx.clientId);
  const color=tx.type==='매출'?'#16a34a':'#dc2626';
  const cName=cl?.name||'?';
  const safeAttr=cName.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const canStat=!!(tx._napumId||_hasWorkspaces());
  const clientNameHtml=canStat
    ?'<span class="stat-trigger" data-cn="'+safeAttr+'" style="cursor:pointer;border-bottom:1px dashed #d97706;color:#0f172a;" title="\uD83D\uDCCB \uB0A9\uD488 \uBA85\uC138\uD45C">'+esc(cName)+'</span>'
    :'<span style="color:#0f172a;">'+esc(cName)+'</span>';
  return '<div class="hover-row" style="display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f1f5f9;gap:8px;">'+
    (!hideDate?'<span class="col-date" style="color:#94a3b8;font-size:11px;">'+esc(tx.date)+'</span>':'')+
    '<div style="flex:1;min-width:0;">'+
      '<div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+clientNameHtml+'</div>'+
      '<div style="color:#94a3b8;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(tx.memo||'-')+'</div>'+
    '</div>'+
    '<span class="col-type" style="font-size:11px;font-weight:600;color:'+color+';">'+esc(tx.type)+'</span>'+
    '<span class="col-amt" style="color:'+color+';font-size:12px;font-weight:600;">'+fmtW(tx.amount)+'</span>'+
    '<span class="col-tax hide-sm" style="color:#94a3b8;font-size:11px;">'+fmtW(tx.tax)+'</span>'+
    '<div class="col-status">'+statusBadge(tx.status,tx.id)+'</div>'+
    '<div class="col-actions">'+
      '<button onclick="editTx('+tx.id+')" style="color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseenter="this.style.color=\'#d97706\'" onmouseleave="this.style.color=\'#94a3b8\'">'+I.edit+'</button>'+
      '<button onclick="confirmDelTx('+tx.id+')" style="color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseenter="this.style.color=\'#dc2626\'" onmouseleave="this.style.color=\'#94a3b8\'">'+I.trash+'</button>'+
    '</div></div>';
}

// ── RECEIVABLES VIEW ──────────────────────────────────────────────────────────
function buildReceivables(){
  const rec = S.transactions.filter(t => t.status === '미수금');
  const pay = S.transactions.filter(t => t.status === '미지급금');
  const q = S.rcvSearch || '';

  // 검색어 적용 필터 (거래처명·메모·비고)
  function _filterByQ(items){
    if(!q) return items;
    return items.filter(t=>{
      const cl = S.clients.find(c => c.id === t.clientId);
      return matchAny(q, cl?.name, t.memo, t.bizNo, String(t.clientId));
    });
  }
  const recF = _filterByQ(rec);
  const payF = _filterByQ(pay);
  const totalRec = recF.reduce((s,t) => s + _txRemain(t), 0);
  const totalPay = payF.reduce((s,t) => s + _txRemain(t), 0);

  return `
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div>
          <h1 class="page-title" style="color:#0f172a;font-size:20px;font-weight:700;">채권·채무 관리</h1>
          <p style="color:#64748b;font-size:12px;margin-top:2px;">미수금 및 미지급금 현황</p>
        </div>
      </div>

      <!-- 초성 검색 -->
      <div style="position:relative;">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;">${I.search}</span>
        <input id="rcvSearchInput" value="${esc(q)}" oninput="setRcvSearch(this.value)" onkeydown="if(event.key==='Enter'||event.keyCode===13){this.blur();}" enterkeyhint="search" placeholder="거래처 검색… (초성 가능)" style="${ISX}padding-left:30px;" ${FB}>
      </div>

      <!-- 합계 요약 -->
      <div class="g2">
        <div style="background:#fefce8;border:1px solid #fcd34d;border-radius:12px;padding:16px;">
          <div style="color:#b45309;font-size:12px;margin-bottom:5px;">총 미수금 (받을 돈)</div>
          <div style="color:#b45309;font-size:24px;font-weight:700;">${fmtW(totalRec)}</div>
          <div style="color:#d97706;font-size:11px;margin-top:3px;opacity:.75;">${recF.length}건</div>
        </div>
        <div style="background:#fff1f2;border:1px solid #fecdd3;border-radius:12px;padding:16px;">
          <div style="color:#dc2626;font-size:12px;margin-bottom:5px;">총 미지급금 (줄 돈)</div>
          <div style="color:#dc2626;font-size:24px;font-weight:700;">${fmtW(totalPay)}</div>
          <div style="color:#ef4444;font-size:11px;margin-top:3px;opacity:.75;">${payF.length}건</div>
        </div>
      </div>

      <div id="rcvListArea">
        ${_buildRcvSections()}
      </div>
    </div>`;
}

// 목록 섹션만 재생성 (검색 시 포커스 유지용)
function _buildRcvSections(){
  const rec = S.transactions.filter(t => t.status === '미수금');
  const pay = S.transactions.filter(t => t.status === '미지급금');
  const q = S.rcvSearch || '';

  function groupByClient(items){
    const map = {};
    items.forEach(t => {
      const cl = S.clients.find(c => c.id === t.clientId);
      if(q && !matchAny(q, cl?.name, t.memo, t.bizNo, String(t.clientId))) return;
      const key = t.clientId;
      if(!map[key]) map[key] = { clientId: key, txs: [] };
      map[key].txs.push(t);
    });
    return Object.values(map).sort((a,b) => {
      return b.txs.reduce((s,t)=>s+_txRemain(t),0) - a.txs.reduce((s,t)=>s+_txRemain(t),0);
    });
  }

  function sectionHtml(title, items, color, bg, bd, isSales){
    const groups = groupByClient(items);
    const sectionTotal = fmtW(groups.reduce((s,g)=>s+g.txs.reduce((ss,t)=>ss+_txRemain(t),0),0));
    if(groups.length===0) return `
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:${bg};border-bottom:1px solid ${bd};">
          <h3 style="color:${color};font-weight:600;font-size:14px;">${esc(title)}</h3>
          <span style="color:${color};font-weight:700;">${sectionTotal}</span>
        </div>

// ── AI 영수증 스캔 ─────────────────────────────────────────────────────────────
function openScanInput(){
  // 로컬 파일(file://, content://)에서 실행 중이면 API 호출 불가 → 안내
  const proto=location.protocol;
  if(proto==='file:'||proto==='content:'||proto==='blob:'){
    M.scanModal={state:'localfile',previewUrl:null,base64:null,mediaType:null,result:null,error:null};
    _pushModalHistory();
    renderModals();
    return;
  }
  const input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  input.capture='environment'; // 후면 카메라 우선
  input.style.display='none';
  document.body.appendChild(input);
  input.onchange=async e=>{
    const file=e.target.files[0];
    document.body.removeChild(input);
    if(!file)return;
    // 5MB 제한
    if(file.size>5*1024*1024){showToast('이미지가 너무 큽니다. (최대 5MB)');return;}
    await runScan(file);
  };
  input.click();
}

async function runScan(file){
  // 미리보기 URL
  const previewUrl=URL.createObjectURL(file);
  // base64 변환
  const base64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('read failed'));
    r.readAsDataURL(file);
  });
  const mediaType=file.type||'image/jpeg';

  // 로딩 모달 표시
  M.scanModal={state:'loading',previewUrl,base64,mediaType,result:null,error:null};
  renderModals();

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{
          role:'user',
          content:[
            {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
            {type:'text',text:`이 이미지는 영수증, 세금계산서, 청구서, 거래명세서 등 매입 관련 문서입니다.
이미지를 분석하여 아래 JSON 형식으로만 응답하세요. 마크다운 코드블록 없이 JSON만 출력하세요.

{
  "supplierName": "공급자(판매처) 상호명. 없으면 null",
  "date": "거래일자 YYYY-MM-DD 형식. 없으면 오늘 날짜",
  "amount": "공급가액(세금 제외) 숫자만. 없으면 0",
  "tax": "부가세액 숫자만. 없으면 0",
  "memo": "품목이나 거래내용 요약 (50자 이내)",
  "confidence": "분석 신뢰도 high/medium/low",
  "note": "사용자에게 전달할 참고사항 (한국어, 없으면 null)"
}

규칙:
- amount와 tax는 콤마 없는 정수
- 세금계산서면 공급가액과 세액을 분리
- 영수증(부가세 포함가)이면 amount=총액÷1.1 반올림, tax=총액-amount
- 날짜를 읽기 어려우면 오늘(${localDate()}) 사용
- 문서가 아닌 이미지면 confidence=low, note에 설명`}
          ]
        }]
      })
    });

    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err?.error?.message||`API 오류 ${resp.status}`);
    }

    const data=await resp.json();
    const raw=data.content?.find(b=>b.type==='text')?.text||'{}';
    // JSON 파싱 (마크다운 펜스 제거 방어)
    const clean=raw.replace(/```[a-z]*\n?/g,'').replace(/```/g,'').trim();
    const parsed=JSON.parse(clean);

    M.scanModal={state:'done',previewUrl,base64,mediaType,result:parsed,error:null};
  }catch(err){
    M.scanModal={state:'error',previewUrl,base64,mediaType,result:null,error:err.message||'분석 실패'};
  }
  renderModals();
}

function scUpdateTotal(){
  const amt=parseInt((document.getElementById('sc_amount')?.value||'').replace(/[^0-9]/g,''))||0;
  const tax=parseInt((document.getElementById('sc_tax')?.value||'').replace(/[^0-9]/g,''))||0;
  const el=document.getElementById('scTotal');
  if(!el)return;
  if(amt>0||tax>0){
    el.style.cssText='background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;';
    el.innerHTML=`<span style="color:#1d4ed8;font-size:12px;">합계 금액</span><span style="color:#1d4ed8;font-weight:700;font-size:15px;">${fmtW(amt+tax)}</span>`;
  }else{el.style.cssText='';el.innerHTML='';}
}

async function applyScanResult(){
  const clientId=Number(document.getElementById('sc_clientId')?.value);
  const amtRaw=(document.getElementById('sc_amount')?.value||'').replace(/[^0-9]/g,'');
  const taxRaw=(document.getElementById('sc_tax')?.value||'').replace(/[^0-9]/g,'');
  const dateVal=document.getElementById('sc_date')?.value;
  const memo=document.getElementById('sc_memo')?.value||'';

  if(!clientId){showToast('거래처를 선택하세요.');return;}
  if(!amtRaw){showToast('금액을 입력하세요.');return;}
  if(!dateVal){showToast('거래일자를 확인하세요.');return;}

  const tx={
    date:dateVal,
    clientId,
    type:'매입',
    amount:parseInt(amtRaw)||0,
    tax:parseInt(taxRaw)||0,
    memo,
    status:'미지급금',
    id:nextId(S.transactions)
  };
  S.transactions=[...S.transactions,tx];
  saveTX();
  URL.revokeObjectURL(M.scanModal?.previewUrl);
  M.scanModal=null;
  S.view='transactions';
  render();
  showToast('매입 거래가 추가됐습니다.');
}

function closeScanModal(){
  if(M.scanModal?.previewUrl) URL.revokeObjectURL(M.scanModal.previewUrl);
  M.scanModal=null;
  renderModals();
}

function _getWorkspaces(){ return lsGet('crm_napum_workspaces',[]); }

function syncAddWorkspace(){
  const sm=M.syncModal;
  const id=(sm.newInput||'').trim().toLowerCase();
  const label=(sm.newLabel||'').trim();
  if(!id){showToast('워크스페이스 ID를 입력하세요.');return;}
  const ws=_getWorkspaces();
  if(ws.find(w=>w.id===id)){showToast('이미 등록된 ID입니다.');return;}
  ws.push({id,label:label||id,lastSync:null,syncedCount:0});

  M.syncModal={...sm,newInput:'',newLabel:''};
  renderModals();
  // 새 워크스페이스 실시간 리스너 즉시 등록
  attachNapumListeners().catch(e=>console.warn('납품 리스너 갱신 실패:',e));
}
function syncRemoveWorkspace(id){
  const ws=_getWorkspaces().filter(w=>w.id!==id);

  attachNapumListeners().catch(e=>console.warn('납품 리스너 갱신 실패:',e));
  renderModals();
}

async function doSyncFromDelivery(){
  const sm=M.syncModal;
  const workspaces=_getWorkspaces();
  if(!workspaces.length){showToast('워크스페이스를 먼저 추가하세요.');return;}

  M.syncModal={...sm,step:'loading',error:null,progress:{current:0,total:workspaces.length,label:'Firebase 초기화 중...'}};
  renderModals();

  try{
    if(!_fbReady){
      await initFirebase();
      if(!_fbReady) throw new Error('Firebase SDK 로드 실패. 네트워크를 확인해주세요.');
    }

    // 납품 관리 Firebase named instance
    let napumApp;
    try{ napumApp=firebase.app('napum'); }
    catch(e){ napumApp=firebase.initializeApp(NAPUM_FB_CFG,'napum'); }
    const napumDb=napumApp.database();

    // 이름 → CRM clientId 매핑 (공유, 누적)
    const nameToId={};
    S.clients.forEach(c=>{ nameToId[c.name]=c.id; });

    // 이미 동기화된 "wsId:orderId" 집합
    const synced=new Set(lsGet('crm_napum_synced',[]));

    // _napumId → CRM tx.id 역참조
    const napumIdToCrmId={};
    S.transactions.forEach(t=>{ if(t._napumId) napumIdToCrmId[t._napumId]=t.id; });

    let totalNewClients=0,totalNewTx=0,totalUpdTx=0;
    const perWorkspace=[];
    const wsListUpdated=[...workspaces];

    for(let i=0;i<workspaces.length;i++){
      const ws=workspaces[i];
      M.syncModal={...M.syncModal,progress:{current:i+1,total:workspaces.length,label:`"${ws.label}" 읽는 중...`}};
      renderModals();

      let wsNewClients=0,wsNewTx=0,wsUpdTx=0;
      try{
        const wsRef=napumDb.ref('workspaces/'+ws.id);
        const [csSnap,ordSnap]=await Promise.all([
          wsRef.child('clients').get(),
          wsRef.child('orders').get()
        ]);

        if(!csSnap.exists()&&!ordSnap.exists()){
          perWorkspace.push({...ws,error:true,newTx:0});
          wsListUpdated[i]={...ws,lastSync:'ID 없음',syncedCount:0};
          continue;
        }

        const napumClients=Object.values(csSnap.val()||{});
        const napumOrders =Object.values(ordSnap.val()||{});

        // 거래처 병합
        napumClients.forEach(nc=>{
          if(!nc.name||nc.isHidden) return;
          if(!nameToId[nc.name]){
            const newC={
              id:nextId(S.clients),
              name:nc.name,
              bizNo:'',rep:'',email:'',
              phone:nc.phone||'',
              address:nc.address||'',
              type:'매출처',
              memo:`[${ws.label}]${nc.note?' '+nc.note:''}`
            };
            S.clients=[...S.clients,newC];
            nameToId[nc.name]=newC.id;
            wsNewClients++;
            totalNewClients++;
          } else {
            // 기존 거래처: phone/address 없으면 납품앱 값으로 보완
            const cid=nameToId[nc.name];
            S.clients=S.clients.map(c=>{
              if(c.id!==cid) return c;
              const next={...c};
              if(nc.phone   &&!c.phone)   next.phone=nc.phone;
              if(nc.address &&!c.address) next.address=nc.address;
              return next;
            });
          }
        });

        // ── 납품앱에서 삭제된 주문 → CRM 전표 삭제 (수동 재동기화)
        const wsSnapshotKeys=new Set(
          napumOrders.filter(o=>o.date&&o.total).map(o=>`${ws.id}:${o.id}`)
        );
        const wsHasCrmTx=S.transactions.some(t=>t._napumId&&t._napumId.startsWith(`${ws.id}:`));
        const wsDeletedIds=(napumOrders.length>0||!wsHasCrmTx)?S.transactions
          .filter(t=>t._napumId&&t._napumId.startsWith(`${ws.id}:`)&&!wsSnapshotKeys.has(t._napumId))
          .map(t=>t.id):[];
        if(wsDeletedIds.length>0){
          S.transactions=S.transactions.filter(t=>!wsDeletedIds.includes(t.id));
          wsDeletedIds.forEach(id=>{
            const nk=[...synced].find(k=>napumIdToCrmId[k]===id);
            if(nk) synced.delete(nk);
          });
          console.info(`[수동 삭제 동기화] ${ws.label}: ${wsDeletedIds.length}건 제거`);
        }

        // 거래 처리
        napumOrders.forEach(o=>{
          // isVoid = 타인거래 (취소 아님) → 수금 처리 가능하므로 CRM에도 포함
          if(!o.date||!o.total) return;

          const napumClient=napumClients.find(c=>String(c.id)===String(o.clientId));
          const crmName=o.clientName||(napumClient?.name||'');
          const crmClientId=nameToId[crmName];
          if(!crmClientId) return;

          const memoItems=(o.items||[]).map(i=>`${i.name}${i.qty>1?` ×${i.qty}`:''}`).join(', ');
          const memo=`[${ws.label}]${o.isVoid?' [타인]':''} ${o.note||(memoItems||'납품')}`;
          // o.total = 납품앱의 부가세 포함 최종 청구금액
          // CRM에서 tax를 별도 계산하면 금액이 뻥튀기되므로 tax=0으로 저장
          const amount=Number(o.total)-(Number(o.discount)||0)||0;
          const tax=0;
          // 납품 결제 상태 → CRM 상태 매핑
          const napumPaid = o.isPaid;
          const napumPartial = !o.isPaid && (o.paidAmount||0) > 0;
          const status = napumPaid ? '수금완료' : '미수금';
          const napumKey=`${ws.id}:${o.id}`;

          if(napumIdToCrmId[napumKey]){
            // 이미 연동된 전표 → 결제 상태 전체 업데이트 (CRM 최신 수금 우선)
            S.transactions=S.transactions.map(t=>{
              if(t.id!==napumIdToCrmId[napumKey]) return t;
              const crmPaidAt=t.paidAt?new Date(t.paidAt).getTime():0;
              const napumUpdAt=o.updatedAt?new Date(o.updatedAt).getTime():0;
              const crmIsNewer=crmPaidAt>0&&crmPaidAt>napumUpdAt;
              const next={...t,amount,tax,memo};
              if(crmIsNewer){
                next.status=t.status; // CRM 수금 상태 유지
              } else {
                next.status=status;
                if(o.paidAmount) next.paidAmount=o.paidAmount;
                else delete next.paidAmount;
                if(o.paidAt)     next.paidAt=o.paidAt;
                if(o.paidMethod) next.paidMethod=o.paidMethod;
                if(o.paidMethodDetail) next.paidMethodDetail=o.paidMethodDetail;
                else delete next.paidMethodDetail;
              }
              return next;
            });
            wsUpdTx++;totalUpdTx++;
          } else {
            // synced에 있어도 실제 전표가 없으면 재생성 (타인거래 누락 방지)
            const alreadyExists=S.transactions.some(t=>t._napumId===napumKey);
            if(!alreadyExists){
              const newT={
                id:nextId(S.transactions),
                date:o.date,clientId:crmClientId,
                type:'매출',amount,tax,memo,status,
                _napumId:napumKey
              };
              if(o.paidAmount) newT.paidAmount=o.paidAmount;
              if(o.paidAt)     newT.paidAt=o.paidAt;
              if(o.paidMethod) newT.paidMethod=o.paidMethod;
              if(o.paidMethodDetail) newT.paidMethodDetail=o.paidMethodDetail;
              S.transactions=[...S.transactions,newT];
              synced.add(napumKey);
              wsNewTx++;totalNewTx++;
            }
          }
        });

        const wsTotal=wsNewTx+wsUpdTx;
        wsListUpdated[i]={...ws,lastSync:new Date().toLocaleString('ko-KR'),syncedCount:wsTotal};
        perWorkspace.push({...ws,error:false,newTx:wsNewTx,updTx:wsUpdTx});

      }catch(err){
        perWorkspace.push({...ws,error:true,newTx:0,msg:err.message});
        wsListUpdated[i]={...ws,lastSync:'오류',syncedCount:0};
      }
    }

    // 저장
    _saveWorkspaces(wsListUpdated);
    lsSet('crm_napum_synced',[...synced]);
    await saveC();
    await saveTX();
    render();

    M.syncModal={...M.syncModal,step:'done',result:{
      wsCount:workspaces.length,
      newClients:totalNewClients,
      newTx:totalNewTx,
      updTx:totalUpdTx,
      perWorkspace
    }};
    renderModals();

  }catch(err){
    M.syncModal={...M.syncModal,step:'error',error:err.message||'알 수 없는 오류가 발생했습니다.'};
    renderModals();
  }
}
