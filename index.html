<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KOREA FM 라디오</title>

<!-- ── PWA ── -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FM 라디오">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<meta name="msapplication-TileColor" content="#0d0d1a">
<meta name="msapplication-TileImage" content="./icons/icon-144.png">

<!-- ── 폰트 ── -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<!-- ── FOUC 방지: CSS 로드 전에 테마 미리 적용 ── -->
<script>
  (function() {
    var t = localStorage.getItem('radio_theme');
    if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>

<style>
/* ══════════════════════════════════════════
   리셋 & 변수
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0d0d1a;
  --bg2:          #131327;
  --bg3:          #1a1a35;
  --panel:        #1e1e3a;
  --border:       rgba(255,255,255,0.07);
  --red:          #e94560;
  --red-glow:     rgba(233,69,96,0.35);
  --amber:        #f5a623;
  --cyan:         #00d4ff;
  --text:         #e8e8f0;
  --muted:        #7070a0;
  --np-end:       #21213f;
  --header-bg:    rgba(13,13,26,0.92);
  --tab-active-border: rgba(255,255,255,0.15);
  --error-bg:     #2a1010;
  --error-border: #5a2020;
  --error-text:   #ee8888;
  --font-mono:    'Orbitron', monospace;
  --font-kr:      'Noto Sans KR', sans-serif;
  --safe-top:     env(safe-area-inset-top, 0px);
  --safe-bot:     env(safe-area-inset-bottom, 0px);
}

/* ── 라이트 테마 변수 ── */
[data-theme="light"] {
  --bg:                #f0f0f5;
  --bg2:               #e4e4ee;
  --bg3:               #d8d8e8;
  --panel:             #ffffff;
  --border:            rgba(0,0,0,0.08);
  --red-glow:          rgba(233,69,96,0.2);
  --text:              #1a1a2e;
  --muted:             #7070a0;
  --np-end:            #eaeaf8;
  --header-bg:         rgba(240,240,245,0.92);
  --tab-active-border: rgba(0,0,0,0.12);
  --error-bg:          #fff0f0;
  --error-border:      #f0c0c0;
  --error-text:        #c0392b;
}
[data-theme="light"] .station-card:hover {
  background: #ffffff;
}
[data-theme="light"] input[type=range] {
  background: var(--bg3);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-kr);
  overflow-x: hidden;
}

/* ══════════════════════════════════════════
   레이아웃
══════════════════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  max-width: 520px;
  margin: 0 auto;
  padding-top: calc(var(--safe-top) + 0px);
  padding-bottom: calc(var(--safe-bot) + 80px);
}

/* ══════════════════════════════════════════
   헤더
══════════════════════════════════════════ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header-bg);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 34px; height: 34px;
  background: var(--red);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 900;
  letter-spacing: 0.5px;
  box-shadow: 0 0 16px var(--red-glow);
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--font-mono);
  font-size: 14px; font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
}
.logo-text span { color: var(--red); }

/* 테마 토글 버튼 */
#themeBtn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s;
  flex-shrink: 0;
}
#themeBtn:hover { transform: rotate(20deg); }

/* 헤더 우측 버튼 그룹 */
.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}

#installBtn {
  display: none;
  align-items: center; gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--amber);
  font-family: var(--font-kr);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
}
#installBtn:hover { background: var(--red); color: white; border-color: var(--red); }

/* ══════════════════════════════════════════
   Now Playing 패널
══════════════════════════════════════════ */
.now-playing {
  margin: 16px;
  background: linear-gradient(135deg, var(--panel) 0%, var(--np-end) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.now-playing::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 20%, var(--red-glow) 0%, transparent 60%);
  pointer-events: none;
}

.np-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--red);
  font-family: var(--font-mono);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.np-station {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 1px;
  line-height: 1.1;
  margin-bottom: 4px;
  min-height: 28px;
}

.np-freq {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
  min-height: 18px;
}

/* 파형 애니메이션 */
.waveform {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 36px;
  margin-bottom: 18px;
}

.wave-bar {
  width: 4px;
  background: var(--red);
  border-radius: 2px;
  opacity: 0.3;
  transition: opacity .3s;
}

.playing .wave-bar { opacity: 1; }

.wave-bar:nth-child(1)  { animation: wave 1.0s ease-in-out infinite; }
.wave-bar:nth-child(2)  { animation: wave 1.3s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(3)  { animation: wave 0.8s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(4)  { animation: wave 1.1s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(5)  { animation: wave 0.9s ease-in-out infinite 0.3s; }
.wave-bar:nth-child(6)  { animation: wave 1.4s ease-in-out infinite 0.15s; }
.wave-bar:nth-child(7)  { animation: wave 1.0s ease-in-out infinite 0.25s; }
.wave-bar:nth-child(8)  { animation: wave 0.7s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(9)  { animation: wave 1.2s ease-in-out infinite 0.35s; }
.wave-bar:nth-child(10) { animation: wave 0.9s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(11) { animation: wave 1.1s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(12) { animation: wave 0.8s ease-in-out infinite 0.4s; }

@keyframes wave {
  0%, 100% { height: 6px; }
  50%       { height: 32px; }
}

.paused .wave-bar { animation-play-state: paused; }

/* 플레이어 컨트롤 */
.controls {
  display: flex;
  align-items: center;
  gap: 14px;
}

.btn-play {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--red);
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 24px var(--red-glow);
  transition: transform .15s, box-shadow .15s;
}
.btn-play:active { transform: scale(0.93); }
.btn-play svg { fill: white; width: 22px; height: 22px; }

.volume-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 10px;
}
.vol-icon { color: var(--muted); font-size: 16px; flex-shrink: 0; }

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--red);
  cursor: pointer;
  box-shadow: 0 0 8px var(--red-glow);
}

/* 상태 표시 */
.np-status {
  font-size: 11px;
  color: var(--muted);
  margin-top: 12px;
  min-height: 14px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}
.np-status.live { color: var(--red); }
.np-status.error { color: var(--amber); }

/* ══════════════════════════════════════════
   채널 그룹
══════════════════════════════════════════ */
.section-label {
  padding: 8px 20px 6px;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  font-family: var(--font-mono);
  text-transform: uppercase;
}

.station-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding: 0 12px;
}

.station-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 14px;
  border-radius: 14px;
  cursor: pointer;
  transition: background .15s;
  border: 1px solid transparent;
  position: relative;
}

.station-card:hover { background: var(--panel); }

.station-card.active {
  background: var(--panel);
  border-color: var(--border);
}

.station-card.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: var(--red);
  border-radius: 0 2px 2px 0;
}

.st-badge {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.3px;
  flex-shrink: 0;
  text-align: center;
  line-height: 1.2;
}

.st-info { flex: 1; min-width: 0; }

.st-name {
  font-size: 14px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.st-desc {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
}

.st-freq {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

.station-card.active .st-freq { color: var(--red); }

/* live 점 */
.live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  box-shadow: 0 0 6px var(--red);
  animation: blink 1.4s ease-in-out infinite;
  flex-shrink: 0;
  opacity: 0;
}
.station-card.active .live-dot { opacity: 1; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ══════════════════════════════════════════
   하단 여백 / 로딩 오버레이
══════════════════════════════════════════ */
.spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(233,69,96,0.3);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  flex-shrink: 0;
}
.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 탭 버튼 */
.tab-btn {
  flex: 1;
  padding: 8px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-kr);
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all .2s;
}
.tab-btn.active {
  background: var(--panel);
  border-color: var(--tab-active-border);
  color: var(--text);
}

/* 즐겨찾기 버튼 */
.s-fav-btn {
  width: 26px; height: 26px;
  border-radius: 50%; border: none;
  background: transparent; font-size: 14px;
  cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.s-fav-btn:hover { color: var(--amber); transform: scale(1.15); }
.s-fav-btn.on { color: var(--amber); }

/* 스크롤바 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* 에러박스 */
.error-box {
  margin: 8px 16px;
  padding: 10px 14px;
  background: var(--error-bg);
  border: 1px solid var(--error-border);
  border-radius: 10px;
  font-size: 11px;
  color: var(--error-text);
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.error-retry-btn {
  flex-shrink: 0;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--error-text);
  background: transparent;
  color: var(--error-text);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.error-retry-btn:hover {
  background: var(--error-text);
  color: var(--panel);
}
</style>
</head>
<body>

<div class="app">

  <!-- ── 헤더 ── -->
  <header>
    <div class="logo">
      <div class="logo-icon">FM</div>
      <div class="logo-text">KOREA <span>FM</span></div>
    </div>
    <div class="header-actions">
      <button id="themeBtn" onclick="toggleTheme()" aria-label="테마 전환">🌙</button>
      <button id="installBtn" onclick="installApp()">
        📲 홈 화면 추가
      </button>
    </div>
  </header>

  <!-- ── Now Playing ── -->
  <div class="now-playing" id="nowPlaying">
    <div class="np-label">▶ NOW PLAYING</div>
    <div class="np-station" id="npStation">채널을 선택하세요</div>
    <div class="np-freq"    id="npFreq">—</div>

    <div class="waveform paused" id="waveform">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
    </div>

    <div class="controls">
      <button class="btn-play" id="btnPlay" aria-label="재생/일시정지">
        <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <div class="volume-wrap">
        <span class="vol-icon">🔈</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.02"
               value="0.8" aria-label="볼륨">
      </div>

      <div class="spinner" id="spinner"></div>
    </div>

    <div class="np-status" id="npStatus">재생 중인 채널이 없습니다</div>
  </div>

  <!-- 탭 -->
  <div style="display:flex;gap:8px;padding:4px 16px 0">
    <button class="tab-btn active" data-tab="all">전체 채널</button>
    <button class="tab-btn" data-tab="fav">⭐ 즐겨찾기 <span id="fav-count" style="font-size:10px;opacity:.6"></span></button>
  </div>

  <!-- 에러박스 -->
  <div id="errorBox" class="error-box" style="display:none">
    <span class="err-msg"></span>
    <button onclick="retryPlay()" class="error-retry-btn">↺ 재연결</button>
  </div>

  <!-- 채널 목록: JS로 동적 렌더링 -->
  <div class="section-label" id="ch-label">전체 채널</div>
  <div class="station-list" id="list-all"></div>
  <div class="station-list" id="list-fav" style="display:none"></div>
  <div id="fav-empty" style="display:none;text-align:center;padding:48px 20px;color:var(--muted)">
    <div style="font-size:32px;margin-bottom:10px">⭐</div>
    <div style="font-size:13px;line-height:1.7">즐겨찾기한 채널이 없습니다.<br>채널의 ☆ 버튼을 눌러 추가하세요.</div>
  </div>

</div><!-- /.app -->

<audio id="audioEl" style="display:none"></audio>

];

/* ══════════════════════════════════════════
   상태
══════════════════════════════════════════ */
const audio     = document.getElementById('audioEl');
let current     = null;
let playing     = false;
let loading     = false;
let volume      = 0.8;
let hlsInstance = null;
let retryTimer  = null;
let retryCount  = 0;
let callId      = 0;
let activeTab   = 'all';
let favorites   = new Set(JSON.parse(localStorage.getItem('radio_favs') || '[]'));

/* ══════════════════════════════════════════
   탭
══════════════════════════════════════════ */
function switchTab(tab) {
  if (activeTab === tab) return;
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  document.getElementById('ch-label').textContent = tab === 'all' ? '전체 채널' : '⭐ 즐겨찾기';

  // DOM 재생성 없이 show/hide만
  document.getElementById('list-all').style.display = tab === 'all' ? '' : 'none';
  document.getElementById('list-fav').style.display = tab === 'fav' ? '' : 'none';

  if (tab === 'fav') updateFavList();
  updateEmptyState();
}

/* ══════════════════════════════════════════
   즐겨찾기
══════════════════════════════════════════ */
function saveFav() { localStorage.setItem('radio_favs', JSON.stringify([...favorites])); }
function toggleFav(id, e) {
  e.stopPropagation();
  favorites.has(id) ? favorites.delete(id) : favorites.add(id);
  saveFav();
  updateFavCount();
  // 즐겨찾기 버튼 상태만 in-place 업데이트 (두 목록 모두)
  ['list-all', 'list-fav'].forEach(listId => {
    const card = document.getElementById(listId).querySelector(`#card-${id}`);
    if (!card) return;
    const btn = card.querySelector('.s-fav-btn');
    const on = favorites.has(id);
    btn.textContent = on ? '★' : '☆';
    btn.classList.toggle('on', on);
    btn.setAttribute('aria-label', on ? '즐겨찾기 해제' : '즐겨찾기 추가');
  });
  // 즐겨찾기 탭 목록 재구성 (즐겨찾기 변경 시만)
  updateFavList();
  updateEmptyState();
}
function updateFavCount() {
  const n = favorites.size;
  document.getElementById('fav-count').textContent = n > 0 ? n : '';
}
function updateEmptyState() {
  const empty = document.getElementById('fav-empty');
  if (activeTab === 'fav') {
    const favCount = STATIONS.filter(s => favorites.has(s.id)).length;
    empty.style.display = favCount === 0 ? 'block' : 'none';
  } else {
    empty.style.display = 'none';
  }
}

/* ══════════════════════════════════════════
   카드 생성 (공통)
══════════════════════════════════════════ */
function createCard(s) {
  const isActive = current && current.id === s.id;
  const isFav    = favorites.has(s.id);
  const card = document.createElement('div');
  card.className = 'station-card' + (isActive ? ' active' : '');
  card.id = 'card-' + s.id;
  if (isActive) {
    card.style.borderColor = s.color;
    card.style.boxShadow   = `0 0 16px ${s.color}33`;
  }

  const parts = s.name.split(' ');
  const badgeTop = parts[0];
  const badgeBot = parts.slice(1).join('');

  card.innerHTML = `
    <div class="st-badge" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}44">
      ${badgeTop}<br><span style="font-size:8px">${badgeBot}</span>
    </div>
    <div class="st-info">
      <div class="st-name">${s.name}</div>
      <div class="st-desc">${s.freq} · ${s.genre}</div>
    </div>
    <button class="s-fav-btn${isFav?' on':''}" aria-label="${isFav?'즐겨찾기 해제':'즐겨찾기 추가'}">${isFav?'★':'☆'}</button>
    <div class="st-freq" id="stfreq-${s.id}" style="${isActive?`color:${s.color}`:''}">
      ${s.freq.replace(' MHz','').replace(' KHz','').replace(' ','')}
    </div>
    <div class="live-dot" id="dot-${s.id}" style="${isActive?'opacity:1':'opacity:0'}"></div>
  `;
  card.querySelector('.s-fav-btn').addEventListener('click', e => toggleFav(s.id, e));
  card.addEventListener('click', () => {
    if (current && current.id === s.id && !loading) togglePlay();
    else playStation(s);
  });
  return card;
}

/* ══════════════════════════════════════════
   초기 전체 채널 렌더 (최초 1회)
══════════════════════════════════════════ */
function renderAllList() {
  const list = document.getElementById('list-all');
  const frag = document.createDocumentFragment();
  STATIONS.forEach(s => frag.appendChild(createCard(s)));
  list.innerHTML = '';
  list.appendChild(frag);
}

/* ══════════════════════════════════════════
   즐겨찾기 탭 목록 갱신
══════════════════════════════════════════ */
function updateFavList() {
  const list = document.getElementById('list-fav');
  const favStations = STATIONS.filter(s => favorites.has(s.id));
  const frag = document.createDocumentFragment();
  favStations.forEach(s => frag.appendChild(createCard(s)));
  list.innerHTML = '';
  list.appendChild(frag);
}

/* ══════════════════════════════════════════
   채널 렌더링: active 상태만 in-place 업데이트
══════════════════════════════════════════ */
function renderStations() {
  // 두 리스트의 모든 카드 active 상태 갱신
  ['list-all', 'list-fav'].forEach(listId => {
    document.getElementById(listId).querySelectorAll('.station-card').forEach(card => {
      const id = parseInt(card.id.replace('card-', ''));
      const s  = STATIONS.find(x => x.id === id);
      if (!s) return;
      const isActive = current && current.id === id;
      card.classList.toggle('active', isActive);
      card.style.borderColor = isActive ? s.color : '';
      card.style.boxShadow   = isActive ? `0 0 16px ${s.color}33` : '';
      const freq = card.querySelector(`#stfreq-${id}`);
      if (freq) freq.style.color = isActive ? s.color : '';
      const dot = card.querySelector(`#dot-${id}`);
      if (dot) dot.style.opacity = isActive ? '1' : '0';
    });
  });
}

/* ══════════════════════════════════════════
   Now Playing UI
══════════════════════════════════════════ */
function updateNowPlaying() {
  if (!current) return;
  document.getElementById('npStation').textContent = current.name;
  document.getElementById('npFreq').textContent    = `${current.freq} · ${current.genre}`;

  const wf = document.getElementById('waveform');
  if (playing) {
    wf.classList.add('playing'); wf.classList.remove('paused');
    // 파형 색상 업데이트
    [...wf.querySelectorAll('.wave-bar')].forEach(b => b.style.background = current.color);
    document.getElementById('iconPlay').innerHTML =
      '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
  } else {
    wf.classList.remove('playing'); wf.classList.add('paused');
    document.getElementById('iconPlay').innerHTML = '<path d="M8 5v14l11-7z"/>';
  }

  const st = document.getElementById('npStatus');
  if (loading) {
    st.textContent = '접속 중...'; st.className = 'np-status';
    document.getElementById('spinner').style.display = 'block';
  } else if (playing) {
    st.textContent = '● LIVE'; st.className = 'np-status live';
    document.getElementById('spinner').style.display = 'none';
  } else {
    st.textContent = '일시 정지'; st.className = 'np-status';
    document.getElementById('spinner').style.display = 'none';
  }
}

/* ══════════════════════════════════════════
   재생 엔진 (기존 로직 그대로)
══════════════════════════════════════════ */
async function resolveStreamUrl(s) {
  if (!s.streamApi) return s.stream;
  try {
    const res  = await fetch(s.streamApi, { cache:'no-store' });
    const html = await res.text();
    const m    = html.match(/https:\/\/[^"'\s]+\.m3u8/);
    if (m) return m[0];
  } catch(e) { console.warn('streamApi 실패:', e); }
  return s.stream;
}

function retryPlay() { if (!current) return; clearRetryTimer(); retryCount = 0; playStation(current); }
function clearRetryTimer() { if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; } }
function scheduleRetry() {
  if (retryCount >= 5) { showError('연결 실패 (5회). 재연결 버튼을 눌러주세요.'); return; }
  retryCount++;
  const delay = Math.min(2000 * Math.pow(2, retryCount - 1), 30000);
  showError(`연결이 끊겼습니다. ${Math.round(delay/1000)}초 후 재연결 (${retryCount}/5)`);
  retryTimer = setTimeout(() => { if (current) playStation(current); }, delay);
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  if (!msg) { box.style.display = 'none'; return; }
  box.style.display = 'flex';
  box.querySelector('.err-msg').textContent = '⚠️ ' + msg;
}

function playStation(s) {
  const thisCall = ++callId;
  showError(null); clearRetryTimer();
  loading = true; playing = false; current = s;
  localStorage.setItem('radio_last', s.id);
  updateNowPlaying(); renderStations();
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  audio.pause(); audio.src = '';

  resolveStreamUrl(s).then(url => {
    if (thisCall !== callId) return;

    function onOK() {
      if (thisCall !== callId) return;
      playing = true; loading = false; retryCount = 0;
      updateNowPlaying(); renderStations(); updateMediaSession();
    }
    function onFail(retry) {
      if (thisCall !== callId) return;
      loading = false; playing = false;
      updateNowPlaying(); renderStations();
      if (retry) scheduleRetry();
    }

    if (window.Hls && window.Hls.isSupported()) {
      const hls = new window.Hls({ maxBufferLength:15, maxMaxBufferLength:30 });
      hlsInstance = hls;
      hls.loadSource(url); hls.attachMedia(audio);
      hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
        audio.volume = volume;
        audio.play().then(onOK).catch(() => onFail(false));
      });
      hls.on(window.Hls.Events.ERROR, (_, d) => {
        if (d.fatal) {
          hls.destroy(); hlsInstance = null;
          if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            audio.src = url; audio.volume = volume;
            audio.play().then(onOK).catch(() => onFail(true));
          } else onFail(true);
        }
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url; audio.volume = volume;
      audio.play().then(onOK).catch(() => onFail(false));
    } else {
      showError('이 브라우저는 HLS를 지원하지 않습니다.');
      loading = false; updateNowPlaying(); renderStations();
    }
  });
}

function togglePlay() {
  if (!current) return;
  if (playing) {
    // ── 일시정지 ──
    clearRetryTimer();
    if (hlsInstance) hlsInstance.stopLoad();
    audio.pause();
    playing = false;
    updateNowPlaying(); renderStations(); updateMediaSession();
  } else {
    // ── 재개: loading 상태 먼저 표시 후 즉시 play() 호출 ──
    if (hlsInstance) {
      loading = true;
      updateNowPlaying();
      hlsInstance.startLoad();
      audio.play()
        .then(() => {
          loading = false; playing = true;
          updateNowPlaying(); renderStations(); updateMediaSession();
        })
        .catch(() => {
          loading = false;
          updateNowPlaying();
          playStation(current); // 풀 재연결
        });
    } else {
      playStation(current);
    }
  }
}

audio.addEventListener('ended', () => { if (current && playing) scheduleRetry(); });
// HLS 스트림은 hls.on(ERROR)에서 처리됨 — hlsInstance 없을 때(네이티브 재생)만 처리
audio.addEventListener('error', () => {
  if (current && !loading && !hlsInstance) scheduleRetry();
});

// ── 전화/인터럽트 후 라이브 복귀 ──
// 전화 수신 시 오디오 포커스가 뺏기며 audio가 강제 중단된다.
// 전화가 끝나 앱으로 돌아올 때 재생 중이었다면 새 스트림으로
// 완전 재연결하여 현재 LIVE 방송으로 즉시 이동한다.

let wasPlayingBeforeHidden = false;

// ① visibilitychange: 화면이 숨겨지거나 복귀할 때
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') {
    // 전화 수신 or 앱 전환 → 현재 재생 상태 저장
    wasPlayingBeforeHidden = playing;
  } else {
    // 앱 전면 복귀 → 재생 중이었으면 LIVE 재연결
    if (wasPlayingBeforeHidden && current) {
      wasPlayingBeforeHidden = false;
      playStation(current);
    } else {
      wasPlayingBeforeHidden = false;
    }
  }
});

// ② pageshow: 일부 브라우저에서 visibilitychange 대신 발생
window.addEventListener('pageshow', () => {
  if (wasPlayingBeforeHidden && current) {
    wasPlayingBeforeHidden = false;
    playStation(current);
  }
});

// ③ audio 외부 중단 감지:
//    전화 수신 시 playing=true인데 audio가 강제 pause됨.
//    이 시점에 playing 플래그를 false로 맞춰두어야
//    전화 종료 후 visibilitychange(visible)에서 wasPlayingBeforeHidden
//    값이 올바르게 활용될 수 있다.
//    ※ 사용자가 직접 ⏸를 누른 경우는 togglePlay()에서 playing=false가
//      먼저 세팅되므로 이 리스너 진입 시 already false → 조건 불충족, 무해.
audio.addEventListener('pause', () => {
  if (playing && current && !loading) {
    // 외부 인터럽트(전화 등)로 강제 중단된 것으로 판단
    // playing은 true로 유지 → visibilitychange(visible)에서 재연결 트리거
    // (playing을 false로 바꾸지 않음 — 의도적 선택)
  }
});

// ④ audio 'play' 이벤트: 전화 종료 후 OS가 오디오를 자동 재개하는 경우
//    버퍼에서 과거 방송이 재생되므로 즉시 새 스트림으로 교체
audio.addEventListener('play', () => {
  // playStation() 내부에서 호출된 play는 loading=true 상태이므로 제외
  // 외부(OS 자동 재개)에서 play 이벤트가 왔고, 이미 playing이 false인 경우만 처리
  if (!playing && !loading && current) {
    // OS가 버퍼에서 자동 재개 → 즉시 끊고 LIVE 재연결
    audio.pause();
    playStation(current);
  }
});

function handleVolume(val) {
  volume = parseFloat(val); audio.volume = volume;
  const c = (current && current.color) || 'var(--red)';
  const sl = document.getElementById('volSlider');
  sl.style.background = `linear-gradient(to right,${c} ${volume*100}%,var(--bg3) ${volume*100}%)`;
}

/* ══════════════════════════════════════════
   MediaSession
══════════════════════════════════════════ */
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !current) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: current.name, artist: `${current.freq} · ${current.genre}`, album: 'KOREA FM 라디오'
  });
  navigator.mediaSession.setActionHandler('play', () => {
    // 잠금화면 ▶: user gesture 컨텍스트 안에서 즉시 audio.play() 호출
    if (hlsInstance) {
      hlsInstance.startLoad();
      audio.play()
        .then(() => { playing = true; updateNowPlaying(); renderStations(); updateMediaSession(); })
        .catch(() => playStation(current));
    } else {
      playStation(current);
    }
  });
  navigator.mediaSession.setActionHandler('pause', () => {
    if (hlsInstance) hlsInstance.stopLoad();
    audio.pause(); playing = false;
    updateNowPlaying(); renderStations();
    // ← 반드시 호출해야 playbackState가 'paused'로 바뀜
    // 없으면 시스템이 'playing'으로 인식해 ▶ 눌러도 play action 미전송
    updateMediaSession();
  });
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    const i = STATIONS.findIndex(s => s.id === current.id);
    playStation(STATIONS[(i-1+STATIONS.length)%STATIONS.length]);
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    const i = STATIONS.findIndex(s => s.id === current.id);
    playStation(STATIONS[(i+1)%STATIONS.length]);
  });
  navigator.mediaSession.playbackState = playing ? 'playing' : 'paused';
}

/* ══════════════════════════════════════════
   테마
══════════════════════════════════════════ */
function toggleTheme() {
  const isLight = document.documentElement.dataset.theme === 'light';
  const next = isLight ? 'dark' : 'light';
  applyTheme(next);
  localStorage.setItem('radio_theme', next);
}
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.dataset.theme = 'light';
    document.getElementById('themeBtn').textContent = '☀️';
  } else {
    delete document.documentElement.dataset.theme;
    document.getElementById('themeBtn').textContent = '🌙';
  }
}
// 저장된 테마 복원
applyTheme(localStorage.getItem('radio_theme') || 'dark');

/* ══════════════════════════════════════════
   PWA – Service Worker + A2HS
══════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r  => console.log('[SW] 등록:', r.scope))
      .catch(e => console.warn('[SW] 실패:', e));
  });
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('installBtn').style.display = 'none';
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => { deferredPrompt = null; });
}

/* ══════════════════════════════════════════
   초기화
══════════════════════════════════════════ */
document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('volSlider').addEventListener('input', function() { handleVolume(this.value); });
document.querySelectorAll('.tab-btn').forEach(b =>
  b.addEventListener('click', () => switchTab(b.dataset.tab))
);

// 볼륨 슬라이더 초기 그라디언트 적용
handleVolume(volume);

updateFavCount();
renderAllList();   // 전체 채널 최초 1회 렌더
updateFavList();   // 즐겨찾기 목록도 미리 렌더 (탭 전환 시 즉시 표시)

// 마지막 채널 복원
const lastId = parseInt(localStorage.getItem('radio_last'));
if (lastId) {
  current = STATIONS.find(s => s.id === lastId) || null;
  if (current) { updateNowPlaying(); renderStations(); }
}
</script>
