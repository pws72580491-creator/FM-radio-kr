// ── 납품 관리 역방향 패치 ────────────────────────────────────────────────────
// CRM 결제 처리 후 → 납품 관리 Firebase의 order 결제 필드 동기화
async function _patchNapumOrder(napumKey, patchObj){
  // napumKey = "wsId:orderId" (wsId는 마지막 : 앞까지, orderId는 마지막 : 이후)
  if(!napumKey||!napumKey.includes(':')) return false;
  // wsId 자체에 : 가 있을 수 있으므로 lastIndexOf 사용
  const sep=napumKey.lastIndexOf(':');
  const wsId=napumKey.slice(0,sep);
  const orderId=napumKey.slice(sep+1);
  if(!wsId||!orderId){ console.warn('napumKey 파싱 실패:', napumKey); return false; }

  try{
    // SDK 로드 보장 (CRM Firebase와 별개로 처리)
    if(typeof firebase==='undefined'){
      console.warn('Firebase SDK 미로드');
      return false;
    }
    // 납품앱 named instance 확보
    let napumApp;
    try{ napumApp=firebase.app('napum'); }
    catch(e){ napumApp=firebase.initializeApp(NAPUM_FB_CFG,'napum'); }

    const ref=napumApp.database().ref(`workspaces/${wsId}/orders/${orderId}`);

    // 실제 노드 존재 여부 확인 (잘못된 wsId/orderId 감지)
    const snap=await ref.once('value');
    if(!snap.exists()){
      console.warn('납품앱 order 없음 (wsId/orderId 불일치 또는 만료):', wsId, orderId);
      // 납품앱에 데이터가 없으면 패치할 대상이 없으므로 성공으로 처리 (CRM은 이미 반영됨)
      return true;
    }

    await ref.update(patchObj);
    console.info('납품 역방향 패치 성공:', napumKey, patchObj);
    return true;
  } catch(e){
    console.warn('납품 역방향 패치 실패:', e.message, '| napumKey:', napumKey);
    return false;
  }
}

function _buildNapumPatch(crmTx){
  const paidAmount = crmTx.paidAmount || 0;
  const isFull = crmTx.status === '수금완료';
  const isPending = crmTx.status === '미수금';
  const patch = {
    isPaid: isFull,
    paidAmount: paidAmount,
    updatedAt: new Date().toISOString(),
  };
  // 수금 완료 또는 부분 수금인 경우만 결제 정보 포함
  if(paidAmount > 0){
    patch.paidAt = crmTx.paidAt || new Date().toISOString();
    patch.paidMethod = crmTx.paidMethod || 'cash';
    if(crmTx.paidMethodDetail) patch.paidMethodDetail = crmTx.paidMethodDetail;
  }
  // 미수금으로 롤백된 경우 결제 정보 null로 초기화
  if(isPending){
    patch.paidAt = null;
    patch.paidMethod = null;
    patch.paidMethodDetail = null;
    patch.paidAmount = 0;
  }
  return patch;
}

function confirmQuickPay(){
  const mo=M.qpModal;
  const t=S.transactions.find(x=>x.id===mo.txId);
  if(!t) return;
  const total=t.amount+t.tax;
  const already=t.paidAmount||0;
  const remain=total-already;
  const amt=mo.method==='mixed'?(mo.mixCash||0)+(mo.mixTransfer||0):(mo.amount||0);
  if(amt<=0){showToast('금액을 입력하세요.');return;}
  if(amt>remain){showToast('잔여금액보다 많습니다.');return;}

  const isFull=amt>=remain;
  const paidMethodDetail=mo.method==='mixed'?{cash:mo.mixCash||0,transfer:mo.mixTransfer||0}:null;
  const paidAt=new Date().toISOString();
  let updatedTx=null;
  S.transactions=S.transactions.map(tx=>{
    if(tx.id!==mo.txId) return tx;
    const next={...tx,paidAmount:(already+amt),paidAt,paidMethod:mo.method};
    if(paidMethodDetail) next.paidMethodDetail=paidMethodDetail;
    if(isFull) next.status=tx.status==='미수금'?'수금완료':'지급완료';
    updatedTx=next;
    return next;
  });
  if(updatedTx) _saveOneTx(updatedTx); else saveTX(); // ⑧fix
  lsSet('crm_tx',S.transactions);
  closeQuickPay();
  const icon=mo.method==='transfer'?'🏦':mo.method==='mixed'?'🔀':'💵';
  showToast(icon+' '+(isFull?'완납 처리':'부분 수금 처리'));

  // 납품 관리 역방향 패치 (딜레이로 토스트 겹침 방지)
  if(updatedTx&&updatedTx._napumId){
    setTimeout(()=>{
      _patchNapumOrder(updatedTx._napumId, _buildNapumPatch(updatedTx))
        .then(ok=>showToast(ok?'📦 납품 관리에도 반영됨':'⚠️ 납품 관리 반영 실패 (로그 확인)'))
        .catch(()=>showToast('⚠️ 납품 관리 반영 실패'));
    },1200);
  }
}

// ── 일괄 수금 모달 ────────────────────────────────────────────────────────────
function openBatchPay(clientId){
  const pending=S.transactions
    .filter(t=>t.clientId===clientId&&t.status==='미수금')
    .sort((a,b)=>a.date.localeCompare(b.date));
  if(!pending.length){showToast('미수금이 없습니다.');return;}
  const totalRemain=pending.reduce((s,t)=>s+_txRemain(t),0);
  M.batchPayModal={clientId,amount:totalRemain,method:'cash',cash:0,transfer:0};
  _pushModalHistory();
  renderModals();
}
function closeBatchPay(){M.batchPayModal=null;render();}

function _renderBatchPreview(){
  const mo=M.batchPayModal;
  const el=document.getElementById('bp_preview');
  if(!el) return;
  const pending=S.transactions
    .filter(t=>t.clientId===mo.clientId&&t.status==='미수금')
    .sort((a,b)=>a.date.localeCompare(b.date));
  const amt=mo.method==='mixed'?(mo.mixCash||0)+(mo.mixTransfer||0):(mo.amount||0);
  if(amt<=0){el.style.display='none';return;}
  el.style.display='block';
  let remain=amt;
  const rows=[];
  for(const t of pending){
    if(remain<=0) break;
    const due=_txRemain(t);
    const apply=Math.min(due,remain);
    remain-=apply;
    const full=apply>=due;
    rows.push(`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px;">
      <span style="color:#64748b;">${esc(t.date)} ${esc(t.memo?.slice(0,10)||'')}</span>
      <span>${fmtW(apply)} ${full?'<span style="color:#16a34a;">→ 완납 ✅</span>':`<span style="color:#b45309;">→ 잔여 ${fmtW(due-apply)}</span>`}</span>
    </div>`);
  }
  const afterTotal=pending.reduce((s,t)=>s+_txRemain(t),0)-Math.min(amt,pending.reduce((s,t)=>s+_txRemain(t),0));
  rows.push(`<div style="display:flex;justify-content:space-between;padding:7px 0;font-size:12px;font-weight:600;">
    <span style="color:#64748b;">입금 후 잔여 미수금</span>
    <span style="color:${afterTotal>0?'#b45309':'#16a34a'};">${fmtW(afterTotal)}</span>
  </div>`);
  el.innerHTML=rows.join('');
}

          <div style="display:flex;gap:8px;">

function confirmBatchPay(){
  const mo=M.batchPayModal;
  const pending=S.transactions
    .filter(t=>t.clientId===mo.clientId&&t.status==='미수금')
    .sort((a,b)=>a.date.localeCompare(b.date));
  const amt=mo.method==='mixed'?(mo.mixCash||0)+(mo.mixTransfer||0):(mo.amount||0);
  if(amt<=0){showToast('금액을 입력하세요.');return;}

  const paidAt=new Date().toISOString();
  const paidMethodDetail=mo.method==='mixed'?{cash:mo.mixCash||0,transfer:mo.mixTransfer||0}:null;
  let remain=amt;
  const updatedTxs=[];

  S.transactions=S.transactions.map(tx=>{
    if(pending.find(p=>p.id===tx.id)&&remain>0){
      const due=_txRemain(tx);
      const apply=Math.min(due,remain);
      remain-=apply;
      const isFull=apply>=due;
      const next={...tx,paidAmount:(tx.paidAmount||0)+apply,paidAt,paidMethod:mo.method};
      if(paidMethodDetail) next.paidMethodDetail=paidMethodDetail;
      if(isFull) next.status='수금완료';
      updatedTxs.push(next);
      return next;
    }
    return tx;
  });

  // ⑧fix: 수정된 건만 단건 저장
  lsSet('crm_tx',S.transactions);
  if(updatedTxs.length===1) _saveOneTx(updatedTxs[0]);
  else saveTX();

  // 납품 패치용 데이터를 closeBatchPay() 전에 캡처 (모달 닫히면 참조 깨짐 방지)
  const _napumTxsSnap = updatedTxs.filter(t=>t._napumId).map(t=>({...t}));
  const _iconSnap = mo.method==='transfer'?'🏦':mo.method==='mixed'?'🔀':'💵';
  const _countSnap = updatedTxs.length;

  closeBatchPay();
  showToast(`${_iconSnap} ${_countSnap}건 수금 처리`);

  // 납품 관리 역방향 패치 (딜레이로 토스트 겹침 방지, 캡처된 스냅샷 사용)
  if(_napumTxsSnap.length>0){
    setTimeout(()=>{
      Promise.all(_napumTxsSnap.map(t=>_patchNapumOrder(t._napumId,_buildNapumPatch(t))))
        .then(results=>{
          const ok=results.filter(Boolean).length;
          const fail=results.length-ok;
          if(fail>0) showToast(`📦 납품 관리 ${ok}건 반영 / ⚠️ ${fail}건 실패`);
          else showToast(`📦 납품 관리 ${ok}건 반영됨`);
        })
        .catch(()=>showToast('⚠️ 납품 관리 반영 실패'));
    },1200);
  }
}

function openStatModal(clientName){
  if(!clientName||clientName==='?') return;
  M.statModal={clientName, month:thisMonth(), step:'loading', orders:[], error:null};
  _pushModalHistory();
  renderModals();
  _loadStatOrders();
}
function closeStatModal(){M.statModal=null;renderModals();}

function setStatMonth(m){
  M.statModal.month=m;
  M.statModal.step='loading';
  renderModals();
  _loadStatOrders();
}

async function _loadStatOrders(){
  const sm=M.statModal;
  if(!sm) return;

  // 워크스페이스 목록: 등록된 것 + _napumId에서 추출한 것 병합
  let workspaces=[..._getWorkspaces()];
  const wsFromTx=new Map(); // id → label
  workspaces.forEach(w=>wsFromTx.set(w.id,w.label));

  // 이 거래처의 _napumId 보유 거래에서 wsId 추출
  const clientTxs=S.transactions.filter(t=>{
    const cl=S.clients.find(c=>c.id===t.clientId);
    return (cl?.name||'')===sm.clientName && t._napumId;
  });
  clientTxs.forEach(t=>{
    const sep=t._napumId.indexOf(':');
    if(sep>0){
      const wsId=t._napumId.slice(0,sep);
      if(!wsFromTx.has(wsId)){
        wsFromTx.set(wsId,wsId);
        workspaces.push({id:wsId,label:wsId});
      }
    }
  });

  if(!workspaces.length){
    M.statModal={...sm,step:'error',error:'워크스페이스가 등록되지 않았습니다.\n사이드바 메뉴 → 납품 관리 연동에서 추가하세요.'};
    renderModals();return;
  }

  try{
    if(!_fbReady) await initFirebase();
    let napumApp;
    try{ napumApp=firebase.app('napum'); }
    catch(e){ napumApp=firebase.initializeApp(NAPUM_FB_CFG,'napum'); }
    const napumDb=napumApp.database();

    const allOrders=[];
    await Promise.all(workspaces.map(async ws=>{
      try{
        const snap=await napumDb.ref(`workspaces/${ws.id}/orders`).get();
        const orders=Object.values(snap.val()||{});
        orders.forEach(o=>{
          if((o.clientName||'')===sm.clientName){
            allOrders.push({...o,_wsLabel:ws.label,_wsId:ws.id});
          }
        });
      }catch(e){ /* 워크스페이스 오류 무시 */ }
    }));

    allOrders.sort((a,b)=>a.date.localeCompare(b.date));
    if(M.statModal) M.statModal={...M.statModal,step:'done',orders:allOrders,error:null};
    renderModals();
  }catch(err){
    if(M.statModal) M.statModal={...M.statModal,step:'error',error:err.message};
    renderModals();
  }
}

function buildStatModal(){
  const sm=M.statModal;
  if(!sm) return '';
  const {clientName,month,step,orders,error}=sm;

  // 월 옵션 생성 (데이터 있는 월 + 최근 6개월)
  const monthSet=new Set();
  const cur=thisMonth();
  for(let i=0;i<6;i++){
    let m=cur;
    for(let j=0;j<i;j++) m=prevMonth(m);
    monthSet.add(m);
  }
  orders.forEach(o=>{ if(o.date) monthSet.add(o.date.slice(0,7)); });
  const monthList=[...monthSet].sort().reverse();

  const monthSel=`<select onchange="setStatMonth(this.value)"
    style="border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:13px;color:#0f172a;background:#fff;cursor:pointer;font-weight:600;">
    ${monthList.map(m=>`<option value="${m}"${m===month?' selected':''}>${fmtMonth(m)}</option>`).join('')}
  </select>`;

  let body='';
  if(step==='loading'){
    body=`<div style="text-align:center;padding:40px 0;">
      <div style="width:40px;height:40px;border:3px solid #e2e8f0;border-top-color:#d97706;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px;"></div>
      <div style="color:#64748b;font-size:13px;">납품 내역을 불러오는 중...</div>
    </div>`;

    body=`<div style="background:#fff1f2;border:1px solid #fecdd3;border-radius:10px;padding:16px;text-align:center;color:#dc2626;font-size:13px;">

    </div>`;
  } else {
    // 데이터 계산
    const monthStart=month+'-01';
    const filt=orders.filter(o=>o.date&&o.date.startsWith(month));
    const carryOrders=orders.filter(o=>o.date&&o.date<monthStart&&!o.isPaid);

    const _eff=o=>o.isPaid&&(o.discount||0)>0?o.total-o.discount:o.total;
    const _paid=o=>o.isPaid?(o.paidAmount||o.total):((o.paidAmount||0));

    const monthTotal=filt.reduce((s,o)=>s+_eff(o),0);
    const monthPaid=filt.reduce((s,o)=>s+_paid(o),0);
    const monthUnpaid=monthTotal-monthPaid;
    const carryAmt=carryOrders.reduce((s,o)=>s+(o.total-(o.paidAmount||0)),0);

    // 요약 카드

      carryAmt>0?{label:'⏩ 전월 이월',val:fmtW(carryAmt),color:'#b45309',bg:'#fefce8',bd:'#fef08a'}:null,
      {label:'당월 매출',val:fmtW(monthTotal),color:'#16a34a',bg:'#f0fdf4',bd:'#bbf7d0'},
      {label:'수금액',val:fmtW(monthPaid),color:'#1d4ed8',bg:'#eff6ff',bd:'#bfdbfe'},
      {label:'청구 금액',val:fmtW(grandUnpaid),color:grandUnpaid>0?'#dc2626':'#16a34a',bg:grandUnpaid>0?'#fff1f2':'#f0fdf4',bd:grandUnpaid>0?'#fecdd3':'#bbf7d0'},
    ].filter(Boolean).map(({label,val,color,bg,bd})=>`
      <div style="background:${bg};border:1px solid ${bd};border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:#64748b;font-size:12px;">${label}</span>
        <span style="color:${color};font-weight:700;font-size:14px;">${val}</span>

    // 이월 행

          :`<span style="font-size:10px;background:#fee2e2;color:#dc2626;border-radius:9999px;padding:2px 6px;font-weight:700;">미수</span>`;
        const partialDetail=partial?`<tr style="background:#f0f9ff;">

              <td colspan="2" style="padding:9px 10px;font-size:12px;color:#64748b;font-weight:600;">합계</td>

      ${orders.length===0?`<div style="text-align:center;color:#94a3b8;font-size:12px;margin-top:12px;">연동된 납품 내역이 없습니다.<br>납품 관리 동기화 후 다시 확인하세요.</div>`:''}`;
  }

  return `
    <div onclick="closeStatModal()" style="position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom);">

function _fmtStatItems(o){

  return items.map(i=>`${i.name}${(i.qty||1)>1?` ×${i.qty}`:''}`).join(', ');
}

// ── 거래처 초기화 모달 ────────────────────────────────────────────────────────
function openResetModal(){
  M.resetModal={step:'select', scope:'all', targetClient:null, confirmText:'', error:null};
  _pushModalHistory();
  renderModals();
}
function _onResetInput(val){
  if(!M.resetModal) return;
  M.resetModal.confirmText=val;
  M.resetModal.error=null;
  // 버튼 상태 DOM 직접 업데이트 (리렌더 없이 키보드 유지)
  const btn=document.getElementById('resetExecBtn');
  if(!btn) return;
  const rm=M.resetModal;
  const tc=rm.targetClient?S.clients.find(c=>c.id===rm.targetClient):null;
  const kw=(tc?tc.name:'초기화').trim().normalize('NFC');
  const match=val.trim().normalize('NFC')===kw;
  btn.style.opacity=match?'1':'0.5';
  btn.style.background=match?'#dc2626':'#f87171';
  btn.style.cursor=match?'pointer':'default';
}

function closeResetModal(){M.resetModal=null;renderModals();}

function buildResetModal(){
  const rm=M.resetModal;

  // 통계 계산
  const totalClients=S.clients.length;
  const napumTx=S.transactions.filter(t=>t._napumId).length;
  const localTx=S.transactions.length-napumTx;
  // keyword를 상단에서 미리 계산 (버튼 렌더링에서도 사용)
  const _tc=rm.targetClient?S.clients.find(c=>c.id===rm.targetClient):null;
  const keyword=_tc?_tc.name:'초기화';
  const napumClients=new Set(
    S.transactions.filter(t=>t._napumId).map(t=>t.clientId)
  );
  const napumOnlyClients=S.clients.filter(c=>
    napumClients.has(c.id)&&
    !S.transactions.filter(t=>t.clientId===c.id&&!t._napumId).length
  ).length;

  let body='';

  if(rm.step==='select'){
    const scopeOpts=[
      {
        key:'all',
        icon:'💥',
        label:'전체 초기화',
        desc:`거래처 ${totalClients}개 + 거래 내역 ${S.transactions.length}건 모두 삭제`,
        color:'#dc2626', bg:'#fff1f2', bd:'#fecdd3'
      },
      {
        key:'txonly',
        icon:'🗒',
        label:'거래 내역만 삭제',
        desc:`거래처 목록 유지 · 거래 내역 ${S.transactions.length}건만 삭제`,
        color:'#b45309', bg:'#fefce8', bd:'#fef08a'
      },
      {
        key:'localonly',
        icon:'🔒',
        label:'로컬 거래만 삭제',
        desc:`납품 연동 거래(${napumTx}건) 제외 · 직접 입력 거래(${localTx}건)만 삭제`,
        color:'#1d4ed8', bg:'#eff6ff', bd:'#bfdbfe'
      },
      {
        key:'client',
        icon:'👤',
        label:'특정 거래처만',
        desc:'거래처 1개와 연관 거래 내역 선택 삭제',
        color:'#7c3aed', bg:'#fdf4ff', bd:'#e9d5ff'
      },
    ].map(({key,icon,label,desc,color,bg,bd})=>{
      const a=rm.scope===key;
      return `<button onclick="M.resetModal.scope='${key}';renderModals()"
        style="width:100%;text-align:left;padding:12px 14px;border-radius:10px;border:2px solid ${a?color:bd};background:${a?bg:'#fff'};cursor:pointer;margin-bottom:8px;transition:all .15s;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:18px;">${icon}</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:${a?color:'#0f172a'};">${label}</div>
            <div style="font-size:11px;color:#64748b;margin-top:2px;">${desc}</div>
          </div>
          ${a?`<span style="margin-left:auto;color:${color};font-size:16px;">●</span>`:''}
        </div>
      </button>`;
    }).join('');

    // 특정 거래처 선택
    const clientSelect = rm.scope==='client' ? `
      <div style="margin-top:4px;">
        <div style="font-size:12px;color:#64748b;margin-bottom:6px;">삭제할 거래처 선택</div>
        <select onchange="M.resetModal.targetClient=Number(this.value)||null;renderModals()"
          style="width:100%;border:1px solid #e2e8f0;border-radius:8px;padding:8px 10px;font-size:13px;color:#0f172a;background:#fff;">
          <option value="">-- 거래처 선택 --</option>
          ${S.clients.map(c=>{
            const txCount=S.transactions.filter(t=>t.clientId===c.id).length;
            return `<option value="${c.id}"${rm.targetClient===c.id?' selected':''}>${esc(c.name)} (거래 ${txCount}건)</option>`;
          }).join('')}
        </select>
      </div>` : '';

    // 납품 연동 주의 문구
    const napumWarn = napumTx>0 ? `
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;margin-top:12px;font-size:11px;color:#1d4ed8;">
        💡 납품 관리 연동 거래 <b>${napumTx}건</b>은 CRM에서 삭제해도 납품 관리 앱 데이터에는 영향 없습니다.
      </div>` : '';

    body=`
      <div style="background:#fff1f2;border:1px solid #fecdd3;border-radius:10px;padding:12px 14px;margin-bottom:16px;">
        <div style="font-size:13px;font-weight:700;color:#dc2626;margin-bottom:4px;">⚠️ 주의</div>
        <div style="font-size:12px;color:#64748b;">삭제된 데이터는 복구할 수 없습니다.<br>납품 관리 앱 원본 데이터에는 영향을 주지 않습니다.</div>
      </div>
      <div style="font-size:12px;font-weight:600;color:#475569;margin-bottom:8px;">삭제 범위 선택</div>
      ${scopeOpts}
      ${clientSelect}
      ${napumWarn}`;

  } else if(rm.step==='confirm'){
    const scope=rm.scope;
    const tc=_tc;
    const txCount=scope==='all'?S.transactions.length
      :scope==='txonly'?S.transactions.length
      :scope==='localonly'?localTx
      :(tc?S.transactions.filter(t=>t.clientId===tc.id).length:0);
    const clientCount=scope==='all'?totalClients:scope==='client'&&tc?1:0;

    body=`
      <div style="background:#fff1f2;border:2px solid #fecdd3;border-radius:10px;padding:14px;margin-bottom:16px;text-align:center;">
        <div style="font-size:24px;margin-bottom:6px;">🚨</div>
        <div style="font-size:14px;font-weight:700;color:#dc2626;margin-bottom:8px;">정말 삭제하시겠습니까?</div>
        <div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;">
          ${clientCount>0?`<div><div style="font-size:20px;font-weight:700;color:#dc2626;">${clientCount}개</div><div style="font-size:11px;color:#94a3b8;">거래처</div></div>`:''}
          <div><div style="font-size:20px;font-weight:700;color:#b45309;">${txCount}건</div><div style="font-size:11px;color:#94a3b8;">거래 내역</div></div>
        </div>
      </div>
      <div style="margin-bottom:14px;">
        <div style="font-size:12px;color:#64748b;margin-bottom:6px;">
          확인을 위해 아래에 <b style="color:#dc2626;">${esc(keyword)}</b> 를 입력하세요
        </div>
        <input id="resetConfirmInput" type="text" value="${esc(rm.confirmText||'')}" placeholder="${esc(keyword)}"
          style="${ISX}font-size:14px;border-color:${rm.error?'#dc2626':'#e2e8f0'};" ${FB}
          oninput="_onResetInput(this.value)">
        ${rm.error?`<div style="color:#dc2626;font-size:11px;margin-top:4px;">${esc(rm.error)}</div>`:''}
      </div>`;
  }

  const isSelect=rm.step==='select';
  const canNext=isSelect&&(rm.scope!=='client'||rm.targetClient!=null);

  return `
    <div onclick="closeResetModal()" style="position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;padding-bottom:env(safe-area-inset-bottom);">
      <div onclick="event.stopPropagation()" style="background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2);">
        <div style="width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:10px auto 0;flex-shrink:0;"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;border-bottom:1px solid #f1f5f9;flex-shrink:0;">
          <div>
            <div style="font-weight:700;color:#0f172a;font-size:15px;">🗑 거래처 초기화</div>
            <div style="color:#94a3b8;font-size:11px;margin-top:1px;">CRM 앱 데이터만 삭제 · 납품 관리 앱 영향 없음</div>
          </div>
          <button onclick="closeResetModal()" style="background:none;border:none;cursor:pointer;color:#94a3b8;">${I.x}</button>
        </div>
        <div style="overflow-y:auto;padding:16px 18px;flex:1;-webkit-overflow-scrolling:touch;">${body}</div>
        <div style="display:flex;gap:8px;padding:12px 18px;border-top:1px solid #f1f5f9;flex-shrink:0;">
          ${isSelect
            ?`<button onclick="closeResetModal()" style="flex:1;padding:11px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;border-radius:10px;font-size:13px;cursor:pointer;">취소</button>
              <button onclick="goResetConfirm()" ${canNext?'':'disabled'}
                style="flex:2;padding:11px;border:none;background:${canNext?'#dc2626':'#e2e8f0'};color:${canNext?'#fff':'#94a3b8'};border-radius:10px;font-size:13px;font-weight:700;cursor:${canNext?'pointer':'default'};">
                다음 →
              </button>`
            :`<button onclick="M.resetModal.step='select';renderModals()" style="flex:1;padding:11px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;border-radius:10px;font-size:13px;cursor:pointer;">← 뒤로</button>
              <button id="resetExecBtn" onclick="confirmReset()"
                style="flex:2;padding:11px;border:none;background:#dc2626;color:#fff;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;opacity:${(rm.confirmText||'').trim().normalize('NFC')===keyword?'1':'0.5'};">
                🗑 영구 삭제
              </button>`}
        </div>
      </div>
    </div>`;
}

function goResetConfirm(){
  const rm=M.resetModal;
  if(rm.scope==='client'&&!rm.targetClient){showToast('거래처를 선택하세요.');return;}
  M.resetModal={...rm,step:'confirm',confirmText:'',error:null};
  renderModals();
}

async function confirmReset(){
  // DOM에서 직접 최신값 읽기
  const inputEl=document.getElementById('resetConfirmInput');
  const input=(inputEl?.value||'').trim().normalize('NFC');
  const rm=M.resetModal;
  const tc=rm.targetClient?S.clients.find(c=>c.id===rm.targetClient):null;
  const keyword=(tc?tc.name:'초기화').trim().normalize('NFC');

  if(input!==keyword){
    showToast(`"${keyword}"를 정확히 입력하세요.`);
    if(inputEl) inputEl.style.borderColor='#dc2626';
    return;
  }

  // ── 1) 로컬 상태 먼저 갱신 ───────────────────────────────────────
  const scope=rm.scope;
  try{
    if(scope==='all'){
      S.transactions=[];
      S.clients=[];
      lsSet('crm_clients',[]);
      lsSet('crm_tx',[]);
      lsSet('crm_napum_synced',[]);

    }else if(scope==='txonly'){
      S.transactions=[];
      lsSet('crm_tx',[]);
      lsSet('crm_napum_synced',[]);

    }else if(scope==='localonly'){
      S.transactions=S.transactions.filter(t=>t._napumId);
      lsSet('crm_tx',S.transactions);

    }else if(scope==='client'&&tc){
      S.transactions=S.transactions.filter(t=>t.clientId!==tc.id);
      S.clients=S.clients.filter(c=>c.id!==tc.id);
      if(S.cExpanded===tc.id) S.cExpanded=null;
      lsSet('crm_clients',S.clients);
      lsSet('crm_tx',S.transactions);
    }
  }catch(e){
    console.error('로컬 초기화 오류:',e);
    showToast('⚠️ 초기화 중 오류가 발생했습니다.');
    return;
  }

  // ── 2) UI 즉시 갱신 (Firebase 기다리지 않음) ─────────────────────
  closeResetModal();
  render();
  const labels={all:'전체 초기화',txonly:'거래 내역 삭제',localonly:'로컬 거래 삭제',client:`${tc?.name||''} 삭제`};
  showToast('✅ '+labels[scope]+' 완료');

  // ── 3) Firebase: 개별 삭제 대신 한 번에 덮어쓰기 ─────────────────
  if(db){
    try{
      if(scope==='all'){
        await Promise.all([
          db.ref('clients').set(null),
          db.ref('transactions').set(null),
        ]);
      }else if(scope==='txonly'){
        await db.ref('transactions').set(null);
      }else if(scope==='localonly'){
        // 남은 것만 다시 올리기
        await db.ref('transactions').set(
          S.transactions.length ? toMap(S.transactions) : null
        );
      }else if(scope==='client'&&tc){
        await Promise.all([
          db.ref('clients').set(S.clients.length ? toMap(S.clients) : null),
          db.ref('transactions').set(S.transactions.length ? toMap(S.transactions) : null),
        ]);
      }
    }catch(e){
      console.warn('Firebase 초기화 실패 (로컬은 삭제됨):', e);
      showToast('⚠️ 클라우드 삭제 실패 (로컬은 완료)');
    }
  }
}

// ── AUTO BACKUP SYSTEM ────────────────────────────────────────────────────────
const BACKUP_LS_KEY  = 'crm_auto_backups'; // localStorage 캐시
const BACKUP_FB_PATH = 'backups';           // Firebase RTDB 경로: /backups/{id}
const BACKUP_MAX     = 10;

// ── localStorage 캐시 ──────────────────────────────────────────────────────
function _getBackups(){ return lsGet(BACKUP_LS_KEY, []); }
function _saveBackupsLocal(arr){ lsSet(BACKUP_LS_KEY, arr); }

// ── Firebase 백업 저장 ────────────────────────────────────────────────────
async function _fbSaveBackup(entry){
  if(!db) return;
  try{
    await db.ref(`${BACKUP_FB_PATH}/${entry.id}`).set(entry);
  }catch(e){ console.warn('[백업] Firebase 저장 실패:', e.message); }
}

// ── Firebase 백업 삭제 ────────────────────────────────────────────────────
async function _fbDeleteBackup(id){
  if(!db) return;
  try{
    await db.ref(`${BACKUP_FB_PATH}/${id}`).remove();
  }catch(e){ console.warn('[백업] Firebase 삭제 실패:', e.message); }
}

// ── Firebase → localStorage 동기화 (앱 시작 시 1회) ──────────────────────
async function _syncBackupsFromFb(){
  if(!db) return;
  try{
    const snap = await db.ref(BACKUP_FB_PATH).get();
    if(!snap.val()) return;
    const arr = Object.values(snap.val()).sort((a,b)=>b.id-a.id).slice(0, BACKUP_MAX);
    _saveBackupsLocal(arr);
    console.info(`[백업] Firebase에서 ${arr.length}개 동기화됨`);
  }catch(e){ console.warn('[백업] Firebase 동기화 실패:', e.message); }
}

// ── Firebase에서 오래된 백업 정리 (BACKUP_MAX 초과분 삭제) ────────────────
async function _fbPruneBackups(){
  if(!db) return;
  try{
    const snap = await db.ref(BACKUP_FB_PATH).get();
    if(!snap.val()) return;
    const all = Object.values(snap.val()).sort((a,b)=>b.id-a.id);
    const toDelete = all.slice(BACKUP_MAX);
    await Promise.all(toDelete.map(b => db.ref(`${BACKUP_FB_PATH}/${b.id}`).remove()));
  }catch(e){ console.warn('[백업] Firebase 정리 실패:', e.message); }
}

/** 백업 생성 (localStorage + Firebase 동시 저장) */
async function _createBackup(label){
  const backups = _getBackups();
  const entry = {
    id:   Date.now(),
    date: new Date().toISOString(),
    label: label,
    clients:      JSON.parse(JSON.stringify(S.clients)),
    transactions: JSON.parse(JSON.stringify(S.transactions)),
  };
  // localStorage: 같은 label 중복 제거 후 최신 추가
  const filtered = backups.filter(b => b.label !== label);
  filtered.unshift(entry);
  _saveBackupsLocal(filtered.slice(0, BACKUP_MAX));

  // Firebase: 비동기 저장 + 정리 (fire-and-forget)
  _fbSaveBackup(entry).then(()=>_fbPruneBackups()).catch(()=>{});

  return entry;
}

/** 매월 15일·말일 자동 백업 체크 — loadData 완료 후 호출 */
async function checkAutoBackup(){
  const d    = new Date();
  const day  = d.getDate();
  const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  const isBackupDay = (day === 15 || day === lastDay);
  if(!isBackupDay) return;

  const label = `AUTO_${localDate()}`;
  const existing = _getBackups().find(b => b.label === label);
  if(existing) return; // 오늘 이미 백업됨

  const entry = await _createBackup(label);
  console.info(`[자동백업] ${label} 완료 (거래처 ${entry.clients.length}개, 거래 ${entry.transactions.length}건)`);
  showToast(`🗄️ 자동 백업 완료 (${localDate()})`);
}

/** 백업 모달 열기 — Firebase 최신 목록 로드 후 표시 */
async function openBackupModal(){
  M.backupModal = { tab: 'list', loading: true };
  renderModals();
  _pushModalHistory();
  // Firebase 최신 목록 동기화
  await _syncBackupsFromFb();
  M.backupModal = { tab: 'list', loading: false };
  renderModals();
}
function closeBackupModal(){
  M.backupModal = null;
  renderModals();
}

/** 백업 목록에서 복구 */
async function restoreBackup(id){
  const backups = _getBackups();
  let entry = backups.find(b => b.id === id);

  if(!entry && db){
    try{
      const snap = await db.ref(`${BACKUP_FB_PATH}/${id}`).get();
      entry = snap.val();
    }catch(e){}
  }
  if(!entry){ showToast('백업을 찾을 수 없습니다.'); return; }

  const dateStr = new Date(entry.date).toLocaleString('ko-KR');
  M.confirm={
    msg:`[${entry.label}]\n${dateStr}\n거래처 ${entry.clients.length}개 / 거래 ${entry.transactions.length}건\n\n이 백업으로 복구할까요?\n현재 데이터는 덮어씌워집니다.`,
    okStr:`_doRestoreBackup(${id})`
  };
  renderModals();
}

async function _doRestoreBackup(id){
  M.confirm=null;
  const backups = _getBackups();
  let entry = backups.find(b => b.id === id);
  if(!entry && db){
    try{
      const snap = await db.ref(`${BACKUP_FB_PATH}/${id}`).get();
      entry = snap.val();
    }catch(e){}
  }
  if(!entry){ showToast('백업을 찾을 수 없습니다.'); return; }

  // 복구 전 현재 데이터를 임시 백업
  await _createBackup(`BEFORE_RESTORE_${localDate()}`);

  S.clients      = JSON.parse(JSON.stringify(entry.clients));
  S.transactions = JSON.parse(JSON.stringify(entry.transactions));
  lsSet('crm_clients', S.clients);
  lsSet('crm_tx', S.transactions);
  lsSet('crm_napum_synced',[]); // ⑦fix: 복구 후 synced 캐시 초기화 (중복 방지 오작동 방지)

  try{
    if(db){
      await saveC(); await saveTX();
      showToast('✅ 복구 완료 (클라우드 동기화됨)');
    } else {
      showToast('✅ 복구 완료 (로컬 저장)');
    }
  }catch(e){ showToast('✅ 복구 완료 (클라우드 오류)'); }

  closeBackupModal();
  render();
}

/** 백업 삭제 (localStorage + Firebase) */
async function deleteBackup(id){
  M.confirm={
    msg:'이 백업을 삭제할까요?',
    okStr:`_doDeleteBackup(${id})`
  };
  renderModals();
}
async function _doDeleteBackup(id){
  M.confirm=null;
  _saveBackupsLocal(_getBackups().filter(b => b.id !== id));
  _fbDeleteBackup(id);
  M.backupModal = { tab: 'list', loading: false };
  renderModals();
  showToast('백업이 삭제됐습니다.');
}

/** 수동 백업 생성 */
async function createManualBackup(){
  const label = `MANUAL_${localDate()}_${Date.now().toString().slice(-4)}`;
  M.backupModal = { tab: 'list', loading: true };
  renderModals();
  await _createBackup(label);
  M.backupModal = { tab: 'list', loading: false };
  renderModals();
  showToast('💾 수동 백업이 생성됐습니다.');
}

/** 백업 → JSON 파일로 다운로드 */
function downloadBackup(id){
  const entry = _getBackups().find(b => b.id === id);
  if(!entry) return;
  const data  = { exportedAt: entry.date, version: 1, label: entry.label, clients: entry.clients, transactions: entry.transactions };
  const blob  = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href = url; a.download = `crm-backup-${entry.label}.json`; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
}

function exportData(){
  const data={exportedAt:new Date().toISOString(),version:1,clients:S.clients,transactions:S.transactions};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`crm-data-${localDate()}.json`;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
  showToast('데이터를 저장했습니다.');
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.style.display='none';
  document.body.appendChild(input);
  input.onchange=e=>{
    const file=e.target.files[0];
    document.body.removeChild(input);
    if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.clients)||!Array.isArray(data.transactions)){
          showToast('올바른 CRM 백업 파일이 아닙니다.');return;
        }
        // 데이터 유효성 검증
        const validC=data.clients.filter(c=>c.id&&c.name&&c.type);
        const validT=data.transactions.filter(t=>t.id&&t.clientId&&t.date&&t.type&&typeof t.amount==='number');
        if(!confirm(`거래처 ${validC.length}개, 거래 ${validT.length}건을 불러옵니다.\n현재 데이터는 덮어씌워집니다. 계속할까요?`))return;
        S.clients=validC;S.transactions=validT;
        // Firestore 전체 동기화
        await saveC();await saveTX();
        render();showToast('데이터를 불러왔습니다.');
      }catch(err){showToast('파일을 읽는 중 오류가 발생했습니다.');}
    };
    reader.readAsText(file);
  };
  // iOS Safari: input이 DOM에 있어야 파일 선택창 열림
  input.click();
}

// buildClients()의 filtered+rows 로직을 그대로 추출한 함수
function _buildCRows(){
  const workspaces = _getWorkspaces();
  function clientWsId(clientId){
    const tx = S.transactions.find(t => t.clientId === clientId && t._napumId);
    if(!tx) return null;
    const sep = tx._napumId.lastIndexOf(':');
    return sep > -1 ? tx._napumId.slice(0, sep) : null;
  }
  const wsOrder = {};
  workspaces.forEach((w, i) => { wsOrder[w.id] = i; });

  const filtered = S.clients.filter(c => {
    const wsId = clientWsId(c.id);
    const wsOk = S.cWsFilter === '전체'
      || (S.cWsFilter === '__direct__' && wsId === null)
      || wsId === S.cWsFilter;
    return wsOk
      && (S.cFilter === '전체' || c.type === S.cFilter)
      && matchAny(S.cSearch, c.name, c.bizNo, c.rep, c.phone, c.memo);
  });
  filtered.sort((a, b) => {
    const wa = clientWsId(a.id); const wb = clientWsId(b.id);
    const ia = wa !== null && wsOrder[wa] !== undefined ? wsOrder[wa] : 9999;
    const ib = wb !== null && wsOrder[wb] !== undefined ? wsOrder[wb] : 9999;
    if(ia !== ib) return ia - ib;
    return a.name.localeCompare(b.name, 'ko');
  });

  if(filtered.length === 0)
    return '<div style="padding:40px 0;text-align:center;color:#94a3b8;font-size:13px;">거래처가 없습니다.</div>';

  const clientStats = id => {
    const txs = S.transactions.filter(t => t.clientId === id);
    const unpaid = txs.filter(t => t.status === '미수금').reduce((s,t) => s + _txRemain(t), 0);
    const unpaidPay = txs.filter(t => t.status === '미지급금').reduce((s,t) => s + _txRemain(t), 0);
    return { txs, unpaid, unpaidPay };
  };

  let lastWsGroup = undefined;
  return filtered.map(c => {
    const s = clientStats(c.id);
    const open = S.cExpanded === c.id;
    const tc = c.type==='매출처'?'#16a34a':c.type==='매입처'?'#1d4ed8':'#b45309';
    const wsId = clientWsId(c.id);
    const wsLabel = wsId && wsOrder[wsId] !== undefined
      ? (workspaces.find(w => w.id === wsId)?.label || wsId) : '직접 등록';
    let groupHeader = '';
    if(wsLabel !== lastWsGroup){
      lastWsGroup = wsLabel;
      const hc = wsId ? '#b45309' : '#94a3b8';
      const hbg = wsId ? '#fefce8' : '#f8fafc';
      const hbd = wsId ? '#fef08a' : '#e2e8f0';
      groupHeader = `<div style="padding:6px 14px;background:${hbg};border-bottom:1px solid ${hbd};border-top:1px solid ${hbd};"><span style="font-size:11px;font-weight:700;color:${hc};">📦 ${esc(wsLabel)}</span></div>`;
    }
    let expHtml = '';
    if(open){
      const info = [['사업자번호',c.bizNo],['대표자',c.rep],['전화',c.phone],['이메일',c.email],['주소',c.address],['메모',c.memo]]
        .filter(([,v]) => v)
        .map(([k,v]) => `<div style="display:flex;gap:8px;"><span style="color:#94a3b8;min-width:60px;font-size:12px;">${esc(k)}</span><span style="color:#334155;font-size:12px;word-break:break-all;">${esc(v)}</span></div>`)
        .join('');
      expHtml = `<div style="background:#fafafa;border-bottom:1px solid #e2e8f0;padding:14px;">${info
        ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;">${info}</div>`
        : `<div style="color:#94a3b8;font-size:12px;text-align:center;padding:8px 0;">등록된 정보가 없습니다.</div>`}</div>`;
    }
    const unpaidBadge = s.unpaid > 0
      ? `<span style="font-size:11px;font-weight:700;color:#b45309;">${fmtW(s.unpaid)}</span>`
      : `<span style="font-size:11px;color:#94a3b8;">—</span>`;
    return `${groupHeader}<div>
      <div onclick="toggleExpand(${c.id})" class="hover-row" style="display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:5px;">
            <span style="color:${open?'#d97706':'#0f172a'};font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.name)}</span>
            <span style="color:#94a3b8;flex-shrink:0;">${open ? I.chevD : I.chevR}</span>
          </div>
          <div style="color:#94a3b8;font-size:11px;margin-top:1px;"><span style="font-size:10px;font-weight:600;color:${tc};">${esc(c.type)}</span></div>
        </div>
        <div style="text-align:right;flex-shrink:0;">${unpaidBadge}</div>
        <div style="width:52px;display:flex;justify-content:center;gap:8px;flex-shrink:0;" onclick="event.stopPropagation()">
          <button onclick="editClient(${c.id})" style="color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseenter="this.style.color='#d97706'" onmouseleave="this.style.color='#94a3b8'">${I.edit}</button>
          <button onclick="confirmDelClient(${c.id})" style="color:#94a3b8;background:none;border:none;cursor:pointer;" onmouseenter="this.style.color='#dc2626'" onmouseleave="this.style.color='#94a3b8'">${I.trash}</button>
        </div>
      </div>${expHtml}</div>`;
  }).join('');
}

// buildTransactions()의 filtered+rows 로직을 그대로 추출한 함수
function _buildTxRowsOnly(){
  const mode = S.txPeriodMode || 'monthly';
  if(!S.txWeek) S.txWeek = _weekOf(localDate());
  const dateOk = t => {
    if(mode==='all')     return true;
    if(mode==='monthly') return S.txMonth==='전체' || t.date.startsWith(S.txMonth);
    if(mode==='daily')   return t.date === S.txDate;
    if(mode==='weekly')  return _inWeek(t.date, S.txWeek);
    return true;
  };
  const _txWsWorkspaces = _getWorkspaces();
  const _txWsOrder = {};
  _txWsWorkspaces.forEach((w, i) => { _txWsOrder[w.id] = i; });
  function _txWsIdx(tx){
    if(!tx._napumId) return 9999;
    const sep = tx._napumId.lastIndexOf(':');
    const wsId = sep > -1 ? tx._napumId.slice(0, sep) : null;
    return (wsId !== null && _txWsOrder[wsId] !== undefined) ? _txWsOrder[wsId] : 9998;
  }
  const _clientNameCache = {};
  S.clients.forEach(c => { _clientNameCache[c.id] = c.name || ''; });

  const filtered = [...S.transactions].filter(t => {
    const cl = S.clients.find(c => c.id === t.clientId);
    const wsOk = S.txWsFilter==='전체' || _txWsIdx(t) === _txWsOrder[S.txWsFilter];
    return wsOk && dateOk(t)
      && (S.txTf==='전체' || t.type===S.txTf)
      && (S.txSf==='전체' || t.status===S.txSf)
      && matchAny(S.txSearch, cl?.name, t.memo);
  }).sort((a,b) => {
    const dateCmp = b.date.localeCompare(a.date); if(dateCmp !== 0) return dateCmp;
    const wsCmp = _txWsIdx(a) - _txWsIdx(b);     if(wsCmp !== 0)   return wsCmp;
    const nameCmp = (_clientNameCache[a.clientId]||'').localeCompare(_clientNameCache[b.clientId]||'','ko');
    if(nameCmp !== 0) return nameCmp;
    return a.id - b.id;
  });

  if(filtered.length === 0)
    return '<div style="padding:40px 0;text-align:center;color:#94a3b8;font-size:13px;">거래 내역이 없습니다.</div>';

  const grouped = mode==='weekly' || mode==='monthly' || mode==='all';
  if(!grouped) return filtered.map(tx => _buildTxRow(tx, false)).join('');

  let rows = '';
  const byDate = {};
  filtered.forEach(tx => { if(!byDate[tx.date]) byDate[tx.date]=[]; byDate[tx.date].push(tx); });
  Object.keys(byDate).sort((a,b) => b.localeCompare(a)).forEach(date => {
    const dayTxs = byDate[date];
    const dayRev = dayTxs.filter(t=>t.type==='매출').reduce((s,t)=>s+t.amount,0);
    const dayPur = dayTxs.filter(t=>t.type==='매입').reduce((s,t)=>s+t.amount,0);
    rows += '<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;border-top:1px solid #e2e8f0;">'
      + '<span style="font-size:11px;font-weight:600;color:#475569;">'+_fmtDayFull(date)+'</span>'
      + '<span style="font-size:11px;color:#64748b;">'
      + (dayRev>0?'<span style="color:#16a34a;">↑'+fmtW(dayRev)+'</span> ':'')
      + (dayPur>0?'<span style="color:#dc2626;">↓'+fmtW(dayPur)+'</span>':'')
      + '</span></div>';
    rows += dayTxs.slice().sort((a,b) => {
      const wc = _txWsIdx(a)-_txWsIdx(b); if(wc) return wc;
      const nc = (_clientNameCache[a.clientId]||'').localeCompare(_clientNameCache[b.clientId]||'','ko');
      if(nc) return nc; return a.id-b.id;
    }).map(tx => _buildTxRow(tx, true)).join('');
  });
  return rows;
}

function setTxPeriodMode(mode){
  S.txPeriodMode=mode;
  if(mode==='monthly') S.txMonth=thisMonth();

}
// 날짜 헬퍼 - 반드시 로컬 파싱 (new Date('YYYY-MM-DD')는 UTC→KST 하루 어긋남)
function _parseLocal(d){const[y,m,dd]=d.split('-').map(Number);return new Date(y,m-1,dd);}
function _prevDay(d){const dt=_parseLocal(d);dt.setDate(dt.getDate()-1);return localDate(dt);}
function _nextDay(d){const dt=_parseLocal(d);dt.setDate(dt.getDate()+1);return localDate(dt);}
function _fmtDayFull(d){const[y,m,dd]=d.split('-').map(Number);const days=['일','월','화','수','목','금','토'];const dow=_parseLocal(d).getDay();return`${y}년 ${+m}월 ${+dd}일 (${days[dow]})`;}
// 주(週) 헬퍼 - 월요일 기준, 로컬 파싱
function _weekOf(d){const dt=_parseLocal(d);const dow=dt.getDay();const diff=dow===0?-6:1-dow;dt.setDate(dt.getDate()+diff);return localDate(dt);}
function _weekEnd(monDate){const dt=_parseLocal(monDate);dt.setDate(dt.getDate()+6);return localDate(dt);}
function _prevWeek(monDate){const dt=_parseLocal(monDate);dt.setDate(dt.getDate()-7);return localDate(dt);}
function _nextWeek(monDate){const dt=_parseLocal(monDate);dt.setDate(dt.getDate()+7);return localDate(dt);}
function _fmtWeek(monDate){const end=_weekEnd(monDate);const[ym,mm,dm]=monDate.split('-');const[ye,me,de]=end.split('-');return ym===ye&&mm===me?`${+ym}년 ${+mm}월 ${+dm}~${+de}일`:`${+ym}년 ${+mm}월 ${+dm}일 ~ ${+me}월 ${+de}일`;}
function _inWeek(date,monDate){return date>=monDate&&date<=_weekEnd(monDate);}
function prevMonth(ym){const[y,m]=ym.split('-').map(Number);return m===1?`${y-1}-12`:`${y}-${String(m-1).padStart(2,'0')}`;}
function nextMonth(ym){const[y,m]=ym.split('-').map(Number);return m===12?`${y+1}-01`:`${y}-${String(m+1).padStart(2,'0')}`;}
function fmtMonth(ym){const[y,m]=ym.split('-');return`${y}년 ${+m}월`;}
function monthOptions(){
  const cur=thisMonth();const months=new Set([cur]);
  S.transactions.forEach(t=>{if(t.date)months.add(t.date.slice(0,7));});
  const sorted=[...months].sort();const min=sorted[0]||cur;const list=[];
  let m=min;while(m<=cur){list.push(m);m=nextMonth(m);}return list;
}

function submitTxModal(existId){ existId = existId==='null'?null:existId;
  const dateVal=document.getElementById('tf_date')?.value;
  // 숨김 필드(datalist 선택) 우선, 없으면 이름으로 매칭
  let clientId=Number(document.getElementById('tf_clientId')?.value)||0;
  if(!clientId){
    const nameVal=(document.getElementById('tf_clientName')?.value||'').trim();
    const matched=S.clients.find(c=>c.name===nameVal);
    if(matched) clientId=matched.id;
  }
  const amtRaw=(document.getElementById('tf_amount')?.value||'').replace(/[^0-9]/g,'');
  const taxRaw=(document.getElementById('tf_tax')?.value||'').replace(/[^0-9]/g,'');
  if(!dateVal){showToast('거래일자를 입력하세요.');return;}
  if(!clientId){showToast('거래처를 선택하세요.');return;}
  if(!amtRaw){showToast('금액을 입력하세요.');return;}
  const amount=parseInt(amtRaw)||0;
  const tax=parseInt(taxRaw)||0;
  if(amount<0||tax<0){showToast('금액은 0 이상이어야 합니다.');return;}
  // 중복 거래 경고 (신규 등록 시에만 체크)
  if(existId===null){
    const dupTx=S.transactions.find(t=>
      t.clientId===clientId &&
      t.date===dateVal &&
      t.amount===amount &&
      t.type===(document.getElementById('tf_type')?.value)
    );
    if(dupTx){
      const cl=S.clients.find(c=>c.id===clientId);
      if(!confirm(`"${cl?.name||''}" ${dateVal} ${fmtW(amount)} 동일 거래가 이미 있습니다.\n계속 등록하시겠습니까?`)) return;
    }
  }
  // ②fix: 수정 시 기존 tx의 _napumId·paidAmount·paidAt·paidMethod 등 보존
  const _origTx = existId!==null ? S.transactions.find(t=>t.id===existId) : null;
  const f={
    ...(_origTx||{}),
    date:dateVal,clientId,
    type:document.getElementById('tf_type')?.value,
    amount,tax,
    memo:document.getElementById('tf_memo')?.value||'',
    status:document.getElementById('tf_status')?.value
  };
  if(existId!==null)f.id=existId;
  saveTxFn(f);
  // _napumId 전표 수정 시 납품앱 역방향 패치 (수금 상태 변경인 경우)
  if(f._napumId && existId!==null){
    setTimeout(()=>{
      _patchNapumOrder(f._napumId, _buildNapumPatch(f))
        .then(ok=>{ if(ok) showToast('📦 납품 관리에도 반영됨'); })
        .catch(()=>{});
    }, 800);
  }
}

// ── SWIPE NAVIGATION ──────────────────────────────────────────────────────────
(function(){
  const VIEWS=['dashboard','clients','transactions','receivables'];
  let tx0=null, ty0=null, startTime=null, swiping=false;

  function onStart(e){
    // 모달/드로어 열린 경우 무시
    if(M.clientModal||M.txModal||M.confirm||M.scanModal||M.syncModal||M.qpModal||M.batchPayModal||M.statModal||M.resetModal||M.backupModal||S.drawerOpen)return;
    const t=e.touches?e.touches[0]:e;
    tx0=t.clientX; ty0=t.clientY; startTime=Date.now(); swiping=true;
  }

  function onMove(e){
    if(!swiping||tx0===null)return;
    const t=e.touches?e.touches[0]:e;
    const dx=t.clientX-tx0;
    const dy=t.clientY-ty0;
    // 세로 스크롤이 우세하면 스와이프 취소
    if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>10){swiping=false;return;}
    // 가로 이동 중 세로 스크롤 방지
    if(Math.abs(dx)>10) e.preventDefault();
  }

  function onEnd(e){
    if(!swiping||tx0===null){swiping=false;tx0=null;return;}
    const t=e.changedTouches?e.changedTouches[0]:e;
    const dx=t.clientX-tx0;
    const dy=t.clientY-ty0;
    const dt=Date.now()-startTime;
    swiping=false; tx0=null; ty0=null;

    // 조건: 가로 이동이 세로보다 크고, 최소 50px 이상, 400ms 이내
    if(Math.abs(dx)<50||Math.abs(dx)<Math.abs(dy)||dt>400)return;

    const cur=VIEWS.indexOf(S.view);
    if(cur===-1)return;
    const next=dx<0
      ? (cur+1<VIEWS.length ? VIEWS[cur+1] : null)   // 왼쪽 스와이프 → 다음
      : (cur-1>=0           ? VIEWS[cur-1] : null);   // 오른쪽 스와이프 → 이전
    if(!next)return;

    // 슬라이드 애니메이션
    const mc=document.getElementById('mainContent');
    if(mc){
      const dir=dx<0?-1:1;
      mc.style.transition='none';
      mc.style.transform=`translateX(0)`;
      // 살짝 당겼다가 전환
      mc.style.transition='transform .22s ease';
      mc.style.transform=`translateX(${dir*60}px)`;
      mc.style.opacity='0';
      setTimeout(()=>{
        setView(next);
        const mc2=document.getElementById('mainContent');
        if(mc2){
          mc2.style.transition='none';
          mc2.style.transform=`translateX(${-dir*60}px)`;
          mc2.style.opacity='0';
          // double rAF: 브라우저가 초기 상태를 실제로 paint한 뒤 애니메이션 시작
          requestAnimationFrame(()=>requestAnimationFrame(()=>{
            mc2.style.transition='transform .22s ease, opacity .22s ease';
            mc2.style.transform='translateX(0)';
            mc2.style.opacity='1';
          }));
        }
      },150);
    } else {
      setView(next);
    }
  }

  document.addEventListener('touchstart', onStart, {passive:true});
  document.addEventListener('touchmove',  onMove,  {passive:false});
  document.addEventListener('touchend',   onEnd,   {passive:true});
})();

// ── 입력창 더블클릭/더블탭 시 전체 선택 ──────────────────────────────────────────────
document.addEventListener('dblclick', e=>{
  const el=e.target;
  if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') el.select();
});
(()=>{
  let _lastTap=0, _lastEl=null;
  document.addEventListener('touchend', e=>{
    const el=e.target;
    if(el.tagName!=='INPUT'&&el.tagName!=='TEXTAREA') return;
    const now=Date.now();
    if(_lastEl===el && now-_lastTap<400){
      e.preventDefault();
      el.select();
      _lastTap=0; _lastEl=null;
    } else {
      _lastTap=now; _lastEl=el;
    }
  }, {passive:false});
})();

// ── 뒤로가기로 모달 닫기 ──────────────────────────────────────────
function _hasOpenModal(){
  return !!(M.clientModal || M.txModal || M.confirm || M.scanModal ||
            M.syncModal || M.qpModal || M.batchPayModal || M.resetModal ||
            M.statModal || M.backupModal);
}

function _closeTopModal(){
  if(M.resetModal)    { closeResetModal(); return; }
  if(M.confirm)       { M.confirm=null; renderModals(); return; }
  if(M.scanModal)     { closeScanModal(); return; }
  if(M.backupModal)   { closeBackupModal(); return; }
  if(M.qpModal)       { closeQuickPay(); return; }
  if(M.batchPayModal) { closeBatchPay(); return; }
  if(M.txModal)       { closeTxModal(); return; }
  if(M.clientModal)   { closeClientModal(); return; }
  if(M.syncModal)     { closeSyncModal(); return; }
  if(M.statModal)     { M.statModal=null; renderModals(); return; }
}

// ⑪fix: 모달 깊이 카운터로 history 스택 관리
let _modalDepth = 0;
function _pushModalHistory(){
  _modalDepth++;
  history.pushState({modal:true, depth:_modalDepth}, '');
}

// 뒤로가기: 모달이 열려있으면 닫고, 없으면 기본 동작(앱 종료/이전 페이지)
window.addEventListener('popstate', (e)=>{
  if(_hasOpenModal()){
    e.preventDefault && e.preventDefault();
    _modalDepth = Math.max(0, _modalDepth-1);
    _closeTopModal();
    // 남은 모달이 있으면 현재 depth로 다시 push
    if(_hasOpenModal()){
      _modalDepth++;
      history.pushState({modal:true, depth:_modalDepth}, '');
    } else {
      _modalDepth = 0;
      history.replaceState({modal:false, depth:0}, '');
    }
  }
  // 모달 없으면 기본 동작 허용 (앱 종료)
});

// 앱 초기화 완료 후 기준 상태 설정 (loadData 이후 호출됨)
function _initHistory(){
  _modalDepth = 0;
  history.replaceState({modal:false, depth:0}, '');
}
