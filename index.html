<script>
(function(){
  var t = localStorage.getItem('radio_theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme','light');
})();
</script>

<style>
/* ══ 리셋 & 변수 ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0d1a;
  --bg2:       #131327;
  --bg3:       #1a1a35;
  --panel:     #1e1e3a;
  --border:    rgba(255,255,255,0.07);
  --red:       #e94560;
  --red-glow:  rgba(233,69,96,0.35);
  --amber:     #f5a623;
  --text:      #e8e8f0;
  --muted:     #7070a0;
  --np-end:    #21213f;
  --hdr-bg:    rgba(13,13,26,0.92);
  --tab-bdr:   rgba(255,255,255,0.15);
  --err-bg:    #2a1010;
  --err-bdr:   #5a2020;
  --err-txt:   #ee8888;
  --mono:      'Orbitron', monospace;
  --kr:        'Noto Sans KR', sans-serif;
  --sat:       env(safe-area-inset-top,    0px);
  --sab:       env(safe-area-inset-bottom, 0px);
}

[data-theme="light"] {
  --bg:       #f0f0f5;
  --bg2:      #e4e4ee;
  --bg3:      #d8d8e8;
  --panel:    #ffffff;
  --border:   rgba(0,0,0,0.08);
  --red-glow: rgba(233,69,96,0.2);
  --text:     #1a1a2e;
  --muted:    #7070a0;
  --np-end:   #eaeaf8;
  --hdr-bg:   rgba(240,240,245,0.92);
  --tab-bdr:  rgba(0,0,0,0.12);
  --err-bg:   #fff0f0;
  --err-bdr:  #f0c0c0;
  --err-txt:  #c0392b;
}
[data-theme="light"] .station-card:hover { background: #fff; }
[data-theme="light"] input[type=range]   { background: var(--bg3); }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--kr);
  overflow-x: hidden;
}

/* ══ 레이아웃 ══ */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  max-width: 520px;
  margin: 0 auto;
  padding-top: var(--sat);
  padding-bottom: calc(var(--sab) + 80px);
}

/* ══ 헤더 ══ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 13px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--hdr-bg);
}

.logo { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 34px; height: 34px;
  background: var(--red);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px; font-weight: 900;
  box-shadow: 0 0 16px var(--red-glow);
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--mono);
  font-size: 14px; font-weight: 700;
  letter-spacing: 2px;
}
.logo-text span { color: var(--red); }

.header-actions { display: flex; align-items: center; gap: 8px; }

/* 함께 듣기 버튼 */
#syncBtn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--muted);
  font-size: 11px;
  font-family: var(--kr);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
#syncBtn.on {
  background: rgba(0,200,100,0.12);
  border-color: rgba(0,200,100,0.4);
  color: #00c864;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
#syncBtn.on .sync-dot {
  box-shadow: 0 0 6px #00c864;
  animation: blink 1.4s ease-in-out infinite;
}

/* 테마 버튼 */
#themeBtn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s;
  flex-shrink: 0;
}
#themeBtn:hover { transform: rotate(20deg); }

/* 설치 버튼 */
#installBtn {
  display: none;
  align-items: center; gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--amber);
  font-family: var(--kr);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
}
#installBtn:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* ══ Now Playing ══ */
.now-playing {
  margin: 16px;
  background: linear-gradient(135deg, var(--panel) 0%, var(--np-end) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.now-playing::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 80% 20%, var(--red-glow) 0%, transparent 60%);
  pointer-events: none;
}

.np-label {
  font-size: 10px; letter-spacing: 3px;
  color: var(--red);
  font-family: var(--mono); font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.np-station {
  font-family: var(--mono);
  font-size: 22px; font-weight: 900;
  letter-spacing: 1px; line-height: 1.1;
  margin-bottom: 4px; min-height: 28px;
}

.np-freq {
  font-family: var(--mono);
  font-size: 13px; color: var(--muted);
  margin-bottom: 16px; min-height: 18px;
}

/* 파형 */
.waveform {
  display: flex; align-items: flex-end;
  gap: 3px; height: 36px;
  margin-bottom: 18px;
}
.wave-bar {
  width: 4px; background: var(--red);
  border-radius: 2px; opacity: 0.3;
  transition: opacity .3s;
}
.playing .wave-bar { opacity: 1; }
.paused  .wave-bar { animation-play-state: paused; }

.wave-bar:nth-child(1)  { animation: wave 1.0s ease-in-out infinite; }
.wave-bar:nth-child(2)  { animation: wave 1.3s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(3)  { animation: wave 0.8s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(4)  { animation: wave 1.1s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(5)  { animation: wave 0.9s ease-in-out infinite 0.3s; }
.wave-bar:nth-child(6)  { animation: wave 1.4s ease-in-out infinite 0.15s; }
.wave-bar:nth-child(7)  { animation: wave 1.0s ease-in-out infinite 0.25s; }
.wave-bar:nth-child(8)  { animation: wave 0.7s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(9)  { animation: wave 1.2s ease-in-out infinite 0.35s; }
.wave-bar:nth-child(10) { animation: wave 0.9s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(11) { animation: wave 1.1s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(12) { animation: wave 0.8s ease-in-out infinite 0.4s; }

@keyframes wave { 0%,100%{height:6px} 50%{height:32px} }

/* 컨트롤 */
.controls { display: flex; align-items: center; gap: 14px; }

.btn-play {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--red); border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 24px var(--red-glow);
  transition: transform .15s;
}
.btn-play:active { transform: scale(0.93); }
.btn-play svg { fill: white; width: 22px; height: 22px; }

.volume-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.vol-icon { color: var(--muted); font-size: 16px; flex-shrink: 0; }

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--bg3); border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%; background: var(--red);
  cursor: pointer; box-shadow: 0 0 8px var(--red-glow);
}

.np-status {
  font-size: 11px; color: var(--muted);
  margin-top: 12px; min-height: 14px;
  font-family: var(--mono); letter-spacing: 0.5px;
}
.np-status.live  { color: var(--red); }
.np-status.error { color: var(--amber); }

.spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(233,69,96,0.3);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  flex-shrink: 0;
}
.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ 탭 ══ */
.tabs { display: flex; gap: 8px; padding: 10px 16px 4px; }
.tab-btn {
  flex: 1; padding: 8px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-size: 12px; font-family: var(--kr); font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active {
  background: var(--panel);
  border-color: var(--tab-bdr);
  color: var(--text);
}

/* ══ 에러 박스 ══ */
.error-box {
  margin: 6px 16px;
  padding: 10px 14px;
  background: var(--err-bg);
  border: 1px solid var(--err-bdr);
  border-radius: 10px;
  font-size: 11px; color: var(--err-txt);
  align-items: center;
  justify-content: space-between; gap: 10px;
}
.error-retry-btn {
  flex-shrink: 0; padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--err-txt);
  background: transparent; color: var(--err-txt);
  font-size: 11px; cursor: pointer; transition: all .15s;
}
.error-retry-btn:hover { background: var(--err-txt); color: var(--panel); }

/* ══ 채널 목록 ══ */
.section-label {
  padding: 6px 20px 4px;
  font-size: 10px; letter-spacing: 3px;
  color: var(--muted);
  font-family: var(--mono); text-transform: uppercase;
}

.swipe-viewport { overflow: hidden; width: 100%; }
.swipe-track {
  display: flex; width: 200%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
}
.swipe-panel { width: 50%; flex-shrink: 0; min-width: 0; }

.station-list {
  display: flex; flex-direction: column;
  gap: 1px; padding: 0 12px;
}

.station-card {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 14px;
  border-radius: 14px;
  cursor: pointer;
  transition: background .15s;
  border: 1px solid transparent;
  position: relative;
}
.station-card:hover { background: var(--panel); }
.station-card.active {
  background: var(--panel);
  border-color: var(--border);
}
.station-card.active::before {
  content: '';
  position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; background: var(--red);
  border-radius: 0 2px 2px 0;
}

.st-badge {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  flex-shrink: 0; text-align: center; line-height: 1.2;
}

.st-info { flex: 1; min-width: 0; }
.st-name {
  font-size: 14px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.st-desc {
  font-size: 11px; color: var(--muted); margin-top: 1px;
  font-family: var(--mono); letter-spacing: 0.5px;
}

.st-freq {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  color: var(--muted); flex-shrink: 0;
}
.station-card.active .st-freq { color: var(--red); }

.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 6px var(--red);
  animation: blink 1.4s ease-in-out infinite;
  flex-shrink: 0; opacity: 0;
}
.station-card.active .live-dot { opacity: 1; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.s-fav-btn {
  width: 26px; height: 26px;
  border-radius: 50%; border: none;
  background: transparent; font-size: 14px;
  cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.s-fav-btn:hover { color: var(--amber); transform: scale(1.15); }
.s-fav-btn.on    { color: var(--amber); }

.fav-empty {
  display: none;
  text-align: center; padding: 48px 20px;
  color: var(--muted);
}

/* ══ 닉네임 모달 ══ */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 300;
  align-items: center; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  width: min(340px,90vw);
  display: flex; flex-direction: column; gap: 14px;
}
.modal h3  { font-size: 15px; font-weight: 600; color: var(--text); }
.modal p   { font-size: 12px; color: var(--muted); line-height: 1.6; }
.modal input {
  width: 100%; padding: 10px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); font-family: var(--kr); font-size: 14px;
  outline: none;
}
.modal input:focus { border-color: #00c864; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
  flex: 1; padding: 10px; border-radius: 10px;
  border: none; font-family: var(--kr); font-size: 13px;
  cursor: pointer; transition: opacity .15s;
}
.modal-btns button:hover { opacity: .85; }
.btn-cancel  { background: var(--bg3); color: var(--muted); }
.btn-confirm { background: #00c864; color: #fff; font-weight: 600; }

/* ══ 토스트 ══ */
#toast {
  position: fixed;
  bottom: calc(var(--sab) + 90px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--panel);
  border: 1px solid rgba(0,200,100,0.35);
  color: var(--text); font-size: 12px; font-family: var(--kr);
  padding: 9px 18px; border-radius: 20px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity .3s, transform .3s;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ 스크롤바 ══ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
/* ══ 버전 모달 ══ */
#versionBadge {
  position: fixed;
  bottom: calc(var(--sab) + 6px);
  right: 12px;
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px 7px;
  cursor: pointer;
  z-index: 150;
  transition: color .2s, border-color .2s;
  letter-spacing: 1px;
}
#versionBadge:hover { color: var(--red); border-color: var(--red-glow); }

.changelog-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 400;
  align-items: flex-end;
  justify-content: center;
}
.changelog-bg.show { display: flex; }
.changelog-sheet {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(var(--sab) + 20px);
  width: min(520px, 100%);
  max-height: 70vh;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 16px;
}
.changelog-header {
  display: flex; align-items: center; justify-content: space-between;
}
.changelog-title {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; color: var(--red);
}
.changelog-close {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--muted); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.changelog-entry { display: flex; flex-direction: column; gap: 6px; }
.changelog-ver {
  display: flex; align-items: center; gap: 8px;
}
.changelog-ver-badge {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  background: var(--red); color: #fff;
  padding: 2px 8px; border-radius: 6px;
}
.changelog-ver-badge.old {
  background: var(--bg3); color: var(--muted);
}
.changelog-date {
  font-size: 10px; color: var(--muted); font-family: var(--mono);
}
.changelog-list {
  display: flex; flex-direction: column; gap: 3px;
  padding-left: 4px;
}
.changelog-item {
  font-size: 11px; color: var(--text); line-height: 1.6;
  display: flex; gap: 6px;
}
.changelog-item::before { content: '·'; color: var(--red); flex-shrink: 0; }

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* ════════════════════════════════════════

const audio = document.getElementById('audioEl');

const AppState = {
  current:       null,    // 현재 선택된 방송국
  playing:       false,   // 실제 재생 중 여부

};

// 하위 호환 참조 (AppState 프로퍼티를 직접 사용)
const S = AppState;

/* ════════════════════════════════════════
   탭 전환
════════════════════════════════════════ */
function switchTab(tab) {
  if (S.activeTab === tab) return;
  S.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  document.getElementById('ch-label').textContent =
    tab === 'all' ? '전체 채널' : '⭐ 즐겨찾기';
  document.getElementById('swipeTrack').style.transform =
    tab === 'all' ? 'translateX(0)' : 'translateX(-50%)';
  if (tab === 'fav') updateFavList();
  updateEmptyState();
}

/* ════════════════════════════════════════
   즐겨찾기
════════════════════════════════════════ */
function saveFav() {
  localStorage.setItem('radio_favs', JSON.stringify([...S.favorites]));
}

function toggleFav(id, e) {
  e.stopPropagation();
  S.favorites.has(id) ? S.favorites.delete(id) : S.favorites.add(id);
  saveFav(); updateFavCount();
  ['list-all','list-fav'].forEach(lid => {
    const card = document.getElementById(lid).querySelector('[data-id="'+id+'"]');
    if (!card) return;
    const btn = card.querySelector('.s-fav-btn');
    const on  = S.favorites.has(id);
    btn.textContent = on ? '★' : '☆';
    btn.classList.toggle('on', on);
    btn.setAttribute('aria-label', on ? '즐겨찾기 해제' : '즐겨찾기 추가');
  });
  updateFavList(); updateEmptyState();
}

function updateFavCount() {
  const n = S.favorites.size;
  document.getElementById('fav-count').textContent = n > 0 ? n : '';
}

function updateEmptyState() {
  const el = document.getElementById('fav-empty');
  if (S.activeTab === 'fav') {
    el.style.display = STATIONS.filter(s => S.favorites.has(s.id)).length === 0 ? 'block' : 'none';
  } else {
    el.style.display = 'none';
  }
}

/* ════════════════════════════════════════
   카드 생성
════════════════════════════════════════ */
function createCard(s) {
  const isActive = S.current && S.current.id === s.id;
  const isFav    = S.favorites.has(s.id);
  const card     = document.createElement('div');
  card.className = 'station-card' + (isActive ? ' active' : '');
  card.id        = 'card-' + s.id;
  card.dataset.id = s.id;
  if (isActive) {
    card.style.borderColor = s.color;
    card.style.boxShadow   = `0 0 16px ${s.color}33`;
  }
  const parts = s.name.split(' ');
  const freq  = s.freq.replace(' MHz','').replace(' KHz','').replace('AM ','').replace(' ','');
  card.innerHTML = `
    <div class="st-badge" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}44">
      ${parts[0]}<br><span style="font-size:8px">${parts.slice(1).join('')}</span>
    </div>
    <div class="st-info">
      <div class="st-name">${esc(s.name)}</div>
      <div class="st-desc">${esc(s.freq)} · ${esc(s.genre)}</div>
    </div>
    <button class="s-fav-btn${isFav?' on':''}"
      aria-label="${isFav?'즐겨찾기 해제':'즐겨찾기 추가'}">${isFav?'★':'☆'}</button>
    <div class="st-freq" id="stfreq-${s.id}" style="${isActive?`color:${s.color}`:''}">
      ${freq}
    </div>
    <div class="live-dot" id="dot-${s.id}" style="opacity:${isActive?1:0}"></div>
  `;
  card.querySelector('.s-fav-btn').addEventListener('click', e => toggleFav(s.id, e));
  card.addEventListener('click', () => {
    if (S.current && S.current.id === s.id && !S.loading) togglePlay();
    else playStation(s, true);
  });
  return card;
}

/* ════════════════════════════════════════

════════════════════════════════════════ */
function renderAllList() {
  const frag = document.createDocumentFragment();
  STATIONS.forEach(s => frag.appendChild(createCard(s)));
  const list = document.getElementById('list-all');
  list.innerHTML = ''; list.appendChild(frag);
}

function updateFavList() {
  const frag = document.createDocumentFragment();
  STATIONS.filter(s => S.favorites.has(s.id)).forEach(s => frag.appendChild(createCard(s)));
  const list = document.getElementById('list-fav');

// active 상태만 in-place 갱신
function renderStations() {
  ['list-all','list-fav'].forEach(lid => {
    document.getElementById(lid).querySelectorAll('.station-card').forEach(card => {
      const id = parseInt(card.id.replace('card-',''));
      const s  = STATIONS.find(x => x.id === id);
      if (!s) return;
      const on = !!(S.current && S.current.id === id);
      card.classList.toggle('active', on);
      card.style.borderColor = on ? s.color : '';
      card.style.boxShadow   = on ? `0 0 16px ${s.color}33` : '';
      const fq  = card.querySelector('.st-freq');
      const dot = card.querySelector('.live-dot');
      if (fq)  fq.style.color    = on ? s.color : '';
      if (dot) dot.style.opacity = on ? '1' : '0';
    });
  });
}

/* ════════════════════════════════════════
   Now Playing UI
════════════════════════════════════════ */
function updateNowPlaying() {
  if (!S.current) return;
  document.getElementById('npStation').textContent = S.current.name;
  document.getElementById('npFreq').textContent    = `${S.current.freq} · ${S.current.genre}`;

  const wf = document.getElementById('waveform');
  if (S.playing) {
    wf.classList.add('playing'); wf.classList.remove('paused');
    [...wf.querySelectorAll('.wave-bar')].forEach(b => b.style.background = S.current.color);
    document.getElementById('iconPlay').innerHTML =
      '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
  } else {
    wf.classList.remove('playing'); wf.classList.add('paused');
    document.getElementById('iconPlay').innerHTML = '<path d="M8 5v14l11-7z"/>';
  }

  const st  = document.getElementById('npStatus');
  const sp  = document.getElementById('spinner');
  if (S.loading) {
    st.textContent = '접속 중...'; st.className = 'np-status';
    sp.style.display = 'block';
  } else if (S.playing) {
    st.textContent = '● LIVE'; st.className = 'np-status live';
    sp.style.display = 'none';
  } else {
    st.textContent = '일시 정지'; st.className = 'np-status';
    sp.style.display = 'none';
  }
}

════════════════════════════════════════ */
function showError(msg) {
  const box = document.getElementById('errorBox');
  if (!msg) { box.style.display = 'none'; return; }
  box.style.display = 'flex';
  box.querySelector('.err-msg').textContent = '⚠️ ' + msg;
  // Sentry 에러 전송
  if (window.Sentry && S.current) {
    Sentry.captureMessage(msg, {
      level: 'warning',
      tags: { station: S.current.name, freq: S.current.freq },
    });
  }
}

function clearRetryTimer() {
  if (S.retryTimer) { clearTimeout(S.retryTimer); S.retryTimer = null; }
}

function scheduleRetry() {
  if (S.retryCount >= 5) { showError('연결 실패 (5회). 재연결 버튼을 눌러주세요.'); return; }
  S.retryCount++;
  const delay = Math.min(2000 * Math.pow(2, S.retryCount - 1), 30000);
  showError(`연결이 끊겼습니다. ${Math.round(delay/1000)}초 후 재연결 (${S.retryCount}/5)`);
  S.retryTimer = setTimeout(() => { if (S.current) playStation(S.current); }, delay);
}

function retryPlay() {
  if (!S.current) return;
  clearRetryTimer(); S.retryCount = 0;
  playStation(S.current, true);
}

/* ════════════════════════════════════════
   스트림 URL 해석
   streamApi 방송(극동방송): 캐시 재사용
   forceRefresh=true 일 때만 새로 받아옴
════════════════════════════════════════ */
async function resolveStreamUrl(s, forceRefresh) {
  if (!s.streamApi) return s.stream;
  if (!forceRefresh && s._resolvedUrl) return s._resolvedUrl;
  try {
    const res  = await fetch(s.streamApi, { cache: 'no-store' });
    const html = await res.text();
    const m    = html.match(/https:\/\/[^"'\s]+\.m3u8/);
    if (m) { s._resolvedUrl = m[0]; return m[0]; }
    console.warn('streamApi: m3u8 URL을 찾지 못했습니다. 기본 URL로 폴백합니다.');
  } catch(e) { console.warn('streamApi 실패:', e); }
  return s.stream;
}

/* ════════════════════════════════════════
   재생 엔진
════════════════════════════════════════ */
function playStation(s, forceRefresh = false) {
  const thisCall = ++S.callId;
  S.needReconnect = false; S.wasPlaying = false;   // 채널 변경 시 인터럽트 플래그 초기화
  showError(null); clearRetryTimer(); S.retryCount = 0;
  S.loading = true; S.playing = false; S.current = s;
  localStorage.setItem('radio_last', s.id);
  updateNowPlaying(); renderStations();
  if (S.hls) { S.hls.destroy(); S.hls = null; }
  S.userPaused = true;
  audio.pause(); audio.src = '';

  // Firebase 동기화
  if (syncMode && fbReady) {
    fbDb.ref('shared/station').set({ id: s.id, nick: myNick, at: Date.now() });
  }

  resolveStreamUrl(s, forceRefresh).then(url => {
    if (thisCall !== S.callId) return;

    function onOK() {
      if (thisCall !== S.callId) return;
      S.playing = true; S.loading = false; S.retryCount = 0;
      localStorage.setItem('radio_playing', '1');  // 재생 중 상태 저장
      updateNowPlaying(); renderStations(); updateMediaSession();
    }
    function onFail(retry) {
      if (thisCall !== S.callId) return;
      S.loading = false; S.playing = false;
      updateNowPlaying(); renderStations(); updateMediaSession();
      if (retry) scheduleRetry();
    }

    if (window.Hls && window.Hls.isSupported()) {
      S.hls = new window.Hls({ maxBufferLength: 15, maxMaxBufferLength: 30 });
      S.hls.loadSource(url); S.hls.attachMedia(audio);
      S.hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
        audio.volume = S.volume;
        audio.play().then(onOK).catch(() => {
          showError('자동재생이 차단됐습니다. 재생 버튼을 눌러주세요.');
          onFail(false);
        });
      });
      S.hls.on(window.Hls.Events.ERROR, (_, d) => {
        if (d.fatal) {
          S.hls.destroy(); S.hls = null;
          if (audio.canPlayType('application/vnd.apple.mpegurl')) {
            audio.src = url; audio.volume = S.volume;
            audio.play().then(onOK).catch(() => onFail(true));
          } else onFail(true);
        }
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url; audio.volume = S.volume;
      audio.play().then(onOK).catch(() => onFail(true));
    } else {
      showError('이 브라우저는 HLS를 지원하지 않습니다.');
      S.loading = false; updateNowPlaying(); renderStations();
    }
  }).catch(() => {
    if (thisCall !== S.callId) return;
    S.loading = false; S.playing = false;
    updateNowPlaying(); renderStations(); updateMediaSession();
    showError('스트림 주소를 가져오지 못했습니다.');
  });
}

function togglePlay() {
  if (!S.current || S.loading) return;
  if (S.playing) {
    clearRetryTimer();
    if (S.hls) S.hls.stopLoad();
    S.userPaused = true; S.wasPlaying = false; S.needReconnect = false;
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    updateNowPlaying(); renderStations(); updateMediaSession();
  } else {
    // 버퍼 재개 대신 항상 라이브 시점으로 새 연결
    playStation(S.current);
  }
}

/* ════════════════════════════════════════
   오디오 이벤트 (전화/인터럽트 처리)
════════════════════════════════════════ */
audio.addEventListener('ended', () => { if (S.current && S.playing) scheduleRetry(); });
audio.addEventListener('error', () => { if (S.current && S.playing && !S.loading && !S.hls) scheduleRetry(); });

// ── 외부 인터럽트 처리 ──────────────────────────────
// pause 이벤트로 상태 저장 → 화면 복귀 or 시스템 재개 시 재연결
audio.addEventListener('pause', () => {
  if (S.userPaused) { S.userPaused = false; return; } // 직접 정지는 무시
  if (S.playing && S.current && !S.loading) {
    S.wasPlaying    = true;
    S.needReconnect = true;
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && S.wasPlaying && S.current) {
    S.wasPlaying    = false;
    S.needReconnect = false;
    playStation(S.current);
  }
});

audio.addEventListener('play', () => {
  // 시스템 자동 재개 차단 (Android 일부)
  if (S.needReconnect && S.current) {
    S.needReconnect = false;
    S.wasPlaying    = false;
    S.userPaused    = true;   // pause 리스너 오탐 방지
    audio.pause();
    playStation(S.current);
  }
});

// ── 블루투스 자동 재연결 ────────────────────────────
// devicechange: 블루투스 기기 연결/해제 시 OS가 발생시키는 이벤트
// 블루투스 재연결 감지 → _wasPlaying=true면 라이브 재연결
(function initBluetoothReconnect() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.addEventListener) return;

  // AudioContext: 오디오 출력 장치 전환 시 'interrupted' → 'running' 변화 감지
  let audioCtx = null;
  function getAudioCtx() {
    if (audioCtx && audioCtx.state !== 'closed') return audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
    return audioCtx;
  }

  // 장치 변경 이벤트 (블루투스 연결/해제 모두 발생)
  navigator.mediaDevices.addEventListener('devicechange', async () => {
    if (!S.current) return;

    // 오디오 출력 장치 목록 확인
    let hasAudioOut = true;
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      hasAudioOut = devices.some(d => d.kind === 'audiooutput');
    } catch(e) {}

    if (S.wasPlaying && hasAudioOut) {
      // 블루투스 재연결 감지 → 짧은 딜레이 후 라이브 재연결
      // (장치 전환 완료까지 300ms 대기)
      setTimeout(() => {
        if (S.wasPlaying && S.current) {
          S.wasPlaying    = false;
          S.needReconnect = false;
          playStation(S.current);
        }
      }, 300);
    }
  });

  // AudioContext statechange: 'interrupted' → 'running' 복귀 감지 (iOS Safari)
  audio.addEventListener('play', () => {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') {
      ctx.resume().catch(() => {});
    }
  }, { once: false });

  // iOS: AudioContext가 interrupted → running으로 복귀 시 재연결
  function watchAudioCtxState() {
    const ctx = getAudioCtx();
    if (!ctx) return;
    ctx.addEventListener('statechange', () => {
      if (ctx.state === 'running' && S.wasPlaying && S.current) {
        S.wasPlaying    = false;
        S.needReconnect = false;
        playStation(S.current);
      }
    });
  }
  // 첫 번째 사용자 제스처 후 AudioContext 활성화
  document.addEventListener('click', () => { getAudioCtx(); watchAudioCtxState(); },
    { once: true, passive: true });
  document.addEventListener('touchstart', () => { getAudioCtx(); watchAudioCtxState(); },
    { once: true, passive: true });
})();

/* ════════════════════════════════════════
   볼륨
════════════════════════════════════════ */
function handleVolume(val) {
  const parsed = parseFloat(val);
  if (isNaN(parsed)) return;                          // NaN 방어
  S.volume = Math.min(1, Math.max(0, parsed));        // 0~1 범위 강제
  audio.volume = S.volume;
  const c  = (S.current && S.current.color) || 'var(--red)';
  const sl = document.getElementById('volSlider');
  if (sl) {                                           // DOM 방어
    sl.style.background =
      `linear-gradient(to right,${c} ${S.volume*100}%,var(--bg3) ${S.volume*100}%)`;
  }
}

/* ════════════════════════════════════════
   MediaSession
════════════════════════════════════════ */
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !S.current) return;

  // 재생 여부와 무관하게 항상 메타데이터 + 핸들러 등록
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  S.current.name,
    artist: `${S.current.freq} · ${S.current.genre}`,
    album:  'KOREA FM 라디오'
  });

  // 잠금화면 ▶ → 항상 라이브 재연결 (정지 상태에서도 작동)
  navigator.mediaSession.setActionHandler('play', () => {
    playStation(S.current);
  });

  // 잠금화면 ⏸ → 정지 + 상태 저장
  navigator.mediaSession.setActionHandler('pause', () => {
    clearRetryTimer();
    if (S.hls) S.hls.stopLoad();
    S.userPaused = true; S.wasPlaying = false; S.needReconnect = false;
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    updateNowPlaying(); renderStations();
    navigator.mediaSession.playbackState = 'paused';
  });

  // 잠금화면 ⏮⏭ → 정지 상태에서도 채널 변경 가능
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    const i = STATIONS.findIndex(s => s.id === S.current.id);
    playStation(STATIONS[(i - 1 + STATIONS.length) % STATIONS.length], true);
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    const i = STATIONS.findIndex(s => s.id === S.current.id);
    playStation(STATIONS[(i + 1) % STATIONS.length], true);
  });

  // playbackState: 로딩 중이면 playing으로 표시해 OS가 컨트롤을 숨기지 않게 함
  navigator.mediaSession.playbackState = S.playing || S.loading ? 'playing' : 'paused';
}

let fbDb       = null;

function initFirebase() {
  if (fbReady) return;
  try {
    firebase.initializeApp(FB_CONFIG);
    fbDb = firebase.database();
    fbReady = true;
  } catch(e) { console.warn('Firebase 초기화 실패:', e); }
}

function startSync() {
  if (!fbReady) return;
  fbListener = fbDb.ref('shared/station').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    if (_fbIgnore) { _fbIgnore = false; return; }
    const s = STATIONS.find(x => x.id === data.id);
    if (!s || (S.current && S.current.id === s.id)) return;
    if (data.nick === myNick) return; // 자기 자신이 변경한 경우 무시
    _fbIgnore = true;
    playStation(s, true);
    showToast(`📻 ${data.nick || '누군가'}님이 ${s.name}으로 변경했습니다`);
  });
}

function stopSync() {
  if (fbDb && fbListener) {
    fbDb.ref('shared/station').off('value', fbListener);
    fbListener = null;
  }
}

function toggleSync() {
  if (syncMode) {
    syncMode = false; stopSync();
    document.getElementById('syncBtn').classList.remove('on');
    showToast('함께 듣기가 종료되었습니다');
  } else {
    if (myNick) confirmSync();
    else {
      document.getElementById('nickModalBg').classList.add('show');
      setTimeout(() => document.getElementById('nickInput').focus(), 100);
    }
  }
}

function closeNickModal() {
  document.getElementById('nickModalBg').classList.remove('show');
}

function confirmSync() {
  stopSync(); // 기존 리스너 먼저 정리
  const inp = document.getElementById('nickInput').value.trim();
  if (inp) { myNick = inp; localStorage.setItem('radio_nick', myNick); }
  if (!myNick) myNick = '익명';
  closeNickModal();
  initFirebase();
  if (!fbReady) { showToast('⚠️ Firebase 연결에 실패했습니다'); return; }
  syncMode = true;
  document.getElementById('syncBtn').classList.add('on');
  startSync();
  showToast(`🔗 함께 듣기 시작 (${myNick})`);
}

document.getElementById('nickInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmSync();

/* ════════════════════════════════════════
   스와이프 제스처
════════════════════════════════════════ */
(function() {
  const vp    = document.getElementById('swipeViewport');
  const track = document.getElementById('swipeTrack');
  let sx = 0, sy = 0, st = 0, dragging = false, base = 0;

  vp.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    st = Date.now(); dragging = false;
    base = S.activeTab === 'all' ? 0 : -50;
    track.style.transition = 'none';
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (!dragging && Math.abs(dy) > Math.abs(dx)) return;
    dragging = true;
    const next = Math.max(-50, Math.min(0, base + (dx / vp.clientWidth) * 100));
    track.style.transform = `translateX(${next}%)`;
  }, { passive: true });

  vp.addEventListener('touchend', e => {
    if (!dragging) return;
    track.style.transition = '';
    const dx   = e.changedTouches[0].clientX - sx;
    const fast = Date.now() - st < 250 && Math.abs(dx) > 40;
    const far  = Math.abs(dx) > vp.clientWidth * 0.35;
    if (fast || far) switchTab(dx < 0 ? 'fav' : 'all');
    else track.style.transform = `translateX(${base}%)`;
  }, { passive: true });
})();

renderAllList();
updateFavList();

// 업데이트 토스트: 마지막으로 본 버전과 현재 버전 비교
(function checkUpdate() {
  const lastSeen = localStorage.getItem('radio_seen_version');
  if (lastSeen && lastSeen !== APP_VERSION) {
    const latest = CHANGELOG[0];
    const summary = latest.changes.slice(0, 2).join(', ');
    setTimeout(() => {
      showToast(`🆕 ${APP_VERSION} 업데이트: ${summary}`);
    }, 1500);
  }
  localStorage.setItem('radio_seen_version', APP_VERSION);
})();

const _lastId = parseInt(localStorage.getItem('radio_last'));
if (_lastId) {
  S.current = STATIONS.find(s => s.id === _lastId) || null;
  if (S.current) {
    updateNowPlaying(); renderStations();
    // 앱 강제 종료 전 재생 중이었으면 자동 재개
    // (통화 중 Android가 앱을 죽인 경우 포함)
    if (localStorage.getItem('radio_playing') === '1') {
      playStation(S.current);
    }
  }
}
</script>
