<style>
/* ══ 리셋 & 변수 ══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0d1a;
  --bg2:       #131327;
  --bg3:       #1a1a35;
  --panel:     #1e1e3a;
  --border:    rgba(255,255,255,0.07);
  --red:       #e94560;
  --red-glow:  rgba(233,69,96,0.35);
  --amber:     #f5a623;
  --text:      #e8e8f0;
  --muted:     #7070a0;
  --np-end:    #21213f;
  --hdr-bg:    rgba(13,13,26,0.92);
  --tab-bdr:   rgba(255,255,255,0.15);
  --err-bg:    #2a1010;
  --err-bdr:   #5a2020;
  --err-txt:   #ee8888;
  --mono:      'Orbitron', monospace;
  --kr:        'Noto Sans KR', sans-serif;
  --sat:       env(safe-area-inset-top,    0px);
  --sab:       env(safe-area-inset-bottom, 0px);
}

[data-theme="light"] {
  --bg:       #f0f0f5;
  --bg2:      #e4e4ee;
  --bg3:      #d8d8e8;
  --panel:    #ffffff;
  --border:   rgba(0,0,0,0.08);
  --red-glow: rgba(233,69,96,0.2);
  --text:     #1a1a2e;
  --muted:    #7070a0;
  --np-end:   #eaeaf8;
  --hdr-bg:   rgba(240,240,245,0.92);
  --tab-bdr:  rgba(0,0,0,0.12);
  --err-bg:   #fff0f0;
  --err-bdr:  #f0c0c0;
  --err-txt:  #c0392b;
}
[data-theme="light"] .station-card:hover { background: #fff; }
[data-theme="light"] input[type=range]   { background: var(--bg3); }
[data-theme="light"] .log-entry.INFO .log-tag      { color: #0a9e8f; }
[data-theme="light"] .log-entry.RECONNECT .log-tag { color: #6d28d9; }
[data-theme="light"] .log-entry.ERROR .log-tag     { color: #dc2626; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--kr);
  overflow: hidden; /* ★ 전체 페이지 스크롤 제거 */
}

/* ══ 레이아웃 ══ */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;       /* ★ 뷰포트 꽉 채우기 */
  max-width: 520px;
  margin: 0 auto;
  padding-top: var(--sat);
  overflow: hidden;     /* ★ 앱 자체 스크롤 없음 */
}

/* ══ 헤더 ══ */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px 13px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--hdr-bg);
}

.logo { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 34px; height: 34px;
  background: var(--red);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 11px; font-weight: 900;
  box-shadow: 0 0 16px var(--red-glow);
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--mono);
  font-size: 14px; font-weight: 700;
  letter-spacing: 2px;
}
.logo-text span { color: var(--red); }

.header-actions { display: flex; align-items: center; gap: 8px; }

/* 함께 듣기 버튼 */
#syncBtn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--muted);
  font-size: 11px;
  font-family: var(--kr);
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
#syncBtn.on {
  background: rgba(0,200,100,0.12);
  border-color: rgba(0,200,100,0.4);
  color: #00c864;
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}
#syncBtn.on .sync-dot {
  box-shadow: 0 0 6px #00c864;
  animation: blink 1.4s ease-in-out infinite;
}

/* 테마 버튼 */
#themeBtn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s;
  flex-shrink: 0;
}
#themeBtn:hover { transform: rotate(20deg); }

/* 설치 버튼 */
#installBtn {
  display: none;
  align-items: center; gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--amber);
  font-family: var(--kr);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: background .2s, color .2s, border-color .2s;
}
#installBtn:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* ══ Now Playing ══ */
.now-playing {
  margin: 16px;
  background: linear-gradient(135deg, var(--panel) 0%, var(--np-end) 100%);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.now-playing::before {
  content: '';
  position: absolute; inset: 0;
  /* ★ 채널 색상은 배경 그라디언트에만 — 재생 버튼은 항상 빨간색 유지 */
  background: radial-gradient(ellipse at 80% 20%, var(--station-glow, var(--red-glow)) 0%, transparent 60%);
  pointer-events: none;
}

.np-label {
  font-size: 10px; letter-spacing: 3px;
  color: var(--red);
  font-family: var(--mono); font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.np-station {
  font-family: var(--mono);
  font-size: 22px; font-weight: 900;
  letter-spacing: 1px; line-height: 1.1;
  margin-bottom: 4px; min-height: 28px;
}

.np-freq {
  font-family: var(--mono);
  font-size: 13px; color: var(--muted);
  margin-bottom: 16px; min-height: 18px;
}

/* 파형 */
.waveform {
  display: flex; align-items: flex-end;
  gap: 3px; height: 36px;
  margin-bottom: 18px;
}
.wave-bar {
  width: 4px; background: var(--red);
  border-radius: 2px; opacity: 0.3;
  transition: opacity .3s;
}
.playing .wave-bar { opacity: 1; }
.paused  .wave-bar { animation-play-state: paused; }

.wave-bar:nth-child(1)  { animation: wave 1.0s ease-in-out infinite; }
.wave-bar:nth-child(2)  { animation: wave 1.3s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(3)  { animation: wave 0.8s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(4)  { animation: wave 1.1s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(5)  { animation: wave 0.9s ease-in-out infinite 0.3s; }
.wave-bar:nth-child(6)  { animation: wave 1.4s ease-in-out infinite 0.15s; }
.wave-bar:nth-child(7)  { animation: wave 1.0s ease-in-out infinite 0.25s; }
.wave-bar:nth-child(8)  { animation: wave 0.7s ease-in-out infinite 0.1s; }
.wave-bar:nth-child(9)  { animation: wave 1.2s ease-in-out infinite 0.35s; }
.wave-bar:nth-child(10) { animation: wave 0.9s ease-in-out infinite 0.05s; }
.wave-bar:nth-child(11) { animation: wave 1.1s ease-in-out infinite 0.2s; }
.wave-bar:nth-child(12) { animation: wave 0.8s ease-in-out infinite 0.4s; }

@keyframes wave { 0%,100%{height:6px} 50%{height:32px} }

/* 컨트롤 */
.controls { display: flex; align-items: center; gap: 14px; }

.btn-play {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--red); border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 24px var(--red-glow);
  transition: transform .15s;
}
.btn-play:active { transform: scale(0.93); }
.btn-play svg { fill: white; width: 22px; height: 22px; }

.volume-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.vol-icon { color: var(--muted); font-size: 16px; flex-shrink: 0; }

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--bg3); border-radius: 2px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  border-radius: 50%; background: var(--red);
  cursor: pointer; box-shadow: 0 0 8px var(--red-glow);
}

.np-status {
  font-size: 11px; color: var(--muted);
  margin-top: 12px; min-height: 14px;
  font-family: var(--mono); letter-spacing: 0.5px;
}
.np-status.live  { color: var(--red); }
.np-status.error { color: var(--amber); }

.spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid rgba(233,69,96,0.3);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  flex-shrink: 0;
}
.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ 탭 ══ */
.tabs { display: flex; gap: 8px; padding: 10px 16px 4px; }
.tab-btn {
  flex: 1; padding: 8px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-size: 12px; font-family: var(--kr); font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.tab-btn.active {
  background: var(--panel);
  border-color: var(--tab-bdr);
  color: var(--text);
}

/* ══ 에러 박스 ══ */
.error-box {
  margin: 6px 16px;
  padding: 10px 14px;
  background: var(--err-bg);
  border: 1px solid var(--err-bdr);
  border-radius: 10px;
  font-size: 11px; color: var(--err-txt);
  align-items: center;
  justify-content: space-between; gap: 10px;
}
.error-retry-btn {
  flex-shrink: 0; padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--err-txt);
  background: transparent; color: var(--err-txt);
  font-size: 11px; cursor: pointer; transition: all .15s;
}
.error-retry-btn:hover { background: var(--err-txt); color: var(--panel); }

/* ══ 채널 목록 ══ */
.section-label {
  padding: 6px 20px 4px;
  font-size: 10px; letter-spacing: 3px;
  color: var(--muted);
  font-family: var(--mono); text-transform: uppercase;
}

.swipe-viewport {
  overflow: hidden;
  width: 100%;
}

/* ══ 채널 스크롤 영역 ══ */
.channel-scroll-area {
  flex: 1;              /* ★ 남은 공간 전부 차지 */
  overflow-y: auto;     /* ★ 채널 목록만 스크롤 */
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--sab) + 80px); /* ★ 하단 여백 */
}
.swipe-track {
  display: flex; width: 200%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
  align-items: flex-start;
}
.swipe-panel { width: 50%; flex-shrink: 0; min-width: 0; }

.station-list {
  display: flex; flex-direction: column;
  gap: 1px; padding: 0 12px;
}

.station-card {

  background: var(--panel);

  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

/* ════════════════════════════════════════
   스트림 URL 결정
   streamApi 방송(극동방송): 캐시 재사용
   일반 방송: 바로 stream URL 반환
════════════════════════════════════════ */
const _streamCache = {}; // { [id]: { url, ts } }
const CACHE_TTL_MS  = 30 * 60 * 1000; // ★ 30분 후 만료 — CDN URL 교체 대응

/* ★ 캐시 버스팅 — CDN/프록시 캐시 강제 우회 */
function bustUrl(url) {
  const sep = url.includes('?') ? '&' : '?';
  return url + sep + '_t=' + Date.now();
}

async function resolveStreamUrl(s, forceRefresh = false) {
  if (!s.streamApi) {
    return forceRefresh ? bustUrl(s.stream) : s.stream;
  }
  // ★ 캐시 TTL 체크 — 만료됐거나 forceRefresh면 재요청
  const cached = _streamCache[s.id];
  if (!forceRefresh && cached && (Date.now() - cached.ts < CACHE_TTL_MS)) {
    return cached.url;
  }
  try {
    const res  = await fetch(s.streamApi, { cache: 'no-store' });
    const text = await res.text();
    const m    = text.match(/https?:\/\/[^\s"'<>]+\.m3u8[^\s"'<>]*/);
    if (m) {
      _streamCache[s.id] = { url: m[0], ts: Date.now() }; // ★ url + 타임스탬프 저장
      return m[0];
    }
    console.warn('streamApi: m3u8 URL을 찾지 못했습니다. 기본 URL로 폴백합니다.');
  } catch(e) { console.warn('streamApi 실패:', e); }
  return forceRefresh ? bustUrl(s.stream) : s.stream;
}

/* ════════════════════════════════════════
   재생 감시 워치독
   onOK() 이후 audio.currentTime이 멈추면
   UI 강제 동기화 + 재연결
════════════════════════════════════════ */
function startWatchdog() {
  stopWatchdog();
  let lastTime  = audio.currentTime;
  let stallTick = 0;
  S.watchdogTimer = setInterval(() => {
    if (!S.playing || S.loading) { stopWatchdog(); return; }

    // ★ 백그라운드 상태에서는 OS가 currentTime 갱신을 지연시킬 수 있음
    // → hidden 상태에서는 오작동 판정을 완전히 건너뜀
    if (document.visibilityState === 'hidden') {
      lastTime  = audio.currentTime; // 기준값 갱신 (복귀 후 오작동 방지)
      stallTick = 0;
      return;
    }

    const cur = audio.currentTime;
    if (audio.paused || cur === lastTime) {
      // ★ HLS 모드에서 audio.paused 상태는 recoverMediaError() 복구 중일 수 있음
      // → paused이면 바로 stallTick 누적 전에 play() 재시도 (1회만)
      if (audio.paused && S.hls && stallTick === 0) {
        audio.play().catch(() => {});
      }
      stallTick++;
      // ★ 포그라운드 기준 8초(4틱×2초), 백그라운드는 위에서 스킵
      if (stallTick >= 4) {
        RLog.warn('워치독: 스트림 멈춤 감지 → 재연결', `paused=${audio.paused}, cur=${audio.currentTime.toFixed(2)}`);
        stopWatchdog();
        S.playing = false;
        updateNowPlaying(); renderStations();
        scheduleRetry();
      }
    } else {
      stallTick = 0;
      lastTime  = cur;
    }
  }, 2000);
}

function stopWatchdog() {
  if (S.watchdogTimer) { clearInterval(S.watchdogTimer); S.watchdogTimer = null; }
}

/* ════════════════════════════════════════
   재생 로그 시스템
   중단 원인 추적을 위해 주요 이벤트를 IndexedDB에 저장
════════════════════════════════════════ */
const LOG_DB_KEY  = 'radio_play_log';
const LOG_MAX     = 500; // 최대 500개 유지

const RLog = (() => {
  let _buf = [];   // 메모리 버퍼
  let _loaded = false;

  // IDB에서 기존 로그 로드
  async function load() {
    try {
      const r = await idbGet(LOG_DB_KEY);
      _buf = r ? JSON.parse(r) : [];
    } catch(e) { _buf = []; }
    _loaded = true;
  }

  // IDB에 저장
  async function persist() {
    try { await idbSet(LOG_DB_KEY, JSON.stringify(_buf)); } catch(e) {}
  }

  // 로그 기록
  function write(level, msg, detail = '') {
    const now  = new Date();
    const time = now.toLocaleTimeString('ko-KR', { hour12: false })
                 + '.' + String(now.getMilliseconds()).padStart(3,'0');
    const date = now.toLocaleDateString('ko-KR');
    const entry = { level, time, date, msg, detail,
      station: window.S?.current?.name || '-',
      ts: now.getTime() };
    _buf.unshift(entry);             // 최신이 위
    if (_buf.length > LOG_MAX) _buf.pop();
    persist();
    // 에러·경고 발생 시 로그 버튼 강조
    if (level === 'ERROR' || level === 'WARN' || level === 'STOP') {
      document.getElementById('logBtn')?.classList.add('has-error');
    }
    // 콘솔에도 출력
    const fn = level === 'ERROR' ? console.error : level === 'WARN' ? console.warn : console.info;
    fn(`[RLog][${level}] ${msg}`, detail || '');
  }

  return {
    load,
    info    : (m, d) => write('INFO',      m, d),
    play    : (m, d) => write('PLAY',      m, d),
    stop    : (m, d) => write('STOP',      m, d),
    warn    : (m, d) => write('WARN',      m, d),
    error   : (m, d) => write('ERROR',     m, d),
    reconnect:(m,d)  => write('RECONNECT', m, d),
    getAll  : ()     => [..._buf],
    clear   : async () => { _buf = []; await persist(); },
  };
})();

// 로그 뷰어 UI
function openLog() {
  renderLogUI();
  document.getElementById('logBg').classList.add('show');
  document.getElementById('logBtn').classList.remove('has-error');
}
function closeLog(e) {
  if (e && e.target !== document.getElementById('logBg')) return;
  document.getElementById('logBg').classList.remove('show');
}
function renderLogUI() {
  const logs = RLog.getAll();
  const body = document.getElementById('logBody');
  if (!logs.length) {
    body.innerHTML = '<div class="log-empty">기록된 로그가 없습니다.</div>';
    return;
  }
  body.innerHTML = logs.map(e => `
    <div class="log-entry ${e.level}">
      <span class="log-time">${e.date} ${e.time}</span>
      <span class="log-tag">[${e.level}]</span>
      <span class="log-msg"> [${e.station}] ${e.msg}${e.detail ? ' — ' + e.detail : ''}</span>
    </div>`).join('');
}
function exportLog() {
  const logs = RLog.getAll();
  const lines = logs.map(e =>
    `${e.date} ${e.time} [${e.level}] [${e.station}] ${e.msg}${e.detail ? ' — '+e.detail : ''}`
  ).join('\n');
  const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `radio-log-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}
async function clearLog() {
  if (!confirm('로그를 모두 삭제할까요?')) return;
  await RLog.clear();
  renderLogUI();
  showToast('🗑️ 로그가 초기화됐습니다.');
}

/* ════════════════════════════════════════
   재시도
════════════════════════════════════════ */
function clearRetryTimer() {
  if (S.retryTimer) { clearTimeout(S.retryTimer); S.retryTimer = null; }
}

function scheduleRetry() {
  if (S.retryTimer) { clearTimeout(S.retryTimer); S.retryTimer = null; }

  S.playing = false;
  S.loading = false; // ★ 영구 로딩 UI 방지
  updateNowPlaying(); renderStations();

  // ★ 백그라운드 상태에서는 재시도 루프 없이 즉시 종료
  // → 포그라운드 복귀 시 visibilitychange에서 자동 재연결
  if (document.visibilityState === 'hidden') {
    if (S.current) S.wasPlaying = true; // 복귀 시 재연결 트리거
    S.retryCount = 0;
    if (S.hls) { S.hls.destroy(); S.hls = null; } // HLS 인스턴스 정리
    audio.src = '';
    RLog.info('백그라운드 재시도 건너뜀 — 포그라운드 복귀 시 재연결');
    return;
  }

  if (S.retryCount >= 5) {
    RLog.error('재연결 5회 실패 — 방송 중단');
    showError('연결 실패 (5회). 재연결 버튼을 눌러주세요.');
    return;
  }
  S.retryCount++;
  const delay = Math.min(2000 * Math.pow(2, S.retryCount - 1), 30000);
  RLog.warn(`재연결 대기 ${S.retryCount}회차`, `${Math.round(delay/1000)}초 후 재시도`);
  showError(`연결이 끊겼습니다. ${Math.round(delay/1000)}초 후 재연결 (${S.retryCount}/5)`);
  S.retryTimer = setTimeout(() => { if (S.current) playStation(S.current, false, true); }, delay);
}

function retryPlay() {
  if (!S.current) return;
  clearRetryTimer(); S.retryCount = 0;
  playStation(S.current, true);
}

/* ════════════════════════════════════════
   재생 엔진
════════════════════════════════════════ */
function playStation(s, forceRefresh = false, isRetry = false) {
  const thisCall = ++S.callId;
  S.needReconnect = false;
  // ★ 수동 채널 전환 시에만 wasPlaying 초기화
  // 재시도/재연결(isRetry=true) 경로에서는 덮어쓰지 않음
  if (!isRetry) S.wasPlaying = false;

  // ★ 수동 채널 선택 시 자동 재연결 락·인터벌 즉시 해제 (중복 실행 차단)
  reconnectingCall = false;
  stopCallWatch();

  showError(null); clearRetryTimer(); stopWatchdog();
  // ★ 수동 채널 선택 시에만 retryCount 리셋 — scheduleRetry 재시도 경로에서는 유지 (지수 백오프 작동)
  if (!isRetry) S.retryCount = 0;
  S.loading = true; S.playing = false; S.current = s;
  localStorage.setItem('radio_last', s.id);
  updateNowPlaying(); renderStations();
  RLog.play(`채널 선택: ${s.name}`, `${s.freq} / forceRefresh=${forceRefresh}`);

  if (S.hls) { S.hls.destroy(); S.hls = null; }
  S.userPaused = true;
  audio.pause(); audio.src = '';

  // Firebase 동기화
  if (typeof syncMode !== 'undefined' && syncMode && typeof fbDb !== 'undefined' && fbDb) {
    _fbIgnore = Date.now(); // ★ 이 기기가 쓴 이벤트임을 타임스탬프로 표시
    fbDb.ref('shared/station').set({ id: s.id, nick: myNick, at: Date.now() });
  }

  resolveStreamUrl(s, forceRefresh).then(url => {
    if (thisCall !== S.callId) return;

    function onOK() {
      if (thisCall !== S.callId) return;
      S.playing    = true; S.loading = false; S.retryCount = 0;
      S.userPaused = false; // ★ pause 이벤트가 발생하지 않은 경우(이미 정지 상태에서 재생)에도 반드시 초기화
      RLog.play('재생 시작 성공');

      // ★ 재생 시작 시 라이브 엣지 강제 동기화
      // HLS.js가 backBufferLength:0 + startPosition:-1 을 적용했지만
      // 혹시라도 오래된 위치에서 시작되는 경우를 대비한 최종 안전장치
      // ★ onOK 내 강제 currentTime 점프 제거 — startPosition:-1 로 이미 라이브 엣지 시작 보장

      localStorage.setItem('radio_playing', '1');
      updateNowPlaying(); renderStations(); updateMediaSession();
      startWatchdog();   // 실제 재생 감시 시작
      requestWakeLock(); // ★ 재생 성공 시 WakeLock 획득
    }
    function onFail(retry) {
      if (thisCall !== S.callId) return;
      S.loading = false; S.playing = false;
      updateNowPlaying(); renderStations(); updateMediaSession();
      RLog.error('재생 실패(onFail)', `retry=${retry}`);
      if (retry) scheduleRetry();
    }

    if (window.Hls && window.Hls.isSupported()) {
      const hls = new window.Hls({
        // ★ 라이브 엣지 즉시 재생 설정 — 버퍼를 최소화해 항상 현재 시점 방송 재생
        maxBufferLength:              10,  // ★ 5→10: bufferStalledError 반복 방지 (Joy4U 세그먼트 여유)
        maxMaxBufferLength:           15,  // ★ 8→15: 버퍼 자동 확장 상한
        backBufferLength:             1,   // ★ 0→1: 완전 제거 시 세그먼트 경계 미세 끊김 발생
        liveSyncDurationCount:        2,   // ★ 1→2: 라이브 엣지 2세그먼트 뒤 재생 (bufferStall 방지)
        liveMaxLatencyDurationCount:  4,   // ★ 2→4: 급격한 엣지 점프 억제
        liveDurationInfinity:        true, // 라이브 스트림 duration을 Infinity로 유지
        startPosition:               -1,   // 항상 라이브 엣지에서 시작 (-1 = 최신 위치)
        enableWorker:                true,
      });

      hls.on(window.Hls.Events.MANIFEST_PARSED, () => {
        // ★ 매니페스트 파싱 후 명시적으로 라이브 엣지 위치에서 로드 시작
        hls.startLoad(-1);
        audio.volume = S.volume;
        audio.play().then(onOK).catch(() => {
          showToast('▶ 화면을 탭하면 재생됩니다');
          onFail(false);
        });
      });
      // ★ LEVEL_LOADED에서 audio.currentTime 강제 점프 제거
      // → currentTime 강제 변경은 버퍼 플러시를 유발해 재생 중 주기적 끊김의 직접 원인
      // → 라이브 엣지 동기화는 HLS.js 자체(liveMaxLatencyDurationCount)에 완전히 위임
      let mediaErrorCount = 0;
      let netErrCount = 0;    // ★ 비치명 네트워크 오류 누적 카운트
      let netErrTimer = null; // ★ startLoad 디바운스 타이머 (runaway 루프 방지)
      hls.on(window.Hls.Events.ERROR, (_, d) => {
        if (thisCall !== S.callId) { hls.destroy(); return; } // 구 채널 에러 조용히 폐기
        if (d.type === window.Hls.ErrorTypes.NETWORK_ERROR) {
          if (d.fatal) {
            RLog.error('HLS 네트워크 오류(치명)', `${d.details || ''}`);
            if (netErrTimer) { clearTimeout(netErrTimer); netErrTimer = null; }
            if (S.hls === hls) S.hls = null;
            hls.destroy(); onFail(true);
          } else {
            netErrCount++;
            if (netErrCount > 3) {
              // ★ 비치명 오류 3회 초과 — startLoad 반복은 의미 없음
              // HLS 인스턴스를 완전히 재생성해 새 TCP 연결로 복구
              RLog.warn('HLS 네트워크 오류(인스턴스 재생성)', `${d.details || ''} [${netErrCount}회]`);
              if (netErrTimer) { clearTimeout(netErrTimer); netErrTimer = null; }
              if (S.hls === hls) S.hls = null;
              hls.destroy(); onFail(true); // scheduleRetry → 새 playStation 호출
              return;
            }
            RLog.warn('HLS 네트워크 오류(복구 시도)', `${d.details || ''} [${netErrCount}/3]`);
            // ★ startLoad를 500ms 디바운스로 제한 — 연속 오류 시 폭주 방지
            if (!netErrTimer) {
              netErrTimer = setTimeout(() => {
                netErrTimer = null;
                hls.startLoad();
              }, 500);
            }
          }
          return;
        }
        if (d.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
          if (mediaErrorCount < 2) {
            RLog.warn(`HLS 미디어 오류(복구 ${mediaErrorCount+1}회)`, `${d.details || ''}`);
            mediaErrorCount++;
            hls.recoverMediaError();
            // ★ recoverMediaError() 후 audio가 paused 상태로 방치되는 문제 해결
            // HLS.js 스펙상 recoverMediaError 이후 명시적으로 play()를 재호출해야 함
            setTimeout(() => { if (S.hls === hls && audio.paused) audio.play().catch(() => {}); }, 100);
          } else {
            RLog.error('HLS 미디어 오류(복구 한계 초과)', `${d.details || ''}`);
            if (S.hls === hls) S.hls = null;
            hls.destroy(); onFail(true);
          }
          return;
        }
        if (d.fatal) {
          if (S.hls === hls) S.hls = null;
          hls.destroy(); onFail(true);
        }
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = url; audio.volume = S.volume;
      audio.play().then(onOK).catch(() => onFail(true));
    } else {
      showError('이 브라우저는 HLS를 지원하지 않습니다.');
      S.loading = false; updateNowPlaying(); renderStations();
    }
  }).catch(() => {
    if (thisCall !== S.callId) return;
    S.loading = false; S.playing = false;
    updateNowPlaying(); renderStations(); updateMediaSession();
    showError('스트림 주소를 가져오지 못했습니다.');
  });
}

function togglePlay() {
  if (!S.current || S.loading) return;
  if (S.playing) {
    clearRetryTimer(); stopWatchdog();
    if (S.hls) S.hls.stopLoad();
    S.userPaused = true; S.wasPlaying = false; S.needReconnect = false;
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    releaseWakeLock(); // ★ 사용자 정지 시 WakeLock 해제
    RLog.stop('사용자 정지 (일시정지 버튼)');
    updateNowPlaying(); renderStations(); updateMediaSession();
  } else {
    playStation(S.current);
  }
}

/* ════════════════════════════════════════
   오디오 이벤트 (전화/인터럽트 처리)
════════════════════════════════════════ */
audio.addEventListener('ended',   () => { if (S.current && S.playing) scheduleRetry(); });
audio.addEventListener('error',   () => { if (S.current && S.playing && !S.loading && !S.hls) scheduleRetry(); });
// ★ stalled: 데이터 수신 중단 감지
// HLS.js 활성 상태에서는 HLS.js 내부가 자체 복구하므로 외부 개입 금지
// native <audio> 전용으로만 scheduleRetry 호출
audio.addEventListener('stalled', () => {
  if (!S.current || !S.playing || S.loading) return;
  if (S.hls) return; // ★ HLS.js가 자체 복구 처리 중 — 외부 재시작 금지
  scheduleRetry();
});

/* ════════════════════════════════════════
   네트워크 전환 감지 (WiFi ↔ 데이터)
   — Android에서 online/offline 이벤트 없이
     IP만 바뀌는 경우를 Network Information API로 감지
════════════════════════════════════════ */
(function initNetworkSwitchDetect() {
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (!conn) return; // 미지원 브라우저 (iOS 등)는 워치독으로 처리

  let lastType = conn.effectiveType || conn.type || '';

  conn.addEventListener('change', () => {
    const newType = conn.effectiveType || conn.type || '';
    if (newType === lastType) return;
    console.info(`[네트워크] 전환 감지: ${lastType} → ${newType}`); // ★ lastType 갱신 전에 로그
    lastType = newType;
    if (!S.current || (!S.wasPlaying && !S.playing)) return; // ★ 연산자 우선순위 명확화

    // 네트워크 전환 직후 잠깐 대기 후 재연결
    // (새 인터페이스에 IP 할당되기 전에 재연결하면 또 실패하므로 500ms 대기)
    setTimeout(() => {
      if (S.current && (S.wasPlaying || S.playing)) {
        console.info('[네트워크] 전환 후 재연결 실행');
        S.wasPlaying = false;
        S.needReconnect = false;
        stopWatchdog();
        clearRetryTimer();
        playStation(S.current);
      }
    }, 500);
  });
})();

audio.addEventListener('pause', () => {
  if (S.userPaused) { S.userPaused = false; return; }
  if (S.playing && S.current && !S.loading) {
    RLog.stop('외부 원인으로 재생 중단 (OS/통화/음성입력)');
    S.wasPlaying = true;
    S.needReconnect = true;
    S.playing = false;
    updateNowPlaying(); renderStations();
    if ('mediaSession' in navigator) {
      navigator.mediaSession.playbackState = 'paused';
    }
  }
});

audio.addEventListener('play', () => {
  // ★ 통화/음성입력 중 OS가 잠깐 play를 시도할 때 오발동 차단
  // needReconnect: 통화/음성입력으로 인한 외부 중단 상태
  if (S.needReconnect && S.current && !reconnectingCall) {
    S.needReconnect = false;
    S.wasPlaying    = true;  // ★ false → true: 재연결 트리거가 wasPlaying을 필요로 함
    S.userPaused    = true;
    audio.pause();
    // ★ AudioContext resume → statechange 흐름에 위임
    // 백그라운드/포그라운드 모두 동일하게 AudioContext 상태로 판단
    const ctx = getSharedAudioCtx ? getSharedAudioCtx() : null;
    if (ctx && ctx.state === 'running') {
      // 포그라운드면 즉시, 백그라운드면 tryReconnect가 처리

      if (document.visibilityState !== 'hidden') playStation(S.current);
      else { S.wasPlaying = true; startWatch(); } // ★ 백그라운드: 통화 감지 폴링 시작
    } else if (ctx && ctx.state === 'suspended') {
      ctx.resume().catch(() => {}); // statechange → tryReconnect 흐름
    } else {
      if (document.visibilityState !== 'hidden') playStation(S.current);
      else { S.wasPlaying = true; } // 포그라운드 복귀 시 visibilitychange가 처리
    }
  }
});

/* ════════════════════════════════════════
   공유 AudioContext 싱글턴
   통화·음성입력 종료 감지를 위해
   initCallReconnect + initBluetoothReconnect가 공통으로 사용
════════════════════════════════════════ */
let _sharedAudioCtx  = null;

function getSharedAudioCtx() {

  try {
    _sharedAudioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    _ctxStateWatched = false; // 새 인스턴스 → 리스너 재등록 필요
  } catch(e) {}

}

function ensureAudioCtxWatch() {
  if (_ctxStateWatched) return;
  const ctx = getSharedAudioCtx();
  if (!ctx) return;
  _ctxStateWatched = true;
  ctx.addEventListener('statechange', () => {
    // 오래된 컨텍스트의 이벤트 무시
    if (ctx !== _sharedAudioCtx || ctx.state === 'closed') return;
    // play 이벤트 중 suspended → resume 시도
    if (ctx.state === 'suspended') { ctx.resume().catch(() => {}); return; }
    // running 복귀 = 통화/음성입력 종료 → 재연결
    if (ctx.state === 'running' && S.wasPlaying && S.current && !S.playing && !S.loading) {
      console.info('[AudioCtx] running 복귀 → 재연결 시도');
      // ★ 포그라운드: 즉시 재연결
      // ★ 백그라운드: tryReconnect에 위임 (소프트 재연결 → 전체 재연결 순서로 안전 처리)
      if (document.visibilityState !== 'hidden') {
        S.wasPlaying = false; S.needReconnect = false;
        playStation(S.current);
      } else {
        tryReconnect(); // ★ 백그라운드에서 통화 종료 → 바로 재연결 허용
      }
    }
  });
}

// ★ 앱 시작 즉시 AudioContext 생성 + statechange 등록
// 사용자 첫 터치 전이라 suspended 상태지만, 상태 변화는 감지 가능
try { getSharedAudioCtx(); ensureAudioCtxWatch(); } catch(e) {}

/* ════════════════════════════════════════
   통화 종료 자동 재연결
════════════════════════════════════════ */
// ★ play 이벤트 오발동 차단용으로 외부에서 참조
let reconnectingCall = false;

// ★ playStation 내부에서 통화감지 인터벌을 즉시 멈추기 위한 외부 참조
let stopCallWatch = () => {};

(function initCallReconnect() {
  let watchTimer  = null;
  let callSuspect = false;

  function tryReconnect() {
    if (reconnectingCall || !S.current || !S.wasPlaying) return;
    // ★ 수동 재생/로딩 중이면 중복 실행 방지
    if (S.playing || S.loading) { S.wasPlaying = false; return; }
    // ★ 백그라운드에서도 통화 종료 후 재연결 허용
    // manifestLoadError 루프는 scheduleRetry의 hidden 차단이 이미 보호하고 있음
    reconnectingCall = true;
    S.wasPlaying     = false;
    S.needReconnect  = false;
    callSuspect      = false;
    stopWatch();
    showError(null);

    // ★ 소프트 재연결 먼저 시도 — HLS가 살아있으면 play()만 재호출
    // 알림음·짧은 인터럽트는 HLS 스트림이 유효하므로 전체 재연결(2~3초 침묵) 불필요
    if (S.hls && audio.src) {
      RLog.reconnect('인터럽트 종료 → play() 재시도 (소프트 재연결)');
      S.userPaused = true; // pause 핸들러 오발동 방지
      setTimeout(() => {
        audio.play().then(() => {

          reconnectingCall = false;
          S.playing = true; S.loading = false; S.userPaused = false;
          RLog.play('소프트 재연결 성공 (play() 재시도)');
          updateNowPlaying(); renderStations(); updateMediaSession();
          startWatchdog();
        }).catch(() => {
          // ★ play() 실패 → 전체 재연결로 폴백
          reconnectingCall = false;
          RLog.reconnect('소프트 재연결 실패 → 전체 재연결');
          _fullReconnect();
        });

      return;
    }

    // HLS가 없거나 src가 비어있으면 바로 전체 재연결
    RLog.reconnect('통화/음성입력 종료 → 전체 재연결');
    _fullReconnect();
  }

  function _fullReconnect() {
    reconnectingCall = true;
    // ★ pause 핸들러 오발동 방지 — 반드시 상태 먼저 초기화
    S.userPaused = true;
    S.playing    = false;

    // ★ 대기 전에 기존 스트림 즉시 정리
    try {
      audio.pause();
      if (S.hls) { S.hls.destroy(); S.hls = null; }
      audio.src = '';
    } catch(e) {
      console.warn('[fullReconnect] 기존 스트림 정리 실패:', e);
    }

    setTimeout(() => {
      // ★ 백그라운드에서도 통화 종료 후 전체 재연결 허용
      // scheduleRetry가 hidden 상태에서 wasPlaying=true를 보존하므로 루프 안전
      RLog.reconnect('통화 종료 → 전체 재연결 실행' + (document.visibilityState === 'hidden' ? ' (백그라운드)' : ''));
      playStation(S.current, true);  // 긴 통화 후 URL 강제 갱신
      setTimeout(() => { reconnectingCall = false; }, 2000);
    }, 1200);
  }

  function startWatch() {
    if (watchTimer || reconnectingCall) return;
    callSuspect = true;
    // ★ AudioContext statechange가 주 감지 수단이지만,
    //    suspended 상태가 지속될 경우를 대비한 폴백 폴링
    watchTimer = setInterval(() => {
      if (!S.wasPlaying || !S.current || reconnectingCall) { stopWatch(); return; }
      if (!audio.paused || !navigator.onLine) return;
      // ★ 매번 새 컨텍스트 생성 금지 — 공유 싱글턴 재사용
      const ctx = getSharedAudioCtx();
      if (!ctx) return;
      // suspended면 resume 시도 → statechange → tryReconnect 흐름으로 이어짐
      if (ctx.state === 'suspended') { ctx.resume().catch(() => {}); return; }
      if (ctx.state === 'running') { tryReconnect(); }
    }, 2000);
  }

  function stopWatch() {
    if (watchTimer) { clearInterval(watchTimer); watchTimer = null; }
    callSuspect = false;
  }
  stopCallWatch = stopWatch; // ★ playStation에서 인터벌 경쟁 차단용으로 외부 노출

  audio.addEventListener('pause', () => {
    setTimeout(() => {
      if (S.wasPlaying && S.current && !reconnectingCall) startWatch();
    }, 500);
  });

  audio.addEventListener('play', () => stopWatch());

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      // ★ 재생/로딩 중이면 wasPlaying 보존 (복귀 시 재연결 트리거)
      if (S.playing || S.loading) S.wasPlaying = true;
      // ★ 백그라운드 진입 시 재생/로딩 상태 저장 — onFail 타이밍 레이스 대비
      S._hiddenWasActive = S.playing || S.loading || S.wasPlaying;
      // ★ 로그는 wasPlaying 보존 후 출력 — 정확한 상태 반영
      RLog.info('앱 백그라운드 진입', `playing=${S.playing}, loading=${S.loading}, wasPlaying=${S.wasPlaying}`);

      // ★ 백그라운드 진입 시 모든 재시도·폴링 즉시 중단
      // → 백그라운드에서 manifestLoadError 루프 완전 차단
      clearRetryTimer();
      stopCallWatch(); // 통화감지 폴링 중단
      stopWatchdog();
      // ★ _voiceTimer도 백그라운드에서 반드시 중단
      if (typeof stopVoiceInputTimer === 'function') stopVoiceInputTimer();

      // ★ playing 또는 loading 중이었으면 복귀 시 워치독 재시작
      S._watchdogPaused = S.playing || S.loading;

      // ★ 로딩/재연결 중이면 HLS 인스턴스 즉시 정리 (백그라운드 manifest 요청 중단)
      // 이미 재생 성공 중인 경우는 오디오를 유지해 백그라운드 재생 허용
      if (S.loading) {
        if (S.hls) { S.hls.destroy(); S.hls = null; }
        // ★ pause() 전에 wasPlaying 먼저 보존
        S.wasPlaying = true;
        S.userPaused = true;
        audio.pause(); audio.src = '';
        S.loading = false;
        S.retryCount = 0;
        updateNowPlaying(); renderStations();
      }
      return;
    }

    // ★ 포그라운드 복귀
    RLog.info('앱 포그라운드 복귀', `playing=${S.playing}, wasPlaying=${S.wasPlaying}`);

    // 1) 워치독 재시작
    if (S._watchdogPaused && S.playing && !S.loading) {
      S._watchdogPaused = false;
      startWatchdog();
    }

    // 2) 이미 재생/로딩 중이면 스킵
    if (S.playing || S.loading) return;
    if (reconnectingCall) {
      RLog.info('visibilitychange 재연결 스킵 (tryReconnect 진행 중)');
      return;
    }

    // ★ wasPlaying 또는 _hiddenWasActive이면 즉시 재연결
    // _hiddenWasActive: 백그라운드 진입 시 재생 중이었으나 onFail 타이밍으로 wasPlaying이 소실된 케이스 대비
    if ((S.wasPlaying || S._hiddenWasActive) && S.current && !S.playing && !S.loading) {
      RLog.reconnect('포그라운드 복귀 → 재연결');
      S.wasPlaying = false;
      S._hiddenWasActive = false;
      S.retryCount = 0;
      clearRetryTimer();
      playStation(S.current, true);
    }
    S._hiddenWasActive = false; // 복귀 후 항상 초기화
  });

  window.addEventListener('online', () => {
    if (!S.current) return;
    // ★ wasPlaying 뿐 아니라 playing 상태(스트림이 끊긴 경우)도 재연결
    if (S.wasPlaying || S.playing) {
      RLog.reconnect('네트워크 온라인 복귀 → 재연결 시도');
      setTimeout(() => {
        stopWatchdog(); clearRetryTimer();
        S.wasPlaying = false; S.needReconnect = false;
        playStation(S.current);
      }, 500);
    }
  });
})();

/* ════════════════════════════════════════
   블루투스 재연결
════════════════════════════════════════ */
(function initBluetoothReconnect() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.addEventListener) return;

  // ★ 독립 AudioContext 제거 — 공유 싱글턴(getSharedAudioCtx) 사용
  //    앱 시작 시 이미 statechange 리스너 등록됨 (ensureAudioCtxWatch)

  navigator.mediaDevices.addEventListener('devicechange', async () => {
    if (!S.current) return;
    let hasAudioOut = true;
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      hasAudioOut = devices.some(d => d.kind === 'audiooutput');
    } catch(e) {}
    if (S.wasPlaying && hasAudioOut) {
      setTimeout(() => {
        if (S.wasPlaying && S.current) {
          S.wasPlaying = false; S.needReconnect = false;
          playStation(S.current);
        }
      }, 300);
    }
  });

  // ★ play 이벤트 시 공유 AudioContext가 suspended면 resume 시도
  audio.addEventListener('play', () => {
    const ctx = getSharedAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
    ensureAudioCtxWatch(); // statechange 리스너 확실히 등록
  }, { once: false });

  // ★ 첫 터치 시 공유 AudioContext resume 시도 + 리스너 보장
  document.addEventListener('click', () => {
    const ctx = getSharedAudioCtx();
    if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
    ensureAudioCtxWatch();
  }, { once: true, passive: true });
  document.addEventListener('touchstart', () => {
    const ctx = getSharedAudioCtx();
    if (ctx && ctx.state === 'suspended') ctx.resume().catch(() => {});
    ensureAudioCtxWatch();
  }, { once: true, passive: true });
})();

/* ════════════════════════════════════════
   네트워크 오프라인 감지
════════════════════════════════════════ */
// ★ 백그라운드 진입 시각 기록 — offline 오감지 필터링에 사용
let _bgHiddenAt = 0;
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') _bgHiddenAt = Date.now();
  else _bgHiddenAt = 0;
}, true); // capture 단계로 등록 — 다른 핸들러보다 먼저 실행

window.addEventListener('offline', () => {
  if (!S.current) return;
  if (!S.playing && !S.wasPlaying) return;

  // ★ 백그라운드 진입 직후 500ms 이내 offline은 OS 절전 오감지로 무시
  if (_bgHiddenAt && Date.now() - _bgHiddenAt < 500) {
    RLog.warn('offline 이벤트 무시 (백그라운드 진입 직후 OS 절전 오감지)');
    return;
  }

  RLog.error('네트워크 오프라인 감지 — 방송 중단');
  if (S.playing) { S.wasPlaying = true; S.playing = false; }
  clearRetryTimer(); stopWatchdog(); // ★ 워치독 즉시 정리
  if (S.hls) S.hls.stopLoad();
  updateNowPlaying(); renderStations();
  showError('네트워크가 끊겼습니다. 연결을 확인 중...');
});

/* ════════════════════════════════════════
   음성입력(마이크) 종료 후 재생 복원
   visibilitychange가 발생하지 않는 음성입력 UI 오버레이 대응
════════════════════════════════════════ */
(function initVoiceInputReconnect() {
  let _voiceTimer = null;

  function stopVoiceTimer() {
    if (_voiceTimer) { clearInterval(_voiceTimer); _voiceTimer = null; }
  }
  // ★ 백그라운드 진입 시 외부에서 타이머 중단 가능하도록 전역 노출
  window.stopVoiceInputTimer = stopVoiceTimer;

  // ★ 핵심 재연결 함수 — 호출 시 즉시 재연결 or AudioContext resume 위임
  function doReconnect(reason) {
    if (!S.current || S.playing || S.loading || !S.wasPlaying) return;
    stopVoiceTimer();
    console.info('[VoiceInput]', reason, '→ 재연결');
    const ctx = getSharedAudioCtx();
    if (ctx && ctx.state === 'suspended') {
      // AudioContext가 아직 suspended면 resume → statechange → ensureAudioCtxWatch 흐름
      ctx.resume().catch(() => {
        // resume 실패 시 직접 재연결
        S.wasPlaying = false; S.needReconnect = false;
        playStation(S.current);
      });
    } else {
      S.wasPlaying = false; S.needReconnect = false;
      playStation(S.current);
    }
  }

  // ① pause 이벤트 — userPaused 여부와 무관하게 wasPlaying 강제 보존
  //    기존 pause 핸들러가 userPaused=true일 때 wasPlaying을 세팅하지 않는 문제를 여기서 보완
  audio.addEventListener('pause', () => {
    if (!S.current) return;
    // ★ userPaused(내부 의도적 pause)는 스킵
    if (S.userPaused) return;
    // playing이었거나, 로딩 중에 OS가 pause를 걸었을 때 wasPlaying 보존
    if (S.playing || S.loading) {
      S.wasPlaying = true;
    }
    // ★ 백그라운드 상태에서는 폴링 타이머 시작 차단
    if (document.visibilityState === 'hidden') return;
    // pause 후 폴링 시작 — 음성입력/통화 종료 감지 (주 감지 실패 대비 폴백)
    stopVoiceTimer();
    let tick = 0;
    _voiceTimer = setInterval(() => {
      tick++;
      if (S.playing || S.loading || !S.current) { stopVoiceTimer(); return; }
      if (!S.wasPlaying) { stopVoiceTimer(); return; }
      if (tick > 60) { stopVoiceTimer(); return; } // 최대 2분 감지
      // AudioContext가 running이면 마이크 사용이 종료된 것
      const ctx = getSharedAudioCtx();
      if (!ctx) return;
      if (ctx.state === 'running') {
        doReconnect('폴링 감지(AudioCtx running)');
      } else if (ctx.state === 'suspended') {
        ctx.resume().catch(() => {}); // resume 시도 → statechange로 처리
      }
    }, 2000);
  });

  // play 이벤트 시 폴링 종료
  audio.addEventListener('play', () => stopVoiceTimer());

  // ② visibilitychange — 탭 전환이 발생하는 경우(전화, 일부 음성입력)
  // ★ initCallReconnect의 visibilitychange와 중복되므로
  //    재생이 완전히 끊긴 경우(wasPlaying=true, playing=false)만 처리
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    // 이미 재생 중이거나 initCallReconnect가 처리 중이면 스킵
    if (S.playing || S.loading || reconnectingCall) return;
    doReconnect('visibilitychange(voice)');
  });

  // ③ pageshow — 백/포워드 캐시로 복귀 시 (bfcache)
  window.addEventListener('pageshow', (e) => {
    if (!e.persisted) return;
    doReconnect('pageshow(bfcache)');
  });

})();

function handleVolume(val) {
  const parsed = parseFloat(val);
  if (isNaN(parsed)) return;
  S.volume = Math.min(1, Math.max(0, parsed));
  audio.volume = S.volume;
  const c  = (S.current && S.current.color) || 'var(--red)';
  const sl = document.getElementById('volSlider');
  if (sl) {
    sl.style.background =
      `linear-gradient(to right,${c} ${S.volume*100}%,var(--bg3) ${S.volume*100}%)`;
  }
}

/* ════════════════════════════════════════
   MediaSession (잠금화면 컨트롤)
════════════════════════════════════════ */
function updateMediaSession() {
  if (!('mediaSession' in navigator) || !S.current) return;

  const _aw = [{ src: 'icons/icon-192.png', sizes: '192x192', type: 'image/png' }];
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  S.current.name,
    artist: `${S.current.freq} · ${S.current.genre}`,
    album:  'KOREA FM 라디오',
    artwork: _aw
  });

  navigator.mediaSession.setActionHandler('play', () => {
    playStation(S.current);
  });

  navigator.mediaSession.setActionHandler('pause', () => {
    S.userPaused = true; S.wasPlaying = false; S.needReconnect = false;
    if (S.hls) S.hls.stopLoad();
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    updateNowPlaying(); renderStations();
    navigator.mediaSession.playbackState = 'paused';
  });

  navigator.mediaSession.setActionHandler('stop', () => {
    S.userPaused = true;
    if (S.hls) S.hls.stopLoad();
    audio.pause(); S.playing = false;
    localStorage.setItem('radio_playing', '0');
    updateNowPlaying(); renderStations();
    navigator.mediaSession.playbackState = 'paused';
  });

  ['previoustrack', 'nexttrack', 'seekbackward', 'seekforward'].forEach(a => {
    try { navigator.mediaSession.setActionHandler(a, null); } catch(e) {}
  });

  navigator.mediaSession.playbackState =
    (S.playing || S.loading) ? 'playing' : 'paused';
}

/* ════════════════════════════════════════
   Screen Wake Lock
   Android Chrome 84+ 지원 — OS가 오디오 탭을 종료하지 못하도록 잠금
════════════════════════════════════════ */
let _wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    if (_wakeLock && !_wakeLock.released) return;
    _wakeLock = await navigator.wakeLock.request('screen');
    _wakeLock.addEventListener('release', () => {
      _wakeLock = null;
      if (document.visibilityState === 'visible' && (S.playing || S.loading)) {
        requestWakeLock();
      }
    });
  } catch(e) {
    console.warn('[WakeLock] 획득 실패:', e.message);
  }
}

function releaseWakeLock() {
  if (_wakeLock && !_wakeLock.released) {
    _wakeLock.release().catch(() => {});
    _wakeLock = null;
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && (S.playing || S.loading)) {
    requestWakeLock();
  }
});

/* ══ firebase.js ══ */
/* ════════════════════════════════════════
   IndexedDB 백업
   localStorage 삭제 시에도 IndexedDB에서 복원
════════════════════════════════════════ */
const DB_NAME    = 'kr-radio-db';
const DB_VERSION = 1;
const DB_STORE   = 'settings';

let _idbInstance = null; // ★ 싱글턴 — 매 호출마다 새 커넥션 생성 방지

function openDB() {
  if (_idbInstance) return Promise.resolve(_idbInstance);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(DB_STORE, { keyPath: 'key' });
    };
    req.onsuccess = e => { _idbInstance = e.target.result; resolve(_idbInstance); };
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbSet(key, value) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(DB_STORE, 'readwrite');
      const st  = tx.objectStore(DB_STORE);
      st.put({ key, value });
      tx.oncomplete = () => resolve();
      tx.onerror    = e => reject(e.target.error);
    });
  } catch(e) { console.warn('IndexedDB 저장 실패:', e); }
}

async function idbGet(key) {
  try {
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx  = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).get(key);
      req.onsuccess = e => resolve(e.target.result?.value ?? null);
      req.onerror   = e => reject(e.target.error);
    });
  } catch(e) { return null; }
}

async function saveProtected(key, value) {
  try { localStorage.setItem(key, value); } catch(e) {}
  await idbSet(key, value);
}

async function loadProtected(key) {
  const local = localStorage.getItem(key);
  if (local !== null) return local;
  const idb = await idbGet(key);
  if (idb !== null) {
    try { localStorage.setItem(key, idb); } catch(e) {}
    console.info(`[복원] ${key} → IndexedDB에서 복구됨`);
  }
  return idb;
}

async function restoreFromIDB() {
  const favs = await loadProtected('radio_favs');
  if (favs) {
    try {
      const parsed = JSON.parse(favs);
      if (Array.isArray(parsed)) {
        S.favorites = new Set(parsed);
        updateFavCount(); renderAllList(); updateFavList();
      }
    } catch(e) {}
  }

  const locked = await loadProtected('radio_fav_locked');
  if (locked !== null) {
    favLocked = locked === '1';
    applyFavLock();
  }

  const custom = await loadProtected('radio_custom_stations');
  if (custom) {
    try {
      const parsed = JSON.parse(custom);
      if (Array.isArray(parsed)) {
        parsed.forEach(s => {
          if (!STATIONS.find(x => x.id === s.id)) STATIONS.push(s);
        });
        renderAllList();
      }
    } catch(e) {}
  }
}

/* ════════════════════════════════════════
   사용자 UUID — IndexedDB에만 저장
   인터넷 기록 삭제 후에도 유지됨
════════════════════════════════════════ */
let _userUUID = null;

function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

/* ──────────────────────────────────────
   UUID 쿠키 헬퍼
   인터넷 기록 삭제(방문기록+캐시)로는 쿠키가 지워지지 않으므로
   UUID를 쿠키에도 백업해 IndexedDB 소실에 대비
─────────────────────────────────────── */
function setCookieUUID(uuid) {
  try {
    // 10년 유효기간
    const expires = new Date(Date.now() + 10 * 365 * 24 * 60 * 60 * 1000).toUTCString();
    document.cookie = `kr_radio_uuid=${uuid}; expires=${expires}; path=/; SameSite=Lax`;
  } catch(e) {}
}

function getCookieUUID() {
  try {
    const m = document.cookie.match(/(?:^|;\s*)kr_radio_uuid=([^;]+)/);
    return m ? m[1] : null;
  } catch(e) { return null; }
}

async function getUserUUID() {
  if (_userUUID) return _userUUID;

  // 1순위: IndexedDB
  let uuid = await idbGet('user_uuid');

  // 2순위: 쿠키 (IDB가 지워진 경우 복원)
  if (!uuid) {
    uuid = getCookieUUID();
    if (uuid) {
      await idbSet('user_uuid', uuid);
      console.info('[UUID] 쿠키에서 복원 → IndexedDB 재저장:', uuid);
    }
  }

  // 없으면 신규 생성 후 양쪽에 저장
  if (!uuid) {
    uuid = generateUUID();
    await idbSet('user_uuid', uuid);
    console.info('[UUID] 새 UUID 생성:', uuid);
  } else {
    console.info('[UUID] 복원 완료:', uuid);
  }

  // 항상 쿠키에도 동기화
  setCookieUUID(uuid);

  _userUUID = uuid;
  return uuid;
}

async function fbSaveUserData() {
  if (!fbReady || !fbDb) return;
  try {
    const uuid = await getUserUUID();
    await fbDb.ref(`users/${uuid}`).set({
      favorites:      [...S.favorites],

      updatedAt:      Date.now(),
    });
  } catch(e) { console.warn('Firebase 사용자 데이터 저장 실패:', e); }

async function fbLoadUserData() {
  if (!fbReady || !fbDb) return false;
  try {
    const uuid = await getUserUUID();
    const snap = await fbDb.ref(`users/${uuid}`).once('value');
    const data = snap.val();
    if (!data) return false;

    if (Array.isArray(data.favorites) && data.favorites.length > 0) {
      S.favorites = new Set(data.favorites);
      // ★ saveFav() 대신 직접 저장 — Firebase 복원 데이터를 다시 Firebase로 쓰는 불필요한 루프 방지
      try { localStorage.setItem('radio_favs', JSON.stringify([...S.favorites])); } catch(e) {}
      idbSet('radio_favs', JSON.stringify([...S.favorites])).catch(() => {});
      updateFavCount(); renderAllList(); updateFavList();
    }

    if (typeof data.favLocked === 'boolean') {
      favLocked = data.favLocked;
      const lockVal = favLocked ? '1' : '0';
      try { localStorage.setItem('radio_fav_locked', lockVal); } catch(e) {}
      await idbSet('radio_fav_locked', lockVal);
      applyFavLock();
    }

    if (Array.isArray(data.customStations) && data.customStations.length > 0) {
      const existing = JSON.parse(localStorage.getItem('radio_custom_stations') || '[]');
      const merged = [...existing];
      data.customStations.forEach(s => {
        if (!merged.find(x => x.id === s.id)) merged.push(s);
      });
      saveCustomStations(merged);
      merged.forEach(s => {
        if (!STATIONS.find(x => x.id === s.id)) STATIONS.push(s);
      });
      renderAllList();
    }

    console.info('[Firebase] 사용자 데이터 복원 완료');
    return true;
  } catch(e) {
    console.warn('Firebase 사용자 데이터 불러오기 실패:', e);
    return false;
  }
}

/* 계정 데이터를 Firebase 계정 경로에 저장 */
async function saveAccountData() {
  if (!_accountId || !fbReady || !fbDb) return;
  try {
    await fbDb.ref(`accounts/${_accountId}`).update({
      pin:            _accountPin,
      favorites:      [...S.favorites],

/* Firebase 계정 데이터로 로컬 상태 복원 */
function _restoreFromAccount(data) {
  if (Array.isArray(data.favorites)) {
    S.favorites = new Set(data.favorites);
    saveProtected('radio_favs', JSON.stringify([...S.favorites])).catch(() => {});
    updateFavCount(); renderAllList(); updateFavList();
  }
  if (typeof data.favLocked === 'boolean') {
    favLocked = data.favLocked;
    saveProtected('radio_fav_locked', favLocked ? '1' : '0').catch(() => {});
    applyFavLock();
  }
  if (Array.isArray(data.customStations) && data.customStations.length > 0) {
    const existing = loadCustomStations();
    const merged   = [...existing];
    data.customStations.forEach(s => {
      if (!merged.find(x => x.id === s.id)) merged.push(s);
    });
    saveCustomStations(merged);
    merged.forEach(s => {
      if (!STATIONS.find(x => x.id === s.id)) STATIONS.push(s);
    });
    renderAllList();
  }
}

/* 계정 상태를 로컬에 저장 + 버튼 UI 갱신 */
function _setAccount(id, pin) {
  _accountId  = id;

  try { localStorage.setItem('radio_account_id',  id);  } catch(e) {}
  try { localStorage.setItem('radio_account_pin', pin); } catch(e) {}

  idbSet('radio_account_pin', pin).catch(() => {});
  // 쿠키에도 백업 (IDB+localStorage 동시 삭제 대비)
  try {
    const exp = new Date(Date.now() + 10 * 365 * 86400000).toUTCString();
    document.cookie = `kr_radio_acct=${encodeURIComponent(id)}|${encodeURIComponent(pin)}; expires=${exp}; path=/; SameSite=Lax`;

  _updateAccountBtn();

/* 로그인 또는 회원가입 실행 */
async function doAccountAction() {
  // Firebase가 아직 준비 안 됐으면 직접 초기화 시도
  // (페이지 로드 직후 모달을 빠르게 열었을 때 대비)
  if (!fbReady || !fbDb) {
    try {
      try { firebase.initializeApp(FB_CONFIG); } catch(e) {} // 이미 초기화됐으면 무시
      fbDb    = firebase.database();
      fbReady = true;
    } catch(e) {
      showToast('⚠️ Firebase에 연결할 수 없습니다.'); return;
    }
  }

  const id  = document.getElementById('acc-id').value.trim().toLowerCase();
  const pin = document.getElementById('acc-pin').value.trim();

  if (!id || id.length < 3) {
    showToast('⚠️ 아이디를 3자 이상 입력해주세요.'); return;
  }
  if (id.length > 12 || !/^[a-z0-9_\-가-힣]+$/.test(id)) {
    showToast('⚠️ 아이디는 영문·숫자·한글·_·- 만 사용 가능합니다.'); return;
  }
  if (pin && !/^\d{4}$/.test(pin)) {
    showToast('⚠️ PIN은 숫자 4자리로 입력해주세요.'); return;
  }

  if (_accTab === 'register') await _doRegister(id, pin);
  else                          await _doLogin(id, pin);
}

async function _doRegister(id, pin) {
  try {
    const snap = await fbDb.ref(`accounts/${id}`).once('value');
    if (snap.exists()) {
      showToast('⚠️ 이미 사용 중인 아이디입니다.'); return;
    }
    await fbDb.ref(`accounts/${id}`).set({
      pin,
      favorites:      [...S.favorites],
      favLocked:      favLocked,
      customStations: JSON.parse(localStorage.getItem('radio_custom_stations') || '[]'),
      updatedAt:      Date.now(),
    });
    _setAccount(id, pin);
    closeAccountModal();
    showToast(`✅ "${id}" 계정이 생성됐습니다`);
  } catch(e) {
    console.error('[계정] 등록 실패:', e);
    if (e && e.code === 'PERMISSION_DENIED') {
      showToast('⚠️ Firebase 규칙 오류: accounts 경로 쓰기 권한이 없습니다');
    } else {
      showToast(`⚠️ 등록 실패: ${e?.message || e}`);
    }
  }
}

async function _doLogin(id, pin) {
  try {
    const snap = await fbDb.ref(`accounts/${id}`).once('value');
    if (!snap.exists()) {
      showToast('⚠️ 존재하지 않는 아이디입니다.'); return;
    }
    const data = snap.val();
    if (data.pin && data.pin !== pin) {
      showToast('⚠️ PIN 번호가 올바르지 않습니다.'); return;
    }
    _setAccount(id, pin);
    _restoreFromAccount(data);
    closeAccountModal();
    showToast(`🔓 "${id}" 계정으로 로그인됐습니다`);
  } catch(e) {
    console.error('[계정] 로그인 실패:', e);
    if (e && e.code === 'PERMISSION_DENIED') {
      showToast('⚠️ Firebase 규칙 오류: accounts 경로 읽기 권한이 없습니다');
    } else {
      showToast(`⚠️ 로그인 실패: ${e?.message || e}`);
    }
  }
}

function doLogout() {
  _accountId  = null;
  _accountPin = '';
  try { localStorage.removeItem('radio_account_id');  } catch(e) {}
  try { localStorage.removeItem('radio_account_pin'); } catch(e) {}
  idbSet('radio_account_id',  '').catch(() => {});
  idbSet('radio_account_pin', '').catch(() => {});
  try { document.cookie = 'kr_radio_acct=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/'; } catch(e) {}
  _updateAccountBtn();
  closeAccountModal();
  showToast('로그아웃됐습니다');
}

/* ════════════════════════════════════════
   함께 듣기 (실시간 채널 동기화)
════════════════════════════════════════ */
function startSync() {
  if (!fbReady) return;
  fbListener = fbDb.ref('shared/station').on('value', snap => {
    const data = snap.val();
    if (!data) return;
    // ★ 타임스탬프 기반 무시 — 이 기기가 300ms 이내에 쓴 이벤트만 스킵
    // boolean 방식은 타이밍에 따라 다른 사용자 이벤트를 잘못 무시할 수 있음
    if (Date.now() - _fbIgnore < 300) return;
    const s = STATIONS.find(x => x.id === data.id);
    if (!s || (S.current && S.current.id === s.id)) return;
    if (data.nick === myNick) return;
    playStation(s, true);
    showToast(`📻 ${data.nick || '누군가'}님이 ${s.name}으로 변경했습니다`);
  });
}

function stopSync() {
  if (fbDb && fbListener) {
    fbDb.ref('shared/station').off('value', fbListener);
    fbListener = null;
  }
}

function toggleSync() {
  if (syncMode) {
    syncMode = false; stopSync();
    document.getElementById('syncBtn').classList.remove('on');
    showToast('함께 듣기가 종료되었습니다');
  } else {
    if (myNick) confirmSync();
    else {
      document.getElementById('nickModalBg').classList.add('show');
      setTimeout(() => document.getElementById('nickInput').focus(), 100);
    }
  }
}

function closeNickModal() {
  document.getElementById('nickModalBg').classList.remove('show');
}

function confirmSync() {
  stopSync();
  const inp = document.getElementById('nickInput').value.trim();
  if (inp) { myNick = inp; localStorage.setItem('radio_nick', myNick); }
  if (!myNick) myNick = '익명';
  closeNickModal();
  initFirebase();
  if (!fbReady) { showToast('⚠️ Firebase 연결에 실패했습니다'); return; }
  syncMode = true;
  document.getElementById('syncBtn').classList.add('on');
  startSync();
  showToast(`🔗 함께 듣기 시작 (${myNick})`);
}

document.getElementById('nickInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmSync();
});

function saveFav() {
  const data = JSON.stringify([...S.favorites]);
  // ★ saveProtected: localStorage + IndexedDB 동시 저장 (인터넷 기록 삭제 대비)

function toggleFav(id, e) {

  if (S.favorites.has(id)) S.favorites.delete(id);

  const el = document.getElementById('fav-count');
  if (el) el.textContent = S.favorites.size > 0 ? `(${S.favorites.size})` : '';
}

function updateEmptyState() {
  const empty = document.getElementById('fav-empty');
  if (!empty) return;
  const hasFav = [...S.favorites].some(id => STATIONS.find(s => s.id === id));
  empty.style.display = hasFav ? 'none' : 'block';

/* ════════════════════════════════════════
   채널 카드
════════════════════════════════════════ */
function createCard(s) {
  const isActive = S.current && S.current.id === s.id;
  const isFav    = S.favorites.has(s.id);
  const freqShort = s.freq.replace(' MHz','').replace(' ','');
  const div = document.createElement('div');
  div.className = `station-card${isActive ? ' active' : ''}`;
  div.dataset.id = s.id;
  div.innerHTML = `
    <div class="st-badge" style="background:${s.color}22;color:${s.color}">
      ${esc(freqShort)}
    </div>
    <div class="st-info">
      <div class="st-name">
        ${esc(s.name)}${s.custom ? '<span class="custom-station-badge">MY</span>' : ''}
      </div>
      <div class="st-desc">${esc(s.genre)}</div>
    </div>
    <div class="st-freq">${esc(s.freq)}</div>
    <div class="live-dot"></div>
    <button class="s-fav-btn${isFav?' on':''}" data-id="${s.id}" aria-label="즐겨찾기">
      ${isFav ? '★' : '☆'}
    </button>
    ${s.custom ? `<button class="st-delete-btn" data-id="${s.id}" aria-label="삭제">✕</button>` : ''}
  `;
  div.addEventListener('click', () => {
    if (S.current && S.current.id === s.id && !S.loading) togglePlay();
    else playStation(s, true);
  });
  div.querySelector('.s-fav-btn').addEventListener('click', e => toggleFav(s.id, e));
  if (s.custom) {
    div.querySelector('.st-delete-btn').addEventListener('click', e => deleteCustomStation(s.id, e));
  }
  return div;
}

function renderAllList() {
  const list = document.getElementById('list-all');
  if (!list) return;
  list.innerHTML = '';
  STATIONS.forEach(s => list.appendChild(createCard(s)));
  syncViewportHeight(); // ★
}

function updateFavList() {
  const list = document.getElementById('list-fav');
  if (!list) return;
  list.innerHTML = '';
  STATIONS.filter(s => S.favorites.has(s.id)).forEach(s => list.appendChild(createCard(s)));
  updateEmptyState();
  syncViewportHeight(); // ★
}

function renderStations() {
  renderAllList();
  updateFavList();
}

    S.current ? `${S.current.freq} · ${S.current.genre}` : '—';

  if (S.current && S.current.color) {
    // ★ 채널 색상은 패널 배경에만 적용 — --red(재생버튼/UI)는 항상 고정
    const hex = S.current.color;
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    np.style.setProperty('--station-glow', `rgba(${r},${g},${b},0.45)`);
  } else {
    np.style.removeProperty('--station-glow');
  }

  if (S.loading) {
    wave.className = 'waveform paused';
    spin.style.display = 'block';
    btnSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    status.className = 'np-status';
    status.textContent = '연결 중...';
  } else if (S.playing) {
    wave.className = 'waveform playing';
    spin.style.display = 'none';
    btnSvg.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    status.className = 'np-status live';
    status.textContent = '● LIVE';
  } else {
    wave.className = 'waveform paused';
    spin.style.display = 'none';
    btnSvg.innerHTML = '<path d="M8 5v14l11-7z"/>';
    status.className = 'np-status';
    status.textContent = S.current ? '일시정지' : '재생 중인 채널이 없습니다';
  }

  // 슬라이더 색상 갱신
  handleVolume(S.volume);
}

/* ════════════════════════════════════════
   토스트
════════════════════════════════════════ */
let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ════════════════════════════════════════
   테마
════════════════════════════════════════ */
function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
  applyTheme(next); localStorage.setItem('radio_theme', next);
}
function applyTheme(theme) {
  if (theme === 'light') {
    document.documentElement.dataset.theme = 'light';
    document.getElementById('themeBtn').textContent = '☀️';
  } else {
    delete document.documentElement.dataset.theme;
    document.getElementById('themeBtn').textContent = '🌙';
  }
}
applyTheme(localStorage.getItem('radio_theme') || 'dark');

/* ════════════════════════════════════════
   PWA
════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: '/' })
      .then(reg => {
        console.log('[SW]', reg.scope);
        // 새 SW 대기 중이면 업데이트 토스트 표시
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              showToast('🔄 새 버전이 준비됐습니다. 앱을 다시 시작해주세요.');
            }
          });
        });
      })
      .catch(e => console.warn('[SW] 실패:', e));
  });
}
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('installBtn').style.display = 'none';
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
}

   뒤로가기 — 항상 백그라운드 유지
════════════════════════════════════════ */
(function initBackHandler() {

/* ════════════════════════════════════════
   즐겨찾기 잠금
════════════════════════════════════════ */
function applyFavLock() {
  const btn = document.getElementById('favLockBtn');
  if (!btn) return;
  if (favLocked) {
    btn.classList.add('locked');
    btn.innerHTML = '<span class="lock-icon">🔒</span>';
    btn.title = '즐겨찾기 잠금 해제';
  } else {
    btn.classList.remove('locked');
    btn.innerHTML = '<span class="lock-icon">🔓</span>';
    btn.title = '즐겨찾기 잠금';
  }
}

function toggleFavLock() {
  favLocked = !favLocked;
  const lockVal = favLocked ? '1' : '0';
  try { localStorage.setItem('radio_fav_locked', lockVal); } catch(e) {}
  idbSet('radio_fav_locked', lockVal);
  fbSaveUserData();
  saveAccountData(); // ★ 계정 클라우드 백업
  applyFavLock();
  showToast(favLocked ? '🔒 즐겨찾기가 잠겼습니다' : '🔓 즐겨찾기 잠금이 해제됐습니다');
}

/* ════════════════════════════════════════
   방송 추가 (커스텀 채널)
════════════════════════════════════════ */
function loadCustomStations() {
  try {
    const saved = localStorage.getItem('radio_custom_stations');
    if (!saved) return [];
    const parsed = JSON.parse(saved);
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) { return []; }
}

function saveCustomStations(list) {
  const data = JSON.stringify(list);
  try { localStorage.setItem('radio_custom_stations', data); } catch(e) {
    showToast('⚠️ 저장 공간이 부족합니다.');
  }
  idbSet('radio_custom_stations', data).catch(e => // ★ 오류 무시 방지
    console.warn('[IndexedDB] 커스텀 채널 저장 실패:', e)
  );
  fbSaveUserData();
  saveAccountData();
}

function mergeCustomStations() {
  const custom = loadCustomStations();
  custom.forEach(s => {
    if (!STATIONS.find(x => x.id === s.id)) STATIONS.push(s);
  });
}

function openAddStation() {
  ['asi-name','asi-freq','asi-genre','asi-url'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('asi-color').value = '#e74c3c';
  document.getElementById('addStationBg').classList.add('show');
}

function closeAddStation(e) {
  if (e && e.target !== document.getElementById('addStationBg')) return;
  document.getElementById('addStationBg').classList.remove('show');
}

function confirmAddStation() {
  const name  = document.getElementById('asi-name').value.trim();
  const freq  = document.getElementById('asi-freq').value.trim() || '—';
  const genre = document.getElementById('asi-genre').value.trim() || '기타';
  const url   = document.getElementById('asi-url').value.trim();
  const color = document.getElementById('asi-color').value;

  if (!name) { showToast('⚠️ 방송국 이름을 입력해주세요.'); return; }
  if (!url)  { showToast('⚠️ 스트림 URL을 입력해주세요.'); return; }
  if (!url.startsWith('http')) { showToast('⚠️ URL은 http로 시작해야 합니다.'); return; }

  const custom    = loadCustomStations();
  // ★ Date.now() + 랜덤값 조합 — 빠른 연속 추가나 장기 사용 시에도 ID 충돌 방지
  const newId      = 1000000 + Math.floor(Math.random() * 900000);
  const newStation = { id: newId, name, freq, genre, color, stream: url, custom: true };

  custom.push(newStation);
  saveCustomStations(custom);
  STATIONS.push(newStation);
  renderAllList(); updateFavCount();
  closeAddStation();
  showToast(`✅ "${name}" 채널이 추가됐습니다.`);
}

function deleteCustomStation(id, e) {
  e.stopPropagation();
  const s = STATIONS.find(x => x.id === id);
  if (!s || !s.custom) return;
  if (S.current && S.current.id === id) {
    showToast('⚠️ 재생 중인 채널은 삭제할 수 없습니다.'); return;
  }
  const custom = loadCustomStations().filter(x => x.id !== id);
  saveCustomStations(custom);
  const idx = STATIONS.findIndex(x => x.id === id);
  if (idx > -1) STATIONS.splice(idx, 1);
  S.favorites.delete(id); saveFav();
  renderAllList(); updateFavCount();
  updateFavList(); // ★ 즐겨찾기 탭에서 삭제된 채널 즉시 제거
  showToast('🗑️ 채널이 삭제됐습니다.');
}

/* ════════════════════════════════════════
   변경 이력
════════════════════════════════════════ */
function openChangelog() {
  const body = document.getElementById('changelogBody');
  body.innerHTML = '';
  CHANGELOG.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'changelog-entry';
    div.innerHTML = `
      <div class="changelog-ver">
        <span class="changelog-ver-badge${i > 0 ? ' old' : ''}">${entry.version}</span>
        <span class="changelog-date">${entry.date}</span>
      </div>
      <div class="changelog-list">
        ${entry.changes.map(c => `<div class="changelog-item">${c}</div>`).join('')}
      </div>`;
    body.appendChild(div);
  });
  document.getElementById('changelogBg').classList.add('show');
}

function closeChangelog(e) {
  if (e && e.target !== document.getElementById('changelogBg')) return;
  document.getElementById('changelogBg').classList.remove('show');
}

/* ════════════════════════════════════════
   스와이프 제스처
════════════════════════════════════════ */
(function() {
  const vp    = document.getElementById('swipeViewport');
  const track = document.getElementById('swipeTrack');
  let sx = 0, sy = 0, st = 0, dragging = false, base = 0;

  vp.addEventListener('touchstart', e => {
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    st = Date.now(); dragging = false;
    base = S.activeTab === 'all' ? 0 : -50;
    track.style.transition = 'none';
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (!dragging && Math.abs(dy) > Math.abs(dx)) return;
    dragging = true;
    const next = Math.max(-50, Math.min(0, base + (dx / vp.clientWidth) * 100));
    track.style.transform = `translateX(${next}%)`;
  }, { passive: true });

  vp.addEventListener('touchend', e => {
    if (!dragging) return;
    track.style.transition = '';
    const dx   = e.changedTouches[0].clientX - sx;
    const fast = Date.now() - st < 250 && Math.abs(dx) > 40;
    const far  = Math.abs(dx) > vp.clientWidth * 0.35;
    if (fast || far) switchTab(dx < 0 ? 'fav' : 'all');
    else track.style.transform = `translateX(${base}%)`;
  }, { passive: true });
})();

(function checkUpdate() {
  const lastSeen = localStorage.getItem('radio_seen_version');
  if (lastSeen && lastSeen !== APP_VERSION) {
    const latest  = CHANGELOG[0];
    const summary = latest.changes.slice(0, 2).join(', ');

// 1. 즉시 렌더링
updateFavCount();
renderAllList();
updateFavList();

// 2. 마지막 방송국 즉시 복원
// PWA 바로가기(?autoplay=id) 우선, 없으면 마지막 채널 복원
const _autoplayId = parseInt(new URLSearchParams(location.search).get('autoplay'));
const _lastId = _autoplayId || parseInt(localStorage.getItem('radio_last'));
if (_lastId) {
  S.current = STATIONS.find(s => s.id === _lastId) || null;
  if (S.current) {
    updateNowPlaying(); renderStations();
    if (localStorage.getItem('radio_playing') === '1') {
      playStation(S.current);
      const resumeOnGesture = () => {
        if (!S.playing && !S.loading && S.current) playStation(S.current);
        document.removeEventListener('touchstart', resumeOnGesture);
        document.removeEventListener('click', resumeOnGesture);
      };
      document.addEventListener('touchstart', resumeOnGesture, { once: true, passive: true });
      document.addEventListener('click', resumeOnGesture, { once: true, passive: true }); // ★ passive 추가
    }
  }
}

// 3. Firebase/IndexedDB 복원 — 백그라운드
(async function initData() {
  // ★ Firebase를 최우선으로 초기화 — 사용자가 즉시 계정 모달을 열어도 동작하도록
  try {
    if (!fbReady) {
      firebase.initializeApp(FB_CONFIG);
      fbDb    = firebase.database();
      fbReady = true;
    }
  } catch(e) {
    console.warn('Firebase 사전 초기화 실패:', e);
  }

  // ★ localStorage가 비어있으면(인터넷 기록 삭제 등) 반드시 IndexedDB 먼저 복원
  const localFavs   = localStorage.getItem('radio_favs');
  const localLocked = localStorage.getItem('radio_fav_locked');
  if (!localFavs || localLocked === null) {
    await restoreFromIDB().catch(() => {});
  }

  try {
    await initUserData();

    // ★ 계정 ID 복원: localStorage → IDB → 쿠키 순으로 확인 후 Firebase에서 데이터 로드
    if (!_accountId) {
      // IDB에서 계정 ID 확인
      const savedId  = await idbGet('radio_account_id').catch(() => null);
      const savedPin = await idbGet('radio_account_pin').catch(() => '');
      let   restoredId  = savedId  || '';
      let   restoredPin = savedPin || '';

      // IDB도 없으면 쿠키에서 확인
      if (!restoredId) {
        try {
          const m = document.cookie.match(/(?:^|;\s*)kr_radio_acct=([^;]+)/);
          if (m) {
            const parts = decodeURIComponent(m[1]).split('|');
            restoredId  = parts[0] || '';
            restoredPin = parts[1] || '';
          }
        } catch(e) {}
      }

      if (restoredId) {
        try {
          const snap = await fbDb.ref(`accounts/${restoredId}`).once('value');
          if (snap.exists()) {
            _setAccount(restoredId, restoredPin);
            _restoreFromAccount(snap.val());
            console.info(`[계정] "${restoredId}" 자동 복원 완료`);
          }
        } catch(e) { console.warn('[계정] 자동 복원 실패:', e); }
      }
    }
  } catch(e) {
    console.warn('Firebase 데이터 복원 실패:', e);
    // Firebase 실패 시 IndexedDB로만 복원
    if (!localFavs) await restoreFromIDB().catch(() => {});
  }
  updateFavCount();
  updateFavList();
  applyFavLock();

  // ★ 로그 시스템 초기화 — IDB에서 기존 로그 로드
  RLog.load().then(() => {
    RLog.info('앱 시작', `${APP_VERSION}`);
    document.getElementById('versionBadge').textContent = APP_VERSION; // ★ 항상 최신 버전 표시
  });
})();
